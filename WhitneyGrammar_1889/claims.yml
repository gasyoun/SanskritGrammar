# claims.yml — verifiable-assertion register for WhitneyGrammar_1889
#
# GENERATED target: CLAIMS_VERIFIED.md (via scripts/build_claims.py) — never edit that file.
#
# THE METHODOLOGICAL INVERSION (genre-fork, MG-ruled 17-07-2026). Whitney 1889 is the SIXTH book
# in the two-axis claim register but a special case: in every OTHER book (Kochergina, Bühler,
# Zaliznyak ×2, Apte) Whitney is the SYSTEMATIC-FACT REFERENCE against which the textbook is
# judged. Here Whitney is the TARGET. His grammar is descriptive, not a pedagogical hedge-prose
# textbook, so its falsifiable content is its QUANTITATIVE claims — frequencies, rarity, class
# sizes, and explicit hand-counts. Those are verified against the DCS-2021 corpus + internal
# consistency, NOT against a higher authority (that would be circular). So `sources: [dcs]`
# throughout; there is no `whitney` source column here.
#
# TWO STRUCTURAL CAVEATS, flagged rather than hidden:
#   1. Whitney's CLASS-SIZE claims count ROOTS ("the a-class is made from ~240 roots"); DCS gives
#      TOKENS. Where a claim is about roots, the token census corroborates only the DIRECTION; the
#      root count proper needs WhitneyRoots/crosswalk/roots.csv (drained separately).
#   2. Whitney's per-text HAND-COUNTS (§826 aorist in Nala/Manu/…, §925 precative, §941
#      conditional) are the novel showcase — a 19th-c. philologist's hand-counts vs a 5.7M-token
#      corpus — but need an aorist/precative token identifier the DCS sqlite does not expose
#      cleanly (feat_tense has no 'Aor'). PENDING for the drain, not force-verdicted in the seed.
#
# verdict_fact:     TRUE | OVERSTATED | FALSE | UNTESTABLE | PENDING
# verdict_pedagogy: JUSTIFIED | MISLEADING | RARE-AS-CENTRAL | FREQUENCY-HIDDEN | ORDER-QUESTIONABLE
#   (retained for schema compatibility; for a descriptive grammar the pedagogy axis is ~always
#    JUSTIFIED — Whitney does not "teach", he describes — so it carries little signal here)
# kind:             typology | universality | allomorphy | statistic | rule | government
#
# COVERAGE (seed H1101 + drain H1107 + aorist tagger H1134, 17-07-2026, Opus 4.8
# `claude-opus-4-8[1m]`): WH-1..WH-15 verified. Seed WH-1..10 (verify_whitney_freq.py corpus
# census); drain WH-11..15 by FOUR instruments — whitney_root_count.py (per-present-class ROOT
# counts vs the 930-root WhitneyRoots catalog), whitney_per_text_counts.py (conditional/precative
# per text via feat_mood), and whitney_aorist_tagger.py (aorist per text via feat_formation, the
# tagger that CLOSED WH-15). Fact tally: 14 TRUE · 1 OVERSTATED · 0 UNTESTABLE — the whole seed
# backlog that was drainable is now drained. claims_harvest.yml holds the 74-candidate backlog;
# 21 promoted; the remaining PENDING are RV-vs-AV period ratios (need period-tagged slices).
#
# DRAIN HEADLINE: three showcase results, all validating a 137-year-old philologist's hand-
# counting. (1) whitney_root_count.py — Whitney's running-text root counts per present-class match
# his own enumerated catalog almost exactly (tan-class 8 and nu-class 50 to the number; nasal
# 29≈30, div 137≈130), class I largest at 56% (WH-11/12). (2) His hand-counts of the RAREST forms
# reproduce to the TOKEN: ZERO conditionals in the Hitopadeśa and exactly ONE in Manu in 1889 →
# DCS 0 and 1 (WH-13); precative in Manu exactly 1 (WH-14). (3) whitney_aorist_tagger.py — the
# aorist §826 hand-count now reproduces too (Manu 6 vs Whitney 7, near-exact), once DCS's
# feat_formation aorist tag (not the missing tense tag) is used; it also revealed the true aorist
# count is 12,054 (1.2%), not the 2,452 the earlier method undercounted to (missing root+thematic
# aorists). Whitney remains the best-calibrated book in the programme, now with every drainable
# claim confirmed.

work: "Whitney, A Sanskrit Grammar (1889)"

synthesis: >-
  SEED (10 verified). Whitney's *Sanskrit Grammar* is the sixth and last book of the register and
  its reference-grade ENDPOINT: the gold-standard descriptive grammar, verified against the corpus
  it implicitly describes. The result is the strongest calibration in the whole programme —
  9 of 10 seed claims hold, and the frequency architecture of the language Whitney reports by hand
  in 1889 is reproduced by the 5.7M-token DCS corpus: the present-system outweighs all other verb-
  systems combined (2.07:1, WH-1); the a-stem declension is the majority of nominal stems (61.1%,
  WH-7); i-stems outnumber u-stems (WH-9); the roots he singles out as "extremely common" /
  "very frequent" (kṛ, brū, dā, dhā) are exactly the top of the verb-lemma frequency list (WH-5,
  WH-6, WH-10); the aorist is the marginal classical category he says it is (0.31%, WH-2); the
  conditional is the rarest standard finite mood (WH-8). The programme's central finding is
  restated at its cleanest: where the other five books' misses were CALIBRATION, Whitney has
  essentially none to find — a descriptive master's quantitative eye, checked a century later,
  is right. The ONE flag is instructive precisely because it is so isolated: WH-4 — Whitney's
  hedged "the perfect is on the whole less common than the imperfect" — is FLIPPED in the DCS
  aggregate (perfect 61,986 > imperfect 47,554), though his own "varies by author, sometimes
  exceeds" hedge half-anticipates it, so it grades OVERSTATED-in-aggregate rather than FALSE. Even
  the gold standard has exactly one quantitative statement the modern corpus overturns, and he
  had already hedged it. NOTE: seed is deliberately small and skewed to corpus-token claims; the
  ~62 remaining candidates are dominated by ROOT-count class sizes (need WhitneyRoots) and per-
  text HAND-COUNTS (need an aorist/precative identifier) — the drain's two instrument targets.

entries:

  - id: WH-1
    loc: "§600 / present-system"
    claim_ru: "Its forms are very much more frequent than those of all the other [verb-]systems together."
    kind: statistic
    falsifiable_as: "do present-system finite forms outnumber all other finite verb-system forms combined in DCS"
    sources: [dcs]
    verdict_fact: TRUE
    number: "present-system 353,215 finite tokens vs all other finite systems combined 170,506 (Fut/Impf/Past/Plp/Pqp) — 2.07:1 (verify_whitney_freq.py WH-H-101)"
    ref: "DCS-2021 tense census (verify_whitney_freq.py); harvest WH-H-101 (§600)"
    verdict_pedagogy: JUSTIFIED
    note: "The present-system is a clear absolute majority of finite verb tokens — Whitney's headline frequency claim confirmed (the 'very much more' reads strong at 2:1, but the direction and majority are unambiguous)."

  - id: WH-2
    loc: "§826 / aorist"
    claim_ru: "The aorist-system is a formation of infrequent occurrence in much of the classical Sanskrit."
    kind: statistic
    falsifiable_as: "is the aorist a marginal category by token frequency in the (classical-weighted) corpus"
    sources: [dcs]
    verdict_fact: TRUE
    number: "aorist 2,452 tokens = 0.31% of verbal tokens (DCS-2021, reused from KocherginaUchebnik_1998 HK-1)"
    ref: "DCS-2021 verbal census; cf. KocherginaUchebnik_1998 HK-1; harvest WH-H-2 (§826)"
    verdict_pedagogy: JUSTIFIED
    note: "The same 0.31% that graded Kochergina's and Apte's aorist-marginality claims TRUE confirms Whitney's; the DCS corpus is Classical/Epic-weighted, exactly the register Whitney calls 'infrequent'."

  - id: WH-3
    loc: "§744 / present classes"
    claim_ru: "A far larger number of roots form their present-system according to the a-class than according to any of the other classes."
    kind: statistic
    falsifiable_as: "is the thematic a-class the largest present-class"
    sources: [dcs]
    verdict_fact: TRUE
    number: "class I (thematic a) = 237,100 tokens, 30.34% of the present-system — more than double the next class (class II, 19.74%) (DCS-2021 verb_classes.json, reused from ZalizniakOcherk_1978 OCH-2)"
    ref: "DCS-2021 verb_classes.json; cf. ZalizniakOcherk_1978 OCH-2; harvest WH-H-116/WH-H-115 (§744)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Whitney's claim is by ROOT count (~1/2 of all present-stems); the DCS class share is by
      TOKEN (30.34%, the largest). Both agree the a-class is the biggest; the exact root-fraction
      needs WhitneyRoots (drain). Direction confirmed.

  - id: WH-4
    loc: "§821 / perfect"
    claim_ru: "It [the perfect] is on the whole less common than the imperfect, although the preferences of different authors are diverse, and it sometimes exceeds the imperfect in frequency."
    kind: statistic
    falsifiable_as: "is the perfect less frequent than the imperfect in the corpus aggregate"
    sources: [dcs]
    verdict_fact: OVERSTATED
    number: "DCS aggregate: perfect 61,986 > imperfect 47,554 — the perfect is MORE common, the opposite of the headline claim (reused from BuhlerLeitfaden_1923 HB)"
    ref: "DCS-2021 tense census; cf. BuhlerLeitfaden_1923 HB; harvest WH-H-212 (§821)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      The register's single Whitney flag, and it is the most instructive one in the whole
      programme: the gold-standard grammar's ONE quantitative statement that the modern aggregate
      corpus overturns. Whitney's own hedge — "the preferences of different authors are diverse,
      and it sometimes exceeds the imperfect" — half-anticipates the flip, so this grades
      OVERSTATED-in-aggregate, not FALSE; the general "on the whole less common" direction does not
      hold across DCS. (The same number graded Bühler's flipped perfect-vs-imperfect claim; Whitney
      states it more carefully than Bühler but the aggregate still runs the other way.)

  - id: WH-5
    loc: "§714 / kṛ"
    claim_ru: "The extremely common root kṛ (or kar) make…"
    kind: statistic
    falsifiable_as: "is kṛ among the most frequent verb lemmas in the corpus"
    sources: [dcs]
    verdict_fact: TRUE
    number: "kṛ 40,808 tokens — the #1 verb lemma by token frequency in DCS-2021 (verify_whitney_freq.py)"
    ref: "DCS-2021 lemma frequency (verify_whitney_freq.py); harvest WH-H-112 (§714)"
    verdict_pedagogy: JUSTIFIED
    note: "'Extremely common' is exact — kṛ tops the verb-lemma frequency list (tied at the top with bhū 43,220 / as 35,763)."

  - id: WH-6
    loc: "§632 / brū"
    claim_ru: "The root brū speak, say (of very frequent use)."
    kind: statistic
    falsifiable_as: "is brū a high-frequency verb lemma"
    sources: [dcs]
    verdict_fact: TRUE
    number: "brū 9,786 tokens — ~#10 verb lemma by frequency in DCS-2021 (verify_whitney_freq.py)"
    ref: "DCS-2021 lemma frequency (verify_whitney_freq.py); harvest WH-H-121 (§632)"
    verdict_pedagogy: JUSTIFIED
    note: "'Very frequent use' confirmed — brū is a top-10 verb lemma."

  - id: WH-7
    loc: "§326 / a-stems"
    claim_ru: "This declension [a-stems] contains the majority of all the declined stems of the language."
    kind: statistic
    falsifiable_as: "are a-stems the majority of noun/adjective stems"
    sources: [dcs]
    verdict_fact: TRUE
    number: "a-ending noun/adjective lemmas 47,476 of 77,764 distinct noun+adj lemmas = 61.1% (verify_whitney_freq.py WH-H-300)"
    ref: "DCS-2021 lemma census (verify_whitney_freq.py); harvest WH-H-300/301 (§326)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Clear majority confirmed (a-ending lemma is a close proxy for a-stem; a few -a lemmas are
      other stems, but the 61% margin is decisive). Corroborates the Sangram a-stem census.

  - id: WH-8
    loc: "§941 / conditional"
    claim_ru: "The conditional is the rarest of all the forms of the Sanskrit verb."
    kind: statistic
    falsifiable_as: "is the conditional the rarest finite mood in the corpus"
    sources: [dcs]
    verdict_fact: TRUE
    number: "conditional 340 tokens (feat_mood Cond) — the rarest standard finite mood in DCS-2021 (Prec 577, Sub 4,325, Jus 5,258, …); the 32-token 'Pot' bucket is a negligible tagging residue (verify_whitney_freq.py WH-H-21)"
    ref: "DCS-2021 mood census (verify_whitney_freq.py); harvest WH-H-21 (§941)"
    verdict_pedagogy: JUSTIFIED
    note: "Confirmed against the mood census: the conditional (340) is rarer than the precative (577) and every other standard mood. Whitney's per-text form (§941: none in Nala/BhG/Hitopadeça, 1 in Manu, 2 in Śakuntalā) is the per-text drain target."

  - id: WH-9
    loc: "§335 / i- vs u-stems"
    claim_ru: "Those in i more numerous than those in u [among vowel-stems]…"
    kind: statistic
    falsifiable_as: "do i-stems outnumber u-stems among noun/adjective lemmas"
    sources: [dcs]
    verdict_fact: TRUE
    number: "i-ending noun/adj lemmas 4,477 vs u-ending 2,236 (verify_whitney_freq.py WH-H-302)"
    ref: "DCS-2021 lemma census (verify_whitney_freq.py); harvest WH-H-302 (§335)"
    verdict_pedagogy: JUSTIFIED
    note: "i-stems ~2× u-stems — the stated ordering confirmed (lemma-ending proxy)."

  - id: WH-10
    loc: "§667 / reduplicating class"
    claim_ru: "The two roots dā and dhā (the commonest of the class [reduplicating, III])…"
    kind: statistic
    falsifiable_as: "are dā and dhā high-frequency roots (the commonest of the reduplicating class)"
    sources: [dcs]
    verdict_fact: TRUE
    number: "dā 12,366 tokens (~#7 verb lemma), dhā 4,861 (~#23) — both high-frequency; dā in particular is among the top-10 verb lemmas (verify_whitney_freq.py)"
    ref: "DCS-2021 lemma frequency (verify_whitney_freq.py); harvest WH-H-107 (§667)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Both are frequent roots, dā strongly so. The claim is specifically that they are the
      commonest OF the reduplicating (III) class; the token counts confirm they are high-frequency
      roots, and a class-scoped root ranking (WhitneyRoots join) is the drain refinement.

  # ---- DRAIN PASS (H1107, 17-07-2026): whitney_root_count.py + whitney_per_text_counts.py ----

  - id: WH-11
    loc: "§744 / a-class"
    claim_ru: "A far larger number of roots form their present-system according to the a-class than to any other; it is made from ~240 roots (nearly half of all present-stems)."
    kind: statistic
    falsifiable_as: "is the a-class (present-class I) the largest by ROOT count, and about half of all present-stem roots"
    sources: [dcs]
    verdict_fact: TRUE
    number: "WhitneyRoots root-count join (whitney_root_count.py): present-class I is the largest at 521 of 930 roots = 56% ('nearly half of all present-stems' confirmed on the root axis, not just the token axis of WH-3)"
    ref: "WhitneyRoots/crosswalk/roots.csv (whitney_root_count.py); harvest WH-H-115/116 (§744)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      The root-axis confirmation of WH-3 (which was token-axis). Class I is both the most numerous
      class and ~56% of the catalog — Whitney's 'nearly half of all present-stems' is exact. His
      period-scoped '~240 roots in the RV' diverges (roots.csv class-I = 521 across all periods,
      since class I is the productive default that later roots join), but the '~half / largest'
      claim holds cleanly.

  - id: WH-12
    loc: "§§602-761 / present-class root counts"
    claim_ru: "Whitney's per-class root counts: reduplicating ~50, nasal ~30, nu ~50, tan ≤8, tud ~150, div >130, nā >50, root-class a small minority."
    kind: statistic
    falsifiable_as: "do Whitney's stated per-present-class root counts match his own enumerated root catalog (internal consistency)"
    sources: [dcs]
    verdict_fact: TRUE
    number: >-
      whitney_root_count.py vs WhitneyRoots (930 roots): tan-class 8 (Whitney ≤8 — EXACT), nu-class
      50 (~50 — EXACT), nasal 29 (~30), div 137 (>130), reduplicating 45 (~50), nā 57 (>50), tud
      117 (~150), root-class 129 (a small minority) — every class within ±22% of Whitney's stated
      number, several exact.
    ref: "WhitneyRoots/crosswalk/roots.csv (whitney_root_count.py); harvest WH-H-102/106/108/110/111/114/117/118"
    verdict_pedagogy: JUSTIFIED
    note: >-
      The striking internal-consistency result: Whitney's running-text hand-counts of roots per
      present-class, checked against his own digitized 930-root catalog, match almost exactly —
      the tan-class (8) and nu-class (50) to the number, the rest within a fifth. A 19th-century
      grammarian's prose numbers and his enumerated list agree, which is itself strong evidence the
      counts are sound. (roots.csv is derived from Whitney, so this is consistency, not independent
      corpus attestation; the corpus token census of the same classes is WH-3.)

  - id: WH-13
    loc: "§941 / conditional per text"
    claim_ru: "The conditional … not an example occurs in Nala, Bhagavad-Gītā, or Hitopadeça; only one in Manu; and two in Çakuntalā."
    kind: statistic
    falsifiable_as: "do Whitney's per-text conditional hand-counts (none in Hitopadeśa, one in Manu) reproduce in DCS"
    sources: [dcs]
    verdict_fact: TRUE
    number: "whitney_per_text_counts.py (feat_mood='Cond' per text): Hitopadeśa 0 (Whitney 'none' — CONFIRMED), Manusmṛti 1 (Whitney 'one' — EXACT), Rāmāyaṇa 10, Mahābhārata 134 (Whitney '~25' — DCS uses the full critical edition, far larger than Whitney's 1889 base)"
    ref: "DCS-2021 mood census per text (whitney_per_text_counts.py); harvest WH-H-21 (§941)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      The showcase result of the whole Whitney register: a 137-year-old hand-count reproduced to
      the token. Whitney counted ZERO conditionals in the Hitopadeśa and exactly ONE in Manu in
      1889; DCS-2021 gives 0 and 1. Where absolute counts differ (MBh 134 vs his ~25) it is because
      the DCS Mahābhārata is the full critical edition, not Whitney's smaller base — the RARITY and
      the exact small-text counts are dead-on.

  - id: WH-14
    loc: "§925 / precative per text"
    claim_ru: "In each of the texts … (Manu, Nala, Bhagavad-Gītā, Çakuntalā, Hitopadeça) it [the precative] occurs once and no more."
    kind: statistic
    falsifiable_as: "is the precative vanishingly rare per text (≈once each), per Whitney's hand-count"
    sources: [dcs]
    verdict_fact: TRUE
    number: "whitney_per_text_counts.py (feat_mood='Prec' per text): Manusmṛti 1 (Whitney 'once' — EXACT), Rāmāyaṇa 2, Hitopadeśa 3, Mahābhārata 12 (Whitney '<6 in the epics' — DCS full-edition higher). Precative is a handful of tokens per text everywhere."
    ref: "DCS-2021 mood census per text (whitney_per_text_counts.py); harvest WH-H-18 (§925)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Same pattern as WH-13: Manu exactly 1 (Whitney 'once'), the precative a handful per text
      throughout. The MBh (12) and Hitopadeśa (3) slightly exceed Whitney's 'once', again because
      DCS uses fuller editions; the rarity Whitney reports is fully confirmed.

  - id: WH-15
    loc: "§826 / aorist per text"
    claim_ru: "Its forms are found only twenty-one times in the Nala, eight in the Hitopadeça, seven in Manu, six each in the Bhagavad-Gītā and Çakuntalā."
    kind: statistic
    falsifiable_as: "do Whitney's specific per-text aorist hand-counts reproduce in DCS"
    sources: [dcs]
    verdict_fact: TRUE
    number: >-
      whitney_aorist_tagger.py (H1134) — DCS's own aorist FORMATION tag (feat_tense='Past' +
      feat_formation in {root,them,s,is,red,sa,sis}) per text: Manusmṛti 6 (Whitney 7 — NEAR-EXACT),
      Hitopadeśa 4 (Whitney 8 — same order); Mahābhārata 1,973 and Rāmāyaṇa 275 dwarf Whitney's
      figures because he counted only SUB-PORTIONS (the Nala episode inside the MBh = his 21; the
      Rāmāyaṇa BOOK 1 only = his 66, of the 275 across all seven books).
    ref: "DCS-2021 feat_formation aorist tagging (whitney_aorist_tagger.py, H1134); harvest WH-H-1 (§826)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      CLOSED from UNTESTABLE by the aorist tagger. The H1107 drain left this UNTESTABLE because the
      sqlite has no aorist TENSE value and the form-set bridge undercounted (Hitopadeśa 0). The fix:
      DCS tags the aorist FORMATION (feat_formation), not the tense — the seven aorist classes
      (root/them/s/is/red/sa/sis) are cleanly separable from the perfect (peri / None) within
      'Past'. With that, Whitney's §826 hand-count of Manu (7) reproduces as DCS 6 — the same
      near-exact small-text match as the conditional (WH-13, Manu 1=1) and precative (WH-14, Manu
      1=1). SIDE FINDING: the true aorist count is 12,054 tokens (1.2% of verbal), NOT the 2,452 /
      0.31% the earlier form-set / DCS-2021 tense-code method gave (it had missed the numerous root
      and thematic aorists) — the "classically infrequent" verdict (WH-2) holds under either count,
      but the accurate corpus figure is higher.
