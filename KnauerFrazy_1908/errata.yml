# errata.yml — structured errata source for KnauerFrazy_1908
#
# This is the hand-edited source. ERRATA.md is GENERATED from it by
# scripts/build_errata.py (npm run errata) — never edit ERRATA.md directly.
#
# Each entry:
#   page:       printed page number (integer)
#   line:       line ref in the source shorthand — "8 сн." (from bottom) / "13 св." (from top)
#   read:       the CORRECT form (Russian: "читать … "  — what it should say)
#   instead:    what the print actually shows (Russian: "вместо …")
#   found_by:   who reported it — an edition/errata sheet label or a person's name
#   date_added: ISO date this erratum entered THIS list (not the reporter's date)
#   fixed_in:   (optional) version tag once corrected in the digital .docx/.mdx, e.g. v0.2.0
#   note:       (optional) free remark
#
# Rows that share (page, line, read, instead) are auto-merged, unioning found_by —
# so an erratum listed by both the 1908 print sheet and the 2023 errata sheet
# collapses to one row citing both.

