    ref: "WhitneyGrammar_1889/10_The_Perfect_System.mdx §789a, §800d; 19_Appendix.mdx (root index, √sū)"

  - id: KN-187
    loc: "Nr. 15 (§§165-178), Devanagari item 3, footnote ^10^"
    surface_form: "gateṣu pārthiveṣu"
    claimed_parse_ru: "loc. abs."
    kind: declension
