    sources: [whitney]
    verdict: CONFIRMED
    evidence: >-
      Whitney §769: the passive stem shows the same abbreviation as the weak perfect and the -ta participle, his explicit example being ucyá from √vac — the exact samprasāraṇa parallel to uhyá- from vah (whose pple ūḍhá, root index pple 954 b, shows the same va → u weakening). 'The load of wood is carried by the man': root correct.
    ref: "WhitneyGrammar_1889/09_The_Present_System.mdx §769"

  - id: KN-200
    loc: "Nr. 17 (§§183-195), item 6, footnote ^2^"
    surface_form: "dṛṣṭvā"
    claimed_parse_ru: "по § 203а отъ darç"
    kind: root-id
    verifiable_as: "is dṛṣṭvā the -tvā gerund of root dṛś/darç 'see', with regular ç → ṣ before the t of the suffix"
    sources: [whitney]
    verdict: CONFIRMED
    evidence: >-
      Whitney §990-991: the later-language gerund is made with tvā added directly to the (unstrengthened) root; dṛç + tvā gives dṛṣṭvā by the regular ç-before-dental change (§182: "ṣ is the product of ç or kṣ before a dental, as in draṣṭum, caṣṭe..."). Whitney's own gerund-usage examples include dṛṣṭvā verbatim ("taṁ ca dūre dṛṣṭvā... H."). Root identification darç = dṛç is exact (Knauer's darç is the guṇa allomorph, cf. KN-5).
    ref: "WhitneyGrammar_1889/13_Verbal_Adjectives_and_Nouns_Participles_Infinitives_Gerunds.mdx §990-991; 03_Rules_of_Euphonic_Combination.mdx §182"

  - id: KN-201
    loc: "Nr. 17 (§§183-195), item 9, footnote ^5^"
    surface_form: "prādidṛkṣata"
    claimed_parse_ru: "отъ darç + pra по § 188"
    kind: root-id
    verifiable_as: "is prādidṛkṣata built on the desiderative stem didṛkṣa- of root dṛś with preverb pra (impf. middle: 'wanted to see')"
    sources: [whitney]
    verdict: CONFIRMED
    evidence: >-
      Whitney §1026-1027: the desiderative stem = accented reduplication + sa; dṛç + sa yields didṛkṣa (ç + s → kṣ, the same euphonic rule as §182). The stem didṛkṣ- is independently attested inside Whitney's own text (didṛkṣéṇya RV., didṛkṣitā́ras ÇB., ch. 14 §1038). pra + a-didṛkṣa-ta with augment contracting to prā- gives the surface form exactly; root and preverb as Knauer states.
    ref: "WhitneyGrammar_1889/14_Derivative_or_Secondary_Conjugation.mdx §1026-1027, §1038; 03_Rules_of_Euphonic_Combination.mdx §182"

  - id: KN-202
    loc: "Nr. 18 (§§200-202), item 2, footnote ^1^"
    surface_form: "pratāritaḥ"
    claimed_parse_ru: "отъ tar + pra по § 200 Iд"
    kind: causative
    verifiable_as: "is pratārita the past participle of the causative of pra + tṛ/tar ('deceived'), formed in -ita from the strengthened root-form with loss of the causative sign"
    sources: [whitney]
    verdict: CONFIRMED
    evidence: >-
      Whitney §1051a-b: the causative passive participle is made from the causatively strengthened root-form with loss of the causative-sign, in -ita — examples dhārita, vāsita, çrāvitá. pra + tāray-a-ti (caus. of tṛ 'cross', lexicalized as 'deceive') gives pp pratārita on exactly this pattern. Knauer's root-id tar (= tṛ) and preverb pra are correct; his §200 Iд evidently covers this -ita class.
    ref: "WhitneyGrammar_1889/14_Derivative_or_Secondary_Conjugation.mdx §1051a-b"

  - id: KN-203
    loc: "Nr. 18 (§§200-202), item 3, footnote ^2^"
    surface_form: "uṣitaiḥ"
    claimed_parse_ru: "отъ 3. vas съ соедин. i по § 200 Iа"
    kind: root-id
    verifiable_as: "is uṣita the past participle of vas 'dwell' (not vas 'shine' or vas 'clothe'), taking the union-vowel i and the weakened root-form uṣ-"
    sources: [whitney]
    verdict: CONFIRMED
    evidence: >-
      Whitney §956d names this form explicitly among the participles that do NOT keep the full root before ita: "uṣita (√vas dwell: also sporadically vasita and uṣṭa)" — i.e. pp in -ita with union-vowel i and samprasāraṇa vas → uṣ. Context (kāçyām uṣitaiḥ 'having dwelt in Benares') fixes the homonym as vas 'dwell', matching Knauer's "3. vas" (his own errata list even corrects an earlier misprint "2. vas" to "3. vas" here).
    ref: "WhitneyGrammar_1889/13_Verbal_Adjectives_and_Nouns_Participles_Infinitives_Gerunds.mdx §956d"

  - id: KN-204
    loc: "Nr. 18 (§§200-202), item 3, footnote ^3^"
    surface_form: "adhītāni"
    claimed_parse_ru: "і + adhi"
    kind: preverb
    verifiable_as: "is adhīta the past participle of root i 'go' with preverb adhi (adhi-i 'study, read'), adhi + ita coalescing to adhīta"
    sources: [whitney]
    verdict: CONFIRMED
    evidence: >-
      The pp of root i is the regular ita (-ta class, §952-954); prefixed adhi + itá contracts to adhītá by Whitney §126 (two similar simple vowels coalesce into the corresponding long vowel). adhi-i as the lexeme 'study, go over' is the standard analysis (its middle present adhīte underlies the reader's çāstrāṇi... adhītāni 'the sciences were studied'). Knauer's segmentation i + adhi is exactly right.
    ref: "WhitneyGrammar_1889/13_Verbal_Adjectives_and_Nouns_Participles_Infinitives_Gerunds.mdx §952-954; 03_Rules_of_Euphonic_Combination.mdx §126"

  - id: KN-205
    loc: "Nr. 18 (§§200-202), item 4, footnote ^4^"
    surface_form: "niṣkrāntaḥ"
    claimed_parse_ru: "kram + nis по § 200 Iв"
    kind: preverb
    verifiable_as: "is niṣkrānta the past participle of nis + kram 'go out', with kram irregularly retaining its nasal and lengthening the vowel (krāntá)"
    sources: [whitney]
    verdict: CONFIRMED
    evidence: >-
      Whitney §955a: "A number of roots ending in am retain the nasal, and lengthen the radical vowel: thus, kāṁta, krāṁtá..." — kram is in the named set, giving krāntá rather than a regular *kramta/kratá. With nis (s → ṣ before the k-initial by the ruki/lingual rule) the compound pp niṣkrānta 'gone forth' is exactly as segmented by Knauer.
    ref: "WhitneyGrammar_1889/13_Verbal_Adjectives_and_Nouns_Participles_Infinitives_Gerunds.mdx §955a"

  - id: KN-206
    loc: "Nr. 18 (§§200-202), item 7, footnote ^7^"
    surface_form: "avatīrṇaḥ"
    claimed_parse_ru: "tar + ava по 200 IIа"
    kind: preverb
    verifiable_as: "is avatīrṇa the past participle of ava + tṛ/tar 'descend', taking the suffix -na with the root vowel becoming īr (tīrṇá)"
    sources: [whitney]
    verdict: CONFIRMED
    evidence: >-
      Whitney §957b: roots in changeable ṛ take the participial suffix ná, the ṛ becoming īr or ūr — "tīrṇá and tūrṇa" listed by name; the root index confirms √tṛ "pple, 957 b". Knauer's §200 IIа is evidently his -na-participle class, and his root-id tar (tṝ) + ava matches avatīrṇa 'descended (from the chariot)' exactly.
    ref: "WhitneyGrammar_1889/13_Verbal_Adjectives_and_Nouns_Participles_Infinitives_Gerunds.mdx §957b"

  - id: KN-207
    loc: "Nr. 18 (§§200-202), item 8, footnote ^8^"
    surface_form: "yoddhavyam"
    claimed_parse_ru: "отъ yudh по § 202б и 33"
    kind: root-id
    verifiable_as: "is yoddhavya the gerundive in -tavya of root yudh 'fight', with guṇa (yodh-) and dh + t assimilating to ddh"
    sources: [whitney]
    verdict: CONFIRMED
    evidence: >-
      Whitney §964: the gerundive in tavya (kartavyà etc.) is made from the strengthened root like the infinitive in -tum. yudh + tavya gives yoddhavya via the sonant-aspirate rule Whitney states at §160 (final sonant aspirate + t → the aspiration thrown forward: dugdhá, dógdhum from duh — the same combination yudh shows here). Impersonal gerundive construction (balīyasā saha na yoddhavyam) is the classic use. Root-id exact.
    ref: "WhitneyGrammar_1889/13_Verbal_Adjectives_and_Nouns_Participles_Infinitives_Gerunds.mdx §964; 03_Rules_of_Euphonic_Combination.mdx §160"

  - id: KN-208
    loc: "Nr. 18 (§§200-202), item 10, footnote ^10^"
    surface_form: "apākartum"
    claimed_parse_ru: "1. kar + apā по § 205"
    kind: preverb
    verifiable_as: "is apākartum the infinitive in -tum of kṛ 'make' with the compound preverb apā (= apa + ā), 'to discharge (a debt)'"
    sources: [whitney]
    verdict: CONFIRMED
    evidence: >-
      Whitney §968 gives the -tum infinitive with the very form kártum from √kṛ as its example; with prefixes the accent shifts (níkartum, §972-973) but the shape is the same, so apā-kartum is regular. The preverb complex apa + ā (apā-kṛ 'drive off, pay off, discharge') matches the debt context (ṛṇam apākartum); Knauer's "1. kar" (= kṛ 'make', vs. his 2. kar = kṝ 'scatter', cf. Nr. 9 ^7^) is the correct homonym.
    ref: "WhitneyGrammar_1889/13_Verbal_Adjectives_and_Nouns_Participles_Infinitives_Gerunds.mdx §968, §972-973"

  - id: KN-209
    loc: "Nr. 18 (§§200-202), Devanagari item 1, footnote ^11^"
    surface_form: "vyāpāditaḥ"
    claimed_parse_ru: "отъ pad + vyā по § 200 Iд"
    kind: preverb
    verifiable_as: "is vyāpādita the causative past participle of vi + ā + pad ('killed, destroyed'), in -ita from the strengthened root-form"
    sources: [whitney]
    verdict: CONFIRMED
    evidence: >-
      Same formation class as pratārita (footnote ^1^, and same Knauer §200 Iд): Whitney §1051a-b, causative pple in -ita from the causatively strengthened root-form (pād-) with loss of the causative sign — Whitney's own gerund example there is even -pādya from this root. Knauer's "vyā" compactly writes the preverb chain vi + ā (vyāpāday- 'kill'); root pad is exact.
    ref: "WhitneyGrammar_1889/14_Derivative_or_Secondary_Conjugation.mdx §1051a-b, d"

  - id: KN-210
    loc: "Nr. 18 (§§200-202), Devanagari item 2, footnote ^12^"
    surface_form: "siktābhir"
    claimed_parse_ru: "siktābhir отъ sic"
    kind: root-id
