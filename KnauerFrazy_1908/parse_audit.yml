    sources: [whitney]
    verdict: CONFIRMED
    evidence: >-
      Whitney §800e gives the perfect paradigm of an ā-final root: dā makes 1sg/3sg dadāú — hā by the same rule makes jahāú. 'Splendor did not abandon the dead king's body': root hā leave (Whitney keeps it distinct from hā move, root index) correctly identified.
    ref: "WhitneyGrammar_1889/10_The_Perfect_System.mdx §800e"

  - id: KN-192
    loc: "Nr. 15 (§§165-178), Devanagari item 6, footnote ^16^"
    surface_form: "upacakrame"
    claimed_parse_ru: "kram + upa"
    kind: preverb
    verifiable_as: "is upacakrame the perfect middle 3sg of upa + kram 'set about, begin'"
    sources: [whitney]
    verdict: CONFIRMED
    evidence: >-
      Regular reduplicated perfect: ca-kram-é with the middle 3sg -e of §800 (cakré type, §800f), root kram (root index √kram; its perfect is the normal formation). upa+kram 'undertake, begin' fits the sentence ('hastening, she set about catching the birds'). Root and preverb segmentation correct.
