  - id: KN-193
    loc: "Nr. 16 (§§179-182), item 5, footnote ^1^"
    surface_form: "coryate"
    claimed_parse_ru: "отъ cur по § 180, 183 и 185г"
    kind: passive-stem
    verifiable_as: "is coryate the passive of the cur-class (tenth-class) stem coráya-, with the aya-sign dropped before the passive yá"
    sources: [whitney]
    verdict: CONFIRMED
    evidence: >-
      Whitney §607: the tenth or cur-class adds áya to a strengthened root (coráya from √cur) and is treated with the causatives; §1052a: the passive of such a stem "is formed by adding the usual passive-sign yá to the causatively strengthened root, the causative- sign being dropped: thus, dhāryáte" — hence cor-ya-te. Knauer's triple §-reference (passive + causative conjugation + sign-drop) mirrors exactly this rule chain.
    ref: "WhitneyGrammar_1889/09_The_Present_System.mdx §607; 14_Derivative_or_Secondary_Conjugation.mdx §1052a"

  - id: KN-194
    loc: "Nr. 16 (§§179-182), item 6, footnote ^2^"
    surface_form: "ājñāpayati"
    claimed_parse_ru: "отъ jñā + ā по § 183"
    kind: causative
    verifiable_as: "is ājñāpayati the causative of ā + jñā, with the p-causative sign taken by ā-final roots"
    sources: [whitney]
    verdict: CONFIRMED
    evidence: >-
      Whitney §1042j lists jñā among the ā-roots making their causative in -paya (jñāpaya, with shortened jñapaya also attested); ā+jñā 'command' → ājñāpayati 'as the lord commands, so let it be done'. Root, preverb, and causative identification all correct.
    ref: "WhitneyGrammar_1889/14_Derivative_or_Secondary_Conjugation.mdx §1042j"

  - id: KN-195
    loc: "Nr. 16 (§§179-182), item 7, footnote ^4^"
    surface_form: "uddhariṣyāmi"
    claimed_parse_ru: "har + ud"
    kind: preverb
    verifiable_as: "is uddhariṣyāmi the iṣya-future of ud + hṛ 'lift out, rescue', with ud + h giving ddh"
    sources: [whitney]
    verdict: CONFIRMED
    evidence: >-
      Whitney §935a: all roots in ṛ take the auxiliary i in the s-future — hṛ → hariṣyá- (guṇa per §932). ud + hariṣyāmi assimilates to uddhariṣyāmi (d + h → ddh, Whitney §163). 'By which I shall deliver you from sorrow': root and preverb correct.
    ref: "WhitneyGrammar_1889/12_The_Future_Systems.mdx §932, §935a; 03_Rules_of_Euphonic_Combination.mdx §163"

  - id: KN-196
    loc: "Nr. 16 (§§179-182), item 8, footnote ^5^"
    surface_form: "pṛchyate"
    claimed_parse_ru: "отъ prach, cp. § 111а"
    kind: passive-stem
    verifiable_as: "is pṛcchyate the passive of prach 'ask', with the same samprasāraṇa weak form (pṛcch-) as in its participle and present"
    sources: [whitney]
    verdict: CONFIRMED
    evidence: >-
      Whitney §769: the passive-sign is added to the weak root form, with "any abbreviation which is made … before ta of the passive participle" made here too (ucyá from vac is his parallel example); prach shows exactly that samprasāraṇa in pres. pṛcchá- (§756a) and pple pṛṣṭá (root index, pple 954 b) — hence pṛcchyáte 'the ṛṣi is asked by the king'. Root identification correct.
    ref: "WhitneyGrammar_1889/09_The_Present_System.mdx §756a, §769"

  - id: KN-197
    loc: "Nr. 16 (§§179-182), Devanagari item 2, footnote ^6^"
    surface_form: "āhvayadhve"
    claimed_parse_ru: "hvā (hū) + ā"
    kind: root-id
    verifiable_as: "is āhvayadhve from the root hvā/hū 'call' with preverb ā, on the present stem hváya-"
    sources: [whitney]
    verdict: CONFIRMED
    evidence: >-
      Whitney's own lemma is "√hū or hvā" (root index) — the same double citation as Knauer's "hvā (hū)". Its present system is the hváya- stem (§761f; cf. §935c "hvā or hū call take a y-form, as in their present-system: hvayiṣya"). ā+hvaya-dhve 2pl middle, 'ye are summoned by the teacher'. Root, variant spelling, and preverb all correct.
    ref: "WhitneyGrammar_1889/09_The_Present_System.mdx §761f; 19_Appendix.mdx (root index, √hū or hvā)"

  - id: KN-198
    loc: "Nr. 16 (§§179-182), Devanagari item 4, footnote ^7^"
    surface_form: "gīyate"
    claimed_parse_ru: "отъ 2. gā"
    kind: passive-stem
    verifiable_as: "is gīyate the passive of gā 'sing' (Knauer's 2. gā, distinct from gā 'go'), with final ā weakened to ī before the passive yá"
    sources: [whitney]
    verdict: CONFIRMED
    evidence: >-
      Whitney §770b: in the passive "final ā is usually changed to ī: thus, dīyá from √dā; hīyá from √hā" — gā sing by the same rule gives gīyá-. The sentence gītaṁ gīyate 'a song is sung' guarantees the 'sing' root, and Whitney likewise keeps gā sing (gāi) as a separate lemma from gā go — matching Knauer's numeral "2. gā" exactly.
    ref: "WhitneyGrammar_1889/09_The_Present_System.mdx §770b"

  - id: KN-199
    loc: "Nr. 16 (§§179-182), Devanagari item 7, footnote ^8^"
    surface_form: "uhyate"
    claimed_parse_ru: "отъ vah"
    kind: passive-stem
