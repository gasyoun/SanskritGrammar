    sources: [whitney]
    verdict: CONFIRMED
    evidence: >-
      sic is a plain root taking the regular -tá participle (§952-954 general rule; no irregularity is registered for it in Whitney's §§955-957 exception lists, and the root index treats sic as regular). siktá 'sprinkled' also appears compounded in this very reader (abhiṣikta, Nr. 8 ^10^). Root identification is exact.
    ref: "WhitneyGrammar_1889/13_Verbal_Adjectives_and_Nouns_Participles_Infinitives_Gerunds.mdx §952-954; 19_Appendix.mdx (root index, √sic)"

  - id: KN-211
    loc: "Nr. 18 (§§200-202), Devanagari item 2, footnote ^13^"
    surface_form: "prarūḍham"
    claimed_parse_ru: "отъ ruh + pra"
    kind: preverb
    verifiable_as: "is prarūḍha the past participle of pra + ruh 'grow up/forth', with ruh + ta regularly yielding rūḍhá (h-loss, ḍh, lengthened vowel)"
    sources: [whitney]
    verdict: CONFIRMED
    evidence: >-
      Whitney §222 states the combination by name: "from ruh with ta comes rūḍhá" (the final h + t giving ḍh with loss of t's dentality and compensatory lengthening; cross-referenced again at §160's dugdhá/rūḍhá/līḍhá set). With pra, prarūḍha 'sprung up (of grain)' is exactly Knauer's segmentation.
    ref: "WhitneyGrammar_1889/03_Rules_of_Euphonic_Combination.mdx §222 (also §160)"

  - id: KN-212
    loc: "Nr. 18 (§§200-202), Devanagari item 4, footnote ^14^"
    surface_form: "bhagnaḥ"
    claimed_parse_ru: "отъ bhañj (bhaj) по § 200 IIб"
    kind: root-id
    verifiable_as: "is bhagna the -na past participle of bhañj 'break', with nasal loss (weak form bhaj-) and j → g before the suffix"
    sources: [whitney]
    verdict: CONFIRMED
    evidence: >-
      Whitney §957c: "A few roots ending in j (which becomes g before the suffix, against the usual rule of internal combination): thus, bhagna (√bhañj)..." — the exact form, root, suffix class (-na, Knauer's §200 II) and the nasal-less allomorph Knauer flags with his parenthetical "(bhaj)". Same parse already given by Knauer at Nr. 9 ^15^ for the same sentence (pathy asmākaṁ ratho bhagnaḥ).
    ref: "WhitneyGrammar_1889/13_Verbal_Adjectives_and_Nouns_Participles_Infinitives_Gerunds.mdx §957c"

  - id: KN-213
    loc: "Nr. 18 (§§200-202), Devanagari item 8, footnote ^16^"
    surface_form: "ādiçyata"
    claimed_parse_ru: "impf. pass. отъ diç + ā"
    kind: passive-stem
    verifiable_as: "is ādiçyata the imperfect passive (3 sg.) of ā + diś 'order, direct' — augmented ya-passive stem diçyá- with middle ending"
    sources: [whitney]
    verdict: CONFIRMED
    evidence: >-
      Whitney §768: the passive is a present-stem in yá with middle endings, formed from all roots; diç (final consonant, no vowel change per §769-770) gives diçyá-, and the augmented imperfect 3 sg. is (ā́)diçyata — 'it was ordered by the king' fits the instrumental rājñā. Root, preverb, and category (impf. pass.) all check out.
    ref: "WhitneyGrammar_1889/09_The_Present_System.mdx §768-770"

  - id: KN-214
    loc: "Nr. 19 (§§203-205), Devanagari items 5 and 7, footnote ^1^"
    surface_form: "draṣṭum / sraṣṭum"
    claimed_parse_ru: "draṣṭum, sraṣṭum отъ darç, sarj, cp. § 111a и 34 сл."
    kind: sandhi
    verifiable_as: "are draṣṭum and sraṣṭum the -tum infinitives of dṛś 'see' and sṛj 'emit/create', with the root-final palatal + t yielding ṣṭ (and a, not guṇa-ar, in the root syllable)"
    sources: [whitney]
    verdict: CONFIRMED
    evidence: >-
      Whitney §182 cites draṣṭum by name as the type-example of "ṣ [as] the product of ç or kṣ before a dental" (root index: √dṛç "euph., 218 a"); the -tum infinitive formation is §968. sraṣṭum from sṛj is the exactly parallel case (j/ç-final palatals → ṣ + t → ṣṭ, with the same ra-vocalism as the -tar/-tum stems draṣṭar-, sraṣṭar-). Knauer's roots darç, sarj (his guṇa citation forms for dṛç, sṛj) are both correct.
    ref: "WhitneyGrammar_1889/03_Rules_of_Euphonic_Combination.mdx §182; 13_Verbal_Adjectives_and_Nouns_Participles_Infinitives_Gerunds.mdx §968"

