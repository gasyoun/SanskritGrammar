      the general vowel/consonant sandhi rules (§111a) governing the -yanta ending.
    ref: "WhitneyGrammar_1889/19_Appendix.mdx (root index, √dṛç, √paç); WhitneyGrammar_1889/09_The_Present_System.mdx §761c"

