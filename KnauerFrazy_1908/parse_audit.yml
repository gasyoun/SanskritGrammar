synthesis: >-
  Small, deliberately narrow first pass (10 of an estimated 280-330 footnote parses). All ten
  audited so far are CONFIRMED against Whitney — no errors found in this sample. That is itself
  informative and expected: unlike the discursive-prose universality/frequency claims that failed
  in Kochergina and Bühler, a footnote gloss is checked by its author against ONE specific worked
  example in front of them, so the error surface is narrower (misreading a paradigm cell) rather
  than the broader miscalibration surface (overgeneralizing a rule, hiding a frequency). Genuinely
  interesting cases confirmed here: iṣ/gam/vas share one irregular ch-stem formation rule
  (Whitney §608, KN-1/KN-2) rather than three unrelated irregularities; kṛ's suppletive passive
  stem kriyá- (§771, KN-4) and śās's reduplicated-type irregularity (§639, KN-3) are exactly as
  glossed. Two entries (KN-9 labh-deponent, KN-10 kṛṣṇāyate-denominative) are marked QUESTIONABLE
  only because an exact matching Whitney citation wasn't pinned down in this pass, not because
  the underlying claim looks wrong — worth a follow-up citation check, not a re-audit from
  scratch. Too small a sample to claim Knauer's footnote apparatus is uniformly reliable; it is a
  first slice establishing that the adapted methodology works and finding no errors yet.

