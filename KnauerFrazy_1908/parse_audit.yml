    sources: [whitney]
    verdict: CONFIRMED
    evidence: >-
      Whitney §303b: the locative "passes over into a well-marked absolute construction … the normal condition of the absolute construction is with a participle accompanying the noun" — exactly gatá- (pp of gam, §954d gatá) agreeing with pārthiva- in the locative plural. Knauer's terse label names the construction correctly.
    ref: "WhitneyGrammar_1889/04_Declension.mdx §303b"

  - id: KN-188
    loc: "Nr. 15 (§§165-178), Devanagari item 3, footnote ^11^"
    surface_form: "kārayāmāsa"
    claimed_parse_ru: "отъ 1. kar"
    kind: causative
    verifiable_as: "is kārayām āsa the periphrastic perfect of the causative of kṛ (Knauer's 1. kar) — 'had (the wedding) performed'"
    sources: [whitney]
    verdict: CONFIRMED
    evidence: >-
      Whitney §1070-1071: the periphrastic perfect is made by prefixing the accusative noun-stem in ā́m to the perfect of an auxiliary (usually as), and §1071a states it "is the accepted perfect of the derivative conjugations: intensive, desiderative, causative…". kāráya- (causative of kṛ) + ām + āsa is precisely this formation; the causative sense fits (Bhīma caused the wedding to be made). Root identification correct.
    ref: "WhitneyGrammar_1889/15_Periphrastic_and_Compound_Conjugation.mdx §1070-1071"

  - id: KN-189
    loc: "Nr. 15 (§§165-178), Devanagari item 4, footnote ^12^"
    surface_form: "anujñāto"
    claimed_parse_ru: "pp. отъ jñā + anu"
    kind: preverb
    verifiable_as: "is anujñāta- the past participle of anu + jñā 'permit, give leave'"
    sources: [whitney]
    verdict: CONFIRMED
    evidence: >-
      jñā takes the regular -ta participle jñātá (Whitney §952-954: ta added to ā-final roots without change, cf. the §954 list of ā-root participles); anu+jñāta- 'given leave (by Bhīma)' fits the sentence. Root, preverb, and category all correct.
    ref: "WhitneyGrammar_1889/13_Verbal_Adjectives_and_Nouns_Participles_Infinitives_Gerunds.mdx §952-954"

  - id: KN-190
    loc: "Nr. 15 (§§165-178), Devanagari item 4, footnote ^13^"
    surface_form: "reme"
    claimed_parse_ru: "отъ ram по § 175г"
    kind: root-id
    verifiable_as: "is reme the perfect middle 3sg of ram 'take pleasure', with the contracted e-form stem rem-"
    sources: [whitney]
    verdict: CONFIRMED
    evidence: >-
      Whitney §794g: roots with medial a before a single final consonant, beginning with a single consonant repeated unchanged in reduplication, contract root and reduplication to one syllable with e — sed from sad, pec from pac, yem from yam. ram meets the definition exactly, giving rem-; middle 3sg remé 'he took pleasure (with his wife)'.
    ref: "WhitneyGrammar_1889/10_The_Perfect_System.mdx §794g"

  - id: KN-191
    loc: "Nr. 15 (§§165-178), Devanagari item 5, footnote ^14^"
    surface_form: "jahau"
    claimed_parse_ru: "отъ hā по § 175ж"
