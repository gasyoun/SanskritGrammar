  - id: OCH-15
    loc: "§58 / mdx line 810"
    claim_ru: >-
      Норму для санскрита составляют односложные... корни. Неодносложные корни встречаются редко,
      в основном в заимствованных словах; среди собственно глагольных корней неодносложных почти нет.
    kind: statistic
    falsifiable_as: "are polysyllabic verbal roots a marginal class"
