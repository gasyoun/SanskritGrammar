    ref: "Whitney §163"
    verdict_pedagogy: JUSTIFIED
    note: "The 'обычно... (реже tad hi)' two-sided hedge matches Whitney's description exactly."

  - id: OCH-13
    loc: "§44 п.2 (отклонения) / mdx line 632"
    claim_ru: >-
      Вместо ожидаемого ḥ в ряде случаев выступает звук, требуемый правилами внутренних сандхи
