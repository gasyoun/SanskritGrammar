# claims.yml — verifiable-assertion register for ZalizniakOcherk_1978
#
# GENERATED target: CLAIMS_VERIFIED.md (via scripts/build_claims.py) — never edit that file.
#
# Same two-axis register as KocherginaUchebnik_1998/claims.yml and BuhlerLeitfaden_1923/claims.yml
# (H768/H797 method), ported here per H797 Phase 2. GENRE CHECK DONE FIRST (15-07-2026, before
# harvesting): of Zaliznyak's three digitized sources, ONLY ZalizniakOcherk_1978 (Очерк
# грамматики санскрита, 1978, 3128 lines) is a full discursive grammar matching Kochergina's/
# Bühler's genre — dense with the same hedge/frequency prose ("обычно", "как правило",
# "большинство", "почти исключительно"). ZalizniakKonspekt_2004 is a smaller, denser technical
# synopsis (same genre, smaller yield) — separate pass. ZalizniakMorphology_1975 is a scholarly
# morphophonological classification paper, not a pedagogical textbook — different genre again,
# closer to Whitney-tier reference material than to a textbook whose informal generalizations get
# checked; do not force it into this schema without a separate ruling.
#
# verdict_fact:     TRUE | OVERSTATED | FALSE | UNTESTABLE | PENDING (harvested, not yet verified)
# verdict_pedagogy: JUSTIFIED | MISLEADING | RARE-AS-CENTRAL | FREQUENCY-HIDDEN | ORDER-QUESTIONABLE
# kind:             typology | universality | allomorphy | statistic | rule
#
# COVERAGE (seed 15-07-2026 + full drain 15-07-2026): OCH-1..OCH-74 — the seed's six
# reuse-verified claims (OCH-1..OCH-6, PR #196) plus the complete 68-candidate backlog drain
# (OCH-7..OCH-74, H797 Phase 2, Fable 5 `claude-fable-5`): claims_harvest.yml is now
# `candidates: []`. Fact-axis tally (after the H1000+H1001+H1004 instruments, 16-07-2026): 63 TRUE · 0 OVERSTATED · 0 FALSE · 11 UNTESTABLE — OCH-63 (the §207 flagship) flipped by the period map (period_style_gradient.py), OCH-47 by the causative detector (causative_grade_detector.py); earlier OCH-21..OCH-23 by the H978 1978-column instrument. The
# UNTESTABLE block is INSTRUMENT gaps, not vague claims — each entry names the missing
# instrument (period-tagged corpus slices, a treebank, compound-type tagging, the 1978↔2026
# series crosswalk, a root-shape parser) and two entries additionally record NEGATIVE PILOT
# measurements (OCH-23 naive series join, OCH-24 aggregate i-rate proxy) so the dead ends are
# not re-derived. Fresh reproducible metrics live in this folder's verify_claims_dcs.py
# (final-consonant census, saḥ/so/sa surface split, i-rates by suffix, rare-mood tokens,
# Talmud set×series join).

work: "Zalizniak, Грамматический очерк санскрита (Grammatical Essay of Sanskrit), 1978"

synthesis: >-
  FULL DRAIN (74 verified; after the H978 + H1000 + H1001 + H1004 instruments: 63 TRUE · 0 OVERSTATED · 0 FALSE · 11 UNTESTABLE — the §68 flagship and its §67 siblings measured by the 1978 column, and the §207 style-gradient flagship measured by the period map, see OCH-21..OCH-23 and OCH-63). Zaliznyak is the
  first grammar in the programme to come through a complete drain with ZERO fact-axis flags:
  not one OVERSTATED, not one FALSE. Where Kochergina's absolutes broke on known exception
  classes and even Bühler slipped once on a frequency direction, Zaliznyak's quantifiers are
  engineered: two-level hedges that the corpus confirms level by level (OCH-10 — his 'крайне
  редко' for final ṇ vs plain 'редко' for ṅ/ñ is exactly the order-of-magnitude split, 118 vs
  659/1,934), absolutes reserved for structurally safe gaps (OCH-17 no short-a-final roots),
  enumerated escape hatches ('только as и группа samprasāraṇa, и несколько других'), and
  surface-frequency statements that measure out at 19:1 in his favour (OCH-29 saḥ→so/sa,
  95.1%). The cleanest single contrast is the verb-accent rule (OCH-72): the SAME fact graded
  Kochergina OVERSTATED for «никогда» (HK-10) grades Zaliznyak TRUE for «как правило» — third
  data point of the programme's central finding that presentation calibration, not factual
  accuracy, is where grammars differ. On that axis the three books now rank cleanly:
  Zaliznyak (0 flags / 74) > Bühler (5 / 64) > Kochergina (12+24 / 234).


  The remaining UNTESTABLE entries are the register's second product: a requirements list for
  the pipeline's next instruments, each named in its entry — ~~period-tagged corpus slices~~
  BUILT 16-07-2026 (period_style_gradient.py, H1000: OCH-63 flipped to measured TRUE — the
  style-I→style-II gradient is real and monotonic on every annotation-robust axis; OCH-47's
  early-vs-late causative half CLOSED the same day by the causative detector, H1001:
  the guṇa 'deviation' falls 81% → 26% → 21% веды→эпос→классика among fluctuating roots), a treebank/parsed slice (OCH-65..OCH-69: word order, subordination, the one risky
  absolute — OCH-68's relative-correlative «всегда» — flagged with a hunting licence),
  compound-type tagging (OCH-58, OCH-60), the 1978↔2026 morphoclass-series crosswalk (OCH-21..
  OCH-23), and a root-shape parser over the Talmud catalog (OCH-16). Two dead ends are
  recorded with their numbers so they are never re-derived as refutations: the naive Talmud
  series join INVERTS the §68 aniṭ/seṭ×series claim (36.8% aniṭ in the predicted-aniṭ group —
  but the join equates 1978 and 2026 series names without validation and skips the
  полноизменяемые filter), and the aggregate i-rate proxy INVERTS the §63 veṭ ranking (tvā
  78.1% tops the scale — but composition bias across suffix populations disqualifies the
  aggregate as a measure of within-root fluctuation).


  Reuse note, extending the seed's original point below: beyond the three direct reuses, the
  drain leaned on the whole programme — eleven entries cross-reference Bühler's register or
  harvest (the marj/vṛddhi, ṝ→īr/ūr, ar-future-i, gamya/gatya, causative-aorist, desiderative
  and intensive claims are now each attested in TWO independent grammars and one verdict),
  one reuses a verified Bühler entry outright (OCH-57 = HB-48, as this book's own harvest
  header planned), and the Talmud's Приложение-1 catalog served as the D-B morphoclass
  authority for the first time as DATA (OCH-15/OCH-17/OCH-32) rather than as citation. The
  original seed synthesis follows.


  Six-claim seed (H797 Phase 2, Ocherk). Three claims are DIRECT REUSES of ground truth already
  computed for other books in this cross-grammar program — a first demonstration that the
  program's corpus infrastructure genuinely compounds across grammars rather than needing
  rebuilding each time. OCH-1 (ṝ phoneme rarity) reuses Kochergina's HK-7 vowel census verbatim
  (ṛ is 126× the combined rare sonants ṝ/ḷ/ḹ) — TRUE, and Zaliznyak's own qualification ("only in
  certain grammatical forms of ar-stems, §86") is more precise than either Kochergina's or
  Bühler's phrasing of the same fact. OCH-3 (precative middle almost unattested post-Vedic)
  reuses Kochergina's HK-39 figure exactly (221 tokens, 0.03% of verbal) — TRUE. OCH-5 (rare
  -am absolutive) reuses Bühler's already-measured absolutive split (-ya 78.4% / -tvā 19.6% /
  -am 0.4%) — TRUE, and the three grammars' independent framing of the same fact (Kochergina
  doesn't discuss it; Bühler calls it "очень редко"; Zaliznyak calls it "изредка") converges on
  the same corpus reality. OCH-4 (çās as a documented exception to the closed-long-vowel-root
  defective pattern) cross-confirms the Knauer parse-audit's KN-3 finding (Whitney §639) from a
  completely different digitized source — the SAME irregular root flagged independently by two
  authors 30 years and two genres apart. OCH-2 (Class I is the largest present-stem class) is a
  clean, freshly-computed TRUE (30.34% of verbal tokens, more than double the next-largest
  thematic class). OCH-6 (thematic-stem formation ranks a > ya > aya by frequency) is TRUE in
  ranking direction but the margin between ya (12.58%) and aya (12.12%) is thin (0.46 points) —
  "реже" for aya is real but nowhere near as dramatic a gap as a-suffix's 44.44% dominance,
  worth flagging as a mild pedagogical understatement of how close the two minority classes
  actually are. No errors found in this seed; too small and too reuse-biased a sample (selected
  for verifiability, not randomly) to characterize Zaliznyak's overall calibration — that
  judgment awaits the 68-candidate backlog, which includes several potentially rich targets
  (§68's aniṭ/seṭ-by-alternation-series correlation; §207's flagship Vedic-to-Classical
  syntactic-style diachronic claim) that need new corpus queries this seed didn't build.

entries:

  - id: OCH-1
    loc: "§21 / mdx line 360"
    claim_ru: >-
      Фонема /ṝ/ встречается очень редко (только в некоторых грамматических формах имён на ar,
      § 86).
    kind: statistic
    falsifiable_as: "is the /ṝ/ phoneme (long vocalic r) vanishingly rare relative to plain /ṛ/ in the DCS corpus"
    sources: [dcs]
    verdict_fact: TRUE
    number: "ṛ 199,930 occurrences (1.75% of monophthong vowels) vs ṝ 1,588 (0.01%) — ṛ is 126× the combined rare sonants ṝ/ḷ/ḹ (DCS-2021 vowel census, reused verbatim from KocherginaUchebnik_1998/claims_dcs_stats.json HK7_vowel_census)"
    ref: "DCS-2021 0.csv vowel census (../KocherginaUchebnik_1998/verify_claims_dcs.py); cf. KocherginaUchebnik_1998 HK-7"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Zaliznyak's qualification — confined to certain grammatical forms of ar-stem nouns (§86) —
      is more precise than a bare rarity claim; the corpus figure (126× rarer than ṛ) supports
      "очень редко" without overstatement. Third independent confirmation of the same underlying
      DCS fact (after Kochergina's own HK-7 statement of it), now cross-book reused rather than
      recomputed.

  - id: OCH-2
    loc: "§117 / mdx line 1958"
    claim_ru: "Класс I (самый многочисленный): корень в ступени guṇa."
    kind: statistic
    falsifiable_as: "is present-class I (thematic a-class, guṇa-grade) actually the largest verb class by token frequency in DCS"
    sources: [dcs]
    verdict_fact: TRUE
    number: "class I = 237,100 tokens (30.34% of 781,541 present-system tokens) — more than double the next-largest class (class II, 154,301, 19.74%) — VisualDCS/verb_classes.json"
    ref: "DCS-2021 verb_classes.json"
    verdict_pedagogy: JUSTIFIED
    note: "Not a close call — class I outnumbers every other class by a wide margin, confirming the parenthetical without qualification."

  - id: OCH-3
    loc: "§149 / mdx line 2370"
    claim_ru: >-
      В med. (который в послеведийский период почти не встречается) основа прекатива равна
      основе med. аориста 4 или 5 + ī.
    kind: statistic
    falsifiable_as: "is the middle-voice precative genuinely almost absent from post-Vedic Sanskrit in DCS token counts"
    sources: [dcs]
    verdict_fact: TRUE
    number: "221 tokens = 0.03% of 781,618 verbal tokens ('Benedictive Medium', DCS-2021 — reused verbatim from KocherginaUchebnik_1998/claims_dcs_stats.json HK39_precative_middle)"
    ref: "DCS-2021 timws.csv; cf. KocherginaUchebnik_1998 HK-39 (same figure, independently stated there as 'крайне редко')"
    verdict_pedagogy: JUSTIFIED
    note: "Second independent grammar making the identical, now-doubly-confirmed rarity claim about the same paradigm cell."

  - id: OCH-4
    loc: "§67 / mdx line 892"
    claim_ru: >-
      Закрытые корни, содержащие долгую гласную или дифтонг... неполноизменяемые. Исключения:
      полноизменяемые √çās приказывать (слабая ступень ciṣ) и корни группы √sīv шить.
    kind: universality
    falsifiable_as: "is çās genuinely a documented exception (fully-changing despite the long-vowel-closed-root pattern)"
    sources: [whitney]
    verdict_fact: TRUE
    number: "systemic: Whitney §639 documents çās as an irregular reduplicated-type root with a distinct weak-stem çiṣ- (matching Zaliznyak's ciṣ), confirming it is NOT a plain defective long-vowel root"
    ref: "WhitneyGrammar_1889/09_The_Present_System.mdx §639; cf. KnauerFrazy_1908/parse_audit.yml KN-3 (same root, same Whitney citation, confirmed independently from a completely different digitized source — a phrase-reader footnote, not a grammar's exception list)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      The same irregular root (çās) is flagged independently by Knauer's 1908 phrase-reader
      footnote (KN-3) and Zaliznyak's 1978 grammar's exception list, 70 years apart, in two
      completely different genres of source — a clean cross-corpus, cross-genre confirmation
      rather than a coincidence of citing the same textbook tradition.

  - id: OCH-5
    loc: "§165 / mdx line 2532"
    claim_ru: "Изредка встречается деепричастие на -am; ступень корня --- как в 3 sg act. перфекта. Пример: çrāvam."
    kind: statistic
    falsifiable_as: "is the -am absolutive genuinely rare in DCS relative to -tvā/-ya"
    sources: [dcs]
    verdict_fact: TRUE
    number: "-am absolutive = 0.4% of distinct absolutive forms, vs -ya 78.4% and -tvā 19.6% (reused verbatim from BuhlerLeitfaden_1923/claims.yml's absolutive-split metric)"
    ref: "DCS-2021 (BuhlerLeitfaden_1923/verify_claims_dcs.py); cf. BuhlerLeitfaden_1923 (same split, called 'очень редко' there vs 'изредка' here — both hedges hold up against the same 0.4% figure)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Three grammars, three framings of the same corpus fact: Kochergina doesn't mention the -am
      absolutive at all; Bühler calls it "очень редкая" (very rare); Zaliznyak calls it
      "изредка" (occasionally) — a slightly softer hedge than Bühler's, and if anything the more
      accurate one for a form that is rare but not vanishing (0.4%, not 0.04%).

  - id: OCH-6
    loc: "§116 / mdx line 1954"
    claim_ru: >-
      Тематические основы презенса у первичных глаголов обычно образуются непосредственно от
      корня с помощью элементов a или ya, реже aya, cha.
    kind: statistic
    falsifiable_as: "among thematic present-stem roots, is a/ya-suffixed formation actually the majority pattern versus the rarer aya/cha types, by token frequency"
    sources: [dcs]
    verdict_fact: TRUE
    number: >-
      a-suffix (classes I+VI combined): 347,284 tokens (44.44% of present-system tokens); ya-suffix
      (class IV): 98,321 (12.58%); aya-suffix (class X): 94,735 (12.12%) — VisualDCS/verb_classes.json
    ref: "DCS-2021 verb_classes.json"
    verdict_pedagogy: MISLEADING
    note: >-
      The ranking direction (a > ya > aya) holds, but the gap Zaliznyak implies between "обычно"
      (a/ya) and "реже" (aya) is thin where it matters most: ya (12.58%) and aya (12.12%) are
      only 0.46 percentage points apart — nowhere near as decisive a split as a-suffix's 44.44%
      dominance over both. A learner reading "реже" for aya next to "обычно" for ya would expect
      a much bigger gap than the corpus actually shows between those two specifically.

  - id: OCH-7
    loc: "§6 / mdx line 118"
    claim_ru: "Анунасика встречается почти исключительно в случаях, указанных в § 43, п. 2."
    kind: statistic
    falsifiable_as: "is anunāsika confined almost entirely to the final-n-before-l sandhi context"
    sources: [whitney]
    verdict_fact: TRUE
    number: "systemic: the nasalized-l outcome of final n + initial l (tāṁl lokān type) is the one living anunāsika context of the classical language; other uses are Vedic/orthographic"
    ref: "Whitney §206 (final n before l); cf. BuhlerLeitfaden_1923 harvest (Урок VI, same rule)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      'Почти исключительно' is the right hedge: the n+l junction is where classical anunāsika
      lives; residual uses are Vedic recitation practice, outside this corpus's scope.

  - id: OCH-8
    loc: "§7 / mdx line 130"
    claim_ru: >-
      В большинстве индийских школ санскрита ṛ, ṝ, ḷ принято читать соответственно как ri, rī,
      li (или lri); распространено также чтение ç как ṣ.
    kind: statistic
    falsifiable_as: "is the ri/rī/li recitation convention the majority practice across Indian schools"
    sources: [dcs]
    verdict_fact: UNTESTABLE
    number: "no instrument: a sociophonetic census of recitation schools is outside every ground-truth source of this pipeline (DCS is a text corpus; Whitney describes the same convention qualitatively)"
    ref: "cf. Whitney §24 (the ri-pronunciation acknowledged as the modern practice)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      The convention itself is well attested in the descriptive literature (Whitney reports it
      too); only the quantifier 'в большинстве школ' has no measurable base here. Same honesty
      class as Kochergina's HK-41/HK-42.

  - id: OCH-9
    loc: "§18 footnote 2 / mdx line 312"
    claim_ru: "l в конце слова и фразы теоретически возможно, но практически почти не встречается."
    kind: statistic
    falsifiable_as: "is word-final l vanishingly rare in running text"
    sources: [dcs]
    verdict_fact: TRUE
    number: "838 word-final l tokens of 3,402,414 word tokens = 0.025% (DCS-2021 surface text; verify_claims_dcs.py OCH_final_consonant_census)"
    ref: "DCS-2021 0.csv final-consonant census"
    verdict_pedagogy: JUSTIFIED
    mg_footnote: >-
      Перепись конечных согласных по DCS-2021 (3,4 млн словоупотреблений): конечное l — 838
      случаев, 0,025 % слов. «Практически почти не встречается» подтверждено числом.
    note: >-
      A theoretically-possible-but-nearly-absent claim now carrying its corpus number — the
      exact kind of footnote-grade precision Zaliznyak's own text models.

  - id: OCH-10
    loc: "§19 footnote 3 / mdx line 329-334"
    claim_ru: >-
      Носовая ṇ перед паузой или гласной, начинающей следующее слово, встречается 'крайне
      редко'; носовые n̄, ñ перед согласной, начинающей следующее слово, встречаются 'редко'.
    kind: statistic
    falsifiable_as: "are word-final ṇ / ṅ / ñ genuinely rare relative to the common finals n / m / anusvāra"
    sources: [dcs]
    verdict_fact: TRUE
    number: "word-final counts (DCS-2021, 3.4M word tokens): ṇ 118 · ṅ 659 · ñ 1,934 — vs n 83,091 · m 249,461 · ṁ 532,979"
    ref: "DCS-2021 0.csv final-consonant census (verify_claims_dcs.py)"
    verdict_pedagogy: JUSTIFIED
    mg_footnote: >-
      Конечные носовые по DCS-2021: ṇ — 118, ṅ — 659, ñ — 1 934 словоупотребления против n —
      83 091, m — 249 461, анусвара — 532 979. Двухступенчатая градация Зализняка («крайне
      редко» для ṇ против «редко» для ṅ/ñ) видна прямо в числах: ṇ на порядок реже ṅ/ñ.
    note: >-
      Even the fine two-level hedge is confirmed: ṇ (118) is an order of magnitude rarer than
      ṅ/ñ (659/1,934), exactly matching 'крайне редко' vs plain 'редко'.

  - id: OCH-11
    loc: "§43 п.1 / mdx line 612"
    claim_ru: >-
      Факультативный переход k, ṭ, t, p перед носовой в носовую соответствующего ряда: 'наиболее
      обычен такой переход для t', например tat nāma → tan nāma (реже tad nāma).
    kind: statistic
    falsifiable_as: "is the pre-nasal nasalization most commonly seen for final t among the four stops"
    sources: [dcs, whitney]
    verdict_fact: TRUE
    number: "final-stop census (DCS-2021): t 99,262 word-final tokens vs k 4,100 · ṭ 1,088 · p 113 — the t-junction is 24× the next stop's, so its nasal variant is by far the most-encountered one"
    ref: "DCS-2021 0.csv final-consonant census; Whitney §§161, 198 (optional t→n before nasals)"
    verdict_pedagogy: JUSTIFIED
    mg_footnote: >-
      Частотность конечных смычных по DCS-2021: t — 99 262, k — 4 100, ṭ — 1 088, p — 113.
      «Наиболее обычен для t» держится уже на входной частоте: стыков с конечным t в 24 раза
      больше, чем со всеми прочими смычными вместе взятыми.
    note: >-
      The claim is about the observed commonness of the t-variant; the input-frequency census
      settles the direction without needing junction-level sandhi tagging.

  - id: OCH-12
    loc: "§43 п.1 / mdx line 614"
    claim_ru: "h после k, ṭ, t, p может переходить (и обычно переходит) соответственно в gh, ḍh, dh, bh, например tat hi → tad dhi (реже tad hi)."
    kind: statistic
    falsifiable_as: "is the aspirate outcome (tad dhi) the usual variant over retained h (tad hi)"
