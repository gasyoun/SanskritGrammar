  - id: OCH-47
    loc: "§167 / mdx line 2546"
    claim_ru: >-
      Ряд корней (многие на am, значительная часть корней seṭ на ar, al, an и некоторые другие)
      вместо ступени vṛddhi или наряду с ней имеют guṇa в каузативе (в раннем языке таких
      отступлений больше, чем в позднем).
    kind: statistic
    falsifiable_as: "is the guṇa-for-vṛddhi causative deviation more common in the earlier language"
    sources: [dcs]
    verdict_fact: TRUE
    number: >-
      MEASURED with the causative detector built 16-07-2026 (causative_grade_detector.py,
      H1001): DCS lemmatizes causatives as their own -ay lemmas, so grade pairs (gamay~gāmay,
      smaray~smāray) are detected at lemma level, anchored on the root lemma existing in the
      same DB (screens denominatives), and sliced by the H1000 period map. 150 anchored pairs,
      57 fluctuating (both grades attested). The guṇa share FALLS exactly as §167 predicts —
      all pairs: 45.8% (веды) → 20.9% (эпос) → 15.4% (классика); fluctuating pairs, where the
      choice is actually visible: 81.3% → 25.9% → 20.8% — a fourfold collapse. Both directions
      monotonic; the purāṇa control again sits at epic level (26.3%). Synchronic membership
      confirmed en passant: gam/jan/tvar are guṇa-fixed (Whitney §1042's set), kṛ/mṛ/dhṛ
      vṛddhi-fixed, exactly as the § describes
    ref: "ZalizniakOcherk_1978/och47_causative_stats.json (per-root × period inventory + validation); causative_grade_detector.py"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Closed by the two-instrument chain the register itself specified: H1000's period map
      plus this pass's causative detector. The measured contrast is stark enough that the §'s
      cautious parenthesis («в раннем языке таких отступлений больше») reads as understatement:
      in the Vedic slice the 'deviation' was the MAJORITY option (81%) among fluctuating roots.
      Detector caveat kept honest: -ay lemmas conflate causative and class-10/denominative
      morphology; root-anchoring screens most denominatives, and grade CONTRAST within one
      root is causative territory regardless.

