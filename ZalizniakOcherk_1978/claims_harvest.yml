# Companion to claims.yml (the curated, VERIFIED register). Full-text harvest (H797 Phase 2,
# 15-07-2026): 74 falsifiable grammatical assertions swept from the 3128-line "Очерк грамматики
# санскрита" (1978) by 4 parallel readers (§§1-230+, phonology through syntax/Vedic accent). 6
# were verifiable now against ground truth already in hand (mostly REUSED from Kochergina/
# Bühler/Knauer's existing corpus work rather than freshly computed) and promoted to claims.yml
# as OCH-1..OCH-6; these 68 remain PENDING.
