# Yield note: this text is markedly denser in falsifiable claims than Bühler's per line (74
# candidates over ~3128 lines here vs. 45 over ~11,913 lines there — roughly 4x the density),
# consistent with "Очерк" (essay/outline) being a compressed, technical register rather than a
# narrative textbook with worked exercises. Density is uneven: phonology/root-structure sections
# (§§1-80) and the word-formation/syntax/accent sections (§§157-230) are richer than the pronoun/
# numeral declension stretch.
#
# zaliznyak_gives_number: true  = he states a quantity/count directly (verify it)
#                         false = he gives only a qualitative hedge (verify via ranking/share,
#                                 or add an M.G. footnote where computable)
#
# Several entries here are UNUSUALLY HIGH-VALUE targets for the next pass:
# - §68 (aniṭ/seṭ correlating with alternation-series membership) would generalise the
#   already-confirmed seṭ/aniṭ future-stem finding (Kochergina HK-4, Bühler HB-59) into a
#   structural prediction rather than a raw frequency count — needs per-root alternation-series
#   tagging, not yet built.
# - §207 (a flagship Vedic→Classical diachronic syntactic-style shift: word-combination/finite-
#   verb/active giving way to compound/nominal/passive) would need DCS period-tagged data:
#   check whether VisualDCS's underlying export carries a Vedic/Epic/Classical period field
#   before assuming this is untestable.
# - §185 (comparative -īyaṁs-/-iṣṭha- as the minority allomorph) is the SAME claim already
#   sitting unverified in BuhlerLeitfaden_1923/claims_harvest.yml (mdx line 4585) — two
#   independent grammars making an identical, still-unverified claim. Worth verifying once,
#   promoting to BOTH books' registers.

