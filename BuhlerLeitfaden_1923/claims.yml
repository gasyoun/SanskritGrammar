      Имена муж. и женск. р. на an, man и van имеют две формы и в сильных пад. образуют ān, mān и vān. В N. sg. n всегда отпадает. ... Звук a в словах на an всегда отпадает перед вокальными окончаниями, за искл. L.sg., где он по желанию может быть сохранен. Имена на man и van сохраняют a, если этим суффиксам предшествует согласный.
