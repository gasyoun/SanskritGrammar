    verdict_fact: TRUE
    number: >-
      systemic: middle endings serve the passive outside the present system; dāyiṣyate/dāyiṣīṣṭa-type ciṇvad options for vowel-final roots and grah/dṛś/han (Pāṇini 6.4.62 extends to sya/sīyut/tāsi)
    ref: "Whitney §1049; Pāṇini 6.4.62"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Same ciṇvad doctrine as the previous entry, extended by the sutra itself to the future, conditional and precative.

  - id: HB-394
    loc: "Урок XLVIII / mdx line 7207"
    claim_ru: "корневые a, ṛ и ṝ замещаются посредством i. ... Но между удвоенными согласными всегда вставляется i."
    kind: universality
    falsifiable_as: "Desiderative reduplication vowel is i for root a/r/rr (pipaksati, cikirsati), and vowel-initial roots always insert i between doubled consonants (Whitney 1029)"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: pipakṣati (a→i), cikīrṣati (ṛ→i); vowel-initial desideratives insert i between the doubled consonants — arciciṣati, īcikṣiṣate (Bühler's own examples at mdx 7271-7273)
    ref: "Whitney §1029; cf. OCH-49/OCH-50/HB-62 (desiderative)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      The abbreviated desideratives (īpsati, dhitsati) Bühler lists separately as irregulars have no doubled consonant, so they do not touch the 'always i' clause, which holds where doubling occurs.

  - id: HB-395
    loc: "Урок XLVIII / mdx line 7209"
    claim_ru: >-
      Суффикс sa [ṣa] присоединяется непосредственно к большинству корней с исходом на гласный ... Конечные i и u удлинняются, ṛ и ṝ изменяются в īr или, если предшествует губной — в ūr.
    kind: allomorphy
    falsifiable_as: "Desiderative sa attaches directly to most vowel-final roots; final i/u lengthen (ninisati, susrusate), r/rr→ir or ur after labials (cikirsati, mumursati; Whitney 1028-1030)"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: ninīṣati, śuśrūṣate (i/u lengthened); cikīrṣati (ṛ→īr), mumūrṣati (ūr after labial)
    ref: "Whitney §§1028-1030; cf. OCH-14 (ṝ→īr/ūr), OCH-49/OCH-50/HB-62 (desiderative)"
    verdict_pedagogy: JUSTIFIED
