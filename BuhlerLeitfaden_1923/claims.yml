    falsifiable_as: "h-stem finals split by root: dah/duh/uṣṇih → k/g (kāmadhuk), druh-type → ṭ/ḍ or k/g (mitradhruṭ or mitradhruk), nah → t/d (upānat, upānadbhyām)"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: the Pāṇinian h-split — dah/duh/uṣṇih revert to the velar series (kāṣṭhadhak, kāmadhuk); druh/muh/snih/snuh optionally retroflex or velar (mitradhruṭ~mitradhruk, Pāṇini 8.2.33); nah gives dental via dh (upānat, upānadbhyām, 8.2.34)
    ref: "Whitney 1889 (h-final stems)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Three-way split exactly as in the reference grammars.

  - id: HB-163
    loc: "Урок XXI / mdx line 2771"
    claim_ru: >-
      После k, r и l суффиксальный s, за которым следуются гласные, дифтонги, n, m y или v, превращается в ṣ, напр. vāk + su > vākṣu; gir + su = gīrṣu.
    kind: rule
    falsifiable_as: "Ruki-type retroflexion of suffixal s after k, r, l before vowels/n/m/y/v (vākṣu, gīrṣu); unretracted *vāksu would refute"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: ruki retroflexion of ending-initial s after k and r when a vowel/nasal/semivowel follows (vākṣu, dikṣu, gīrṣu, pūrṣu); the inclusion of l matches the Pāṇinian trigger class (iṇ-koḥ covers l), though l-final stems barely occur
    ref: "Whitney 1889 (retroflexion of s); cf. HB-7 (ruki)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      The following-context condition (vowel/nasal/semivowel) is the standard blocking statement; no counterexample exists.

  - id: HB-164
    loc: "Урок XXII / mdx line 2863"
    claim_ru: >-
