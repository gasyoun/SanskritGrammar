    number: >-
      systemic: thematic a is lengthened before the m/v of the 1st-person endings — bhavāmi, bhavāvaḥ, bhavāmaḥ vs. bhavasi, bhavati
    ref: "Whitney §733a (thematic a before m/v endings)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      The ā-forms are exactly the endings beginning with m or v, which in the indicative are the three 1st persons; the rule as scoped is exceptionless.

  - id: HB-66
    loc: "Урок I / mdx line 147"
    claim_ru: >-
