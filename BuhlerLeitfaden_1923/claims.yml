      Некоторые глаголы принимают и na и ta, напр. ghrā пахнуть, ghrāta или ghrāṇa; trai защищать, trāta или trāṇa; tvar спешить, tūrṇa или tvarita; vid находить, приобретать, vinna или vitta.
    kind: allomorphy
    falsifiable_as: "Doublet participles ghrāta/ghrāṇa, trāta/trāṇa, tūrṇa/tvarita, vinna/vitta are all attested — DCS should show both members for each root"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: all four doublet pairs are standard in the reference grammars and lexica (ghrāta/ghrāṇa, trāta/trāṇa, tūrṇa/tvarita, vinna/vitta for vid 'find')
    ref: "Whitney §957 (na-participle doublets)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      'Некоторые... принимают и na и ta' is a possibility claim about doublets, and every listed member is a recognized form; per-member corpus frequency was not needed to adjudicate it.

  - id: HB-208
    loc: "Урок XXVIII / mdx line 3737"
    claim_ru: >-
      Непосредственно он присоединяется почти ко всем корням, оканчивающимся на гласный и не образующим этой формы через na
    kind: statistic
    falsifiable_as: "Share of vowel-final non-na roots taking ta directly (jñāta, jita, nīta, stuta, bhūta, kṛta) vs. with i — Whitney's root list gives the ratio behind 'almost all'"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: direct ta is the overwhelming norm for vowel-final roots (jñāta, jita, nīta, stuta, bhūta, kṛta); iṭ-taking vowel roots (śī → śayita type) are a small residue that Bühler's own irregular list at mdx 3741-3759 flags
    ref: "Whitney 1889 (ppp of vowel-final roots, aniṭ norm)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      'Почти ко всем' is the correct hedge: the exceptions are few and the book itself immediately enumerates the irregular members (gīta, datta, hita, pīta, mita, śayita, sita, sthita, hūta).

  - id: HB-209
    loc: "Урок XXVIII / mdx line 3761"
    claim_ru: >-
      После приставок, оканчивающихся на гласный, d иногда выпускается, напр. pradatta или pratta, nidatta или nītta, anudatta или anūtta.
    kind: statistic
    falsifiable_as: "Contracted forms pratta/nītta/anūtta coexist with pradatta/nidatta/anudatta after vowel-final preverbs — both variants attestable in corpus (Whitney 1087e)"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: the contracted -tta participles of dā after vowel-final preverbs (pratta, avatta, nītta, parītta, anūtta — with lengthening of the preverb vowel) are sanctioned alongside the full -datta forms (Pāṇini 7.4.47 sphere)
    ref: "Whitney 1889 (contracted -tta forms of dā); Pāṇini 7.4.47"
    verdict_pedagogy: JUSTIFIED
    note: >-
      'Иногда' correctly marks the alternation as optional; the printed lengthenings (nītta, anūtta) are the regular ones.

  - id: HB-210
    loc: "Урок XXVIII / mdx line 3763"
    claim_ru: >-
      Непосредственно он присоединяется ко многим корням первых девяти классов с краткими внутренними гласными, оканчивающимися на простые t, p, s, c, j, ś, ṣ, dh, bh, h, m, ṇ и n, а также к таким, которые оканчиваются на сочетания, образованные при помощи носовых (ndh, mbh, ṅs), но теряют носовой в praes. pass.
    kind: allomorphy
    falsifiable_as: "Roots of classes I-IX with short interior vowel ending in the listed consonants take ta directly (vṛtta, kṣipta, upta, śasta); nasal-losing roots drop the nasal — distribution checkable in Whitney 954-956"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: the aniṭ core of the verb system — vṛtta, kṣipta, upta, śasta (śaṅs with nasal loss as in śasyate) — is exactly the short-vowel, single-final-consonant, non-class-X profile Bühler describes
    ref: "Whitney 1889 (direct -ta attachment, §§954-956 territory)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Hedged with 'ко многим', and the nasal-cluster clause correctly ties ppp nasal loss to the same roots' passive-stem behavior.

  - id: HB-211
    loc: "Урок XXVIII / mdx line 3765"
    claim_ru: >-
      После следующих, довольно употребительных корней на t, p и s вставляется i: dyut сиять, pat падать, krudh гневаться, lap говорить, vas жить, uṣita; śvas дышать, has смеяться.
    kind: allomorphy
    falsifiable_as: "dyutita, patita, lapita, uṣita, śvasita, hasita are the attested participles (with i) of these roots — each form corpus-checkable"
    sources: [whitney]
    verdict_fact: FALSE
    number: >-
      systemic: krudh forms kruddha, not *krudhita — and krudh ends in dh, violating the note's own 't, p и s' scope; the other six members (dyutita, patita, lapita, uṣita, śvasita, hasita) are correct
    ref: "Whitney 1889 (seṭ ppp of t/p/s-final roots); kruddha per Whitney's Roots"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Errata: 'krudh гневаться' is almost certainly a corruption of kup гневаться (kupita) — kup fits the gloss, the p-final scope, and the seṭ behavior, while krudh as printed both breaks the list's scope and implies a nonexistent form against universal kruddha. FALSE as printed per the HB-60 misprint precedent.

  - id: HB-212
    loc: "Урок XXVIII / mdx line 3769"
    claim_ru: "Конечные c и j превращаются в k, напр. vac, ukta; sic, sikta; yuj, yukta, tyaj, tyakta"
    kind: allomorphy
    falsifiable_as: "Root-final c/j regularly yield k before ta (ukta, sikta, yukta, tyakta) — Whitney 217; exceptions countable"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: reversion of palatal c/j to guttural k before ta is the regular treatment (ukta with samprasāraṇa, sikta, yukta, tyakta); the ṣṭa-taking j-roots (sṛj, mṛj, yaj) are handled separately by the book at mdx 3787
    ref: "Whitney §217"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Standard reversion rule, correctly exemplified; the second-palatal (ṣ-yielding) class is not hidden but given its own paragraph.

  - id: HB-213
    loc: "Урок XXVIII / mdx line 3779"
    claim_ru: >-
      Следующие довольно употребительные корни на c и j имеют i: uc быть подходящим, ucita; ruc нравиться, rucita; vraj идти, vrajita.
    kind: allomorphy
    falsifiable_as: "ucita, rucita, vrajita (set participles) are the attested forms for uc, ruc, vraj — no *ukta-type variants expected in corpus"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: ucita, rucita, vrajita are the standard (and sole) participles of these roots — all three are common lexicalized items
    ref: "Whitney 1889 (seṭ ppp of c/j-final roots)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      All three forms uncontroversial; ucita and rucita are even frozen as adjectives.

  - id: HB-214
    loc: "Урок XXVIII / mdx line 3787"
    claim_ru: >-
      Конечный ś превращается в ṣ, после которого, как и после коренного ṣ, вместо t появляется ṭ, напр. dṛś, dṛṣṭa; daṅś, daṣṭa; dviṣ, dviṣṭa ... Подобным образом образуется от pṛch, pṛṣṭa; yaj, iṣṭa; sṛj, sṛṣṭa, mṛj, mṛṣṭa; śās, śiṣṭa.
    kind: allomorphy
    falsifiable_as: "Root-final ś → ṣ with ta → ṭa (dṛṣṭa, daṣṭa, dviṣṭa) and analogous pṛṣṭa, iṣṭa, sṛṣṭa, mṛṣṭa, śiṣṭa — Whitney 218, 226; forms attestable"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: ś→ṣ with retroflexion of the following t (dṛṣṭa, daṣṭa with nasal loss, dviṣṭa) and the parallel ṣṭa-forms pṛṣṭa, iṣṭa (yaj with samprasāraṇa), sṛṣṭa, mṛṣṭa, śiṣṭa are all the received forms
    ref: "Whitney 1889 (ś/ṣ-final ppp in -ṣṭa)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Every cited form is standard; the extension to pṛch/yaj/sṛj/mṛj/śās correctly groups the second-palatal and analogical cases.

  - id: HB-215
    loc: "Урок XXVIII / mdx line 3789"
    claim_ru: "Следующие довольно употребит. корни на ṣ принимают i: tṛṣ жаждать, muṣ красть, mṛṣ терпеть marṣita."
    kind: allomorphy
    falsifiable_as: "tṛṣita, muṣita, marṣita are the attested set participles of tṛṣ, muṣ, mṛṣ — corpus-checkable"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: tṛṣita, muṣita, marṣita (with guṇa) are the standard seṭ participles of these three ṣ-final roots
    ref: "Whitney 1889 (seṭ ppp of ṣ-final roots)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      All three forms as in the reference grammars and Whitney's Roots.

  - id: HB-216
    loc: "Урок XXVIII / mdx line 3797"
    claim_ru: >-
      Конечные dh и bh превращаются в d и b, а следующий за ними t - в dh, напр. vṛdh, vṛddha; bandh, baddha; labh, labdha.
    kind: allomorphy
    falsifiable_as: "dh/bh-final roots show Bartholomae-type ddha/bdha participles (vṛddha, baddha, labdha) — Whitney 160; exceptions countable"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: the sonant-aspirate + t → (d)dha/(b)dha treatment (Bartholomae) is the regular rule — vṛddha, baddha (with nasal loss), labdha
    ref: "Whitney §160"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Regular phonology with no classical exception class among direct-ta roots; the seṭ takers (like the book's earlier krudh-slot roots) escape by inserting i, not by violating the rule.

  - id: HB-217
    loc: "Урок XXVIII / mdx line 3805"
    claim_ru: >-
      Конечный h сливается с t в ḍh, перед которым краткие гласные, за исключением ṛ, удлиняются, напр. gāh погружать, gāḍha; guh, gūḍha; lih, līḍha; vah, ūḍha; но dṛh укреплять, dṛḍha крепкий
    kind: allomorphy
    falsifiable_as: "h+ta → ḍha with lengthening of short vowels except ṛ (gūḍha, līḍha, ūḍha vs. dṛḍha) — Whitney 222-224; forms attestable"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: gāḍha, gūḍha, līḍha, ūḍha (vah with samprasāraṇa) with compensatory lengthening blocked for ṛ (dṛḍha) is the regular ḍha-treatment of h-final roots
    ref: "Whitney §§222-224"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Not overstated in context: the competing gdha-class (dagdha, digdha, dugdha, drugdha/drūḍha, mugdha/mūḍha, snigdha, naddha, soḍha) is listed by the book itself as irregular immediately below (mdx 3823-3839), so the rule is properly scoped on the page.

  - id: HB-218
    loc: "Урок XXVIII / mdx line 3841"
    claim_ru: >-
      Конечный m большей частью превращается в n, причем удлиняется предшествующий гласный, напр. kam любить — kānta; kram, krānta; dam, dānta; но gam, gata; nam, nata; yam укрощать yata; ram, rata.
    kind: statistic
    falsifiable_as: "Proportion of m-final roots with -ānta participles (kānta, krānta, dānta) vs. zero-grade -ata (gata, nata, yata, rata) — Whitney 955a; ratio verifies 'большей частью'"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: the lengthened -ānta type covers most common m-roots (kānta, krānta, dānta, śānta, bhrānta, śrānta, kṣānta, vānta) against the closed weak-grade four gata, nata, yata, rata — 'большей частью' states the majority correctly and the minority is enumerated in the same sentence
    ref: "Whitney 1889 (ppp of am-roots)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Direction-of-hedge claim (guide rule 7): the -ānta pattern is indeed the larger class by root count, and the four exceptions are exactly the standard ones.

  - id: HB-219
    loc: "Урок XXVIII / mdx line 3857"
    claim_ru: >-
      Самые обычные глаголы на n и ṇ — следующие: khan, khāta; jan, jāta; tan растягивать, tata; man, mata; sam давать, sata; kṣaṇ повреждать, kṣata.
    kind: statistic
    falsifiable_as: "n/ṇ-final roots lose the nasal in ppp (khāta, jāta, tata, mata, sata, kṣata) and these are the most frequent such roots — forms and frequency corpus-checkable"
    sources: [whitney]
    verdict_fact: FALSE
    number: >-
      systemic: the fifth pair as printed, 'sam давать, sata', is corrupt — the root is san (Dhātupāṭha ṣaṇu dāne, matching the gloss 'давать') and its participle is sāta with lengthening (Pāṇini 6.4.42 janasanakhanām, parallel to jāta/khāta printed correctly beside it); 'sam' also violates the section's own 'глаголы на n и ṇ' scope
    ref: "Whitney 1889 (ppp of n-final roots); Pāṇini 6.4.42"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Errata: read 'san (ṣaṇ), sāta'. The other five pairs (khāta, jāta, tata, mata, kṣata) are the standard nasal-loss participles; graded FALSE as printed per the HB-60 misprint precedent since the corrupt member contradicts the section's stated scope.

  - id: HB-220
    loc: "Урок XXVIII / mdx line 3871"
    claim_ru: >-
      Соединит, гласный i присоединяется ко всем глаголам X класса и каузативам, трактуемым как в praes. pass., ко всем отыменным и прочим производным формам корня, а также к большинству простых корней на простой k (кроме śak быть в состоянии), kh, g, gh, ch, язычные, th, ph, l, v и группы согласных
    kind: universality
    falsifiable_as: "All class-X verbs, causatives, and denominatives take -ita (corita, mārita); most roots in k/kh/g/gh/ch/retroflex/th/ph/l/v/clusters take i (likhita, sevita, īkṣita) — śak (śakta) the stated exception; testable against root lists"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: -ita is exceptionless for class-X/causative/denominative stems (corita, tāḍita, mārita — aya dropped as in the passive); for the listed simple-root finals it is the majority pattern with śak → śakta the flagged exception and the v-root residue (dyūta etc.) listed by the book itself at mdx 3889
    ref: "Whitney 1889 (seṭ ppp; causative participles in -ita)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      The universal half (derived stems) genuinely has no exception class; the 'большинству' half is hedged and its exceptions are printed as the very next footnote.

  - id: HB-221
    loc: "Урок XXVIII / mdx line 3889"
    claim_ru: >-
      Исключения: div играть (за деньги), dyūta; ṣṭhīv плевать — ṣṭhyūta; siv шить — syūta; takṣ плотничать — taṣṭa; bhrajj поджаривать — bhṛṣṭa.
    kind: allomorphy
    falsifiable_as: "dyūta, ṣṭhyūta, syūta, taṣṭa, bhṛṣṭa are the attested participles of these v-/cluster-final roots (against the general i-insertion rule) — corpus-checkable"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: dyūta (div), ṣṭhyūta (ṣṭhīv), syūta (siv) with ūṭh-treatment of root-final v, and taṣṭa, bhṛṣṭa for the cluster-final takṣ, bhrajj — all are the received forms in Whitney's Roots and the lexica
    ref: "Whitney 1889 (irregular aniṭ ppp of v- and cluster-final roots)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      A correct closed exception list to the immediately preceding i-insertion rule; dyūta is even lexicalized ('gambling').

  - id: HB-222
    loc: "Урок XXVIII / mdx line 3899"
    claim_ru: "grah схватывать принимает соединит гласный ī — gṛhīta."
    kind: rule
    falsifiable_as: "grah uniquely takes long ī union vowel: gṛhīta, never *gṛhita (Whitney 900b) — corpus orthography testable"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: grah takes long ī for its union vowel throughout the non-present system — gṛhīta, gṛhītvā, grahītum
    ref: "Whitney §900b"
    verdict_pedagogy: JUSTIFIED
    note: >-
      A famous idiosyncrasy of grah, stated exactly.

  - id: HB-223
    loc: "Урок XXVIII / mdx line 3901"
    claim_ru: >-
      Совершенно неправильны: kṣai истощать — kṣāma; kṛś худеть, kṛśa; pac, pakva; śuṣ, śuṣka; phul расцветать phulla.
    kind: rule
    falsifiable_as: "Irregular participles kṣāma, kṛśa, pakva, śuṣka, phulla function as ppp of these roots (Whitney 957-958) — attested usage confirms"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: kṣāma, kṛśa, pakva, śuṣka, phulla are the classic suppletive/nipātana participles (Pāṇini 8.2.51-55 sphere) and function adjectivally as the ppp of these roots
    ref: "Whitney §§957-958"
    verdict_pedagogy: JUSTIFIED
    note: >-
      The standard 'wholly irregular' list, matching the native grammarians' nipātana set.

  - id: HB-224
    loc: "Урок XXIX / mdx line 3989"
    claim_ru: >-
      tvā непосредственно приставляется большей частью в тех корнях, которые образуют причастия на ta и na без соед. гласного, причем корень принимает кратчайшую (слабейшую) форму
    kind: statistic
    falsifiable_as: "Roots forming aniṭ participles mostly form aniṭ gerunds in -tvā with weak root grade (jñātvā, uktvā, gatvā) — correlation between ppp and gerund iṭ-treatment measurable (Whitney 991)"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: gerund iṭ-treatment tracks the participle's — aniṭ ppp roots give aniṭ gerunds with the same weak root form (jñātvā, uktvā, gatvā, matvā); the residue of double-treatment roots is listed by the book itself at mdx 3993-4007
    ref: "Whitney §991; cf. HB-41, HB-42"
    verdict_pedagogy: JUSTIFIED
    note: >-
      'Большей частью' correctly hedges a strong but not exceptionless correlation, and the exceptions get their own list in the same paragraph.

  - id: HB-225
    loc: "Урок XXIX / mdx line 3991"
    claim_ru: >-
      У некоторых корней, однако, встречаются также формы с соединительным гласным, напр. vṛttvā или vartitvā, khātvā или khanitvā, kramitvā или krāntvā, devitvā или dyūtvā, damitvā или dāntvā, śamitvā или śāntvā, bhramitvā или bhrāntvā, śasitvā или śastvā.
    kind: allomorphy
    falsifiable_as: "Doublet gerunds (vṛttvā/vartitvā, krāntvā/kramitvā etc.) both attested for these roots — DCS should show both variants"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: these are the standard optional-iṭ (and optional-kit) gerund doublets of the Pāṇinian tradition — vṛt, khan, kram, div, dam, śam, bhram, śas all sanctioned with both members in the reference grammars
    ref: "Whitney §991 (variant -tvā gerunds)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      'Встречаются также' is a possibility claim about doublets; every listed member is a recognized form. Per-member corpus counts (the rarer members are certainly rare) were not needed to adjudicate the claim as framed.

  - id: HB-226
    loc: "Урок XXIX / mdx line 4009"
    claim_ru: >-
      Соединительный гласный i (ī) употребляется большей частью у тех же самых корней как и в pt. pf. p., и с корнем происходят часто те же изменения, что и в pt. ... Но способные к guṇa средние гласные принимают guṇa, а носовые часто сохраняются, напр. likhitvā или lekhitvā, sraṅsitvā, grathitvā или grantitvā.
    kind: statistic
    falsifiable_as: "Set gerunds pattern with set participles; medial vowels may take guṇa and nasals are often retained in -itvā gerunds (lekhitvā, sraṅsitvā) unlike ppp — variant distribution corpus-checkable (Whitney 991)"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: seṭ gerunds distribute over the same roots as seṭ participles (viditvā, uṣitvā, śayitvā, gṛhītvā); the -itvā gerund optionally shows guṇa (likhitvā/lekhitvā) and retains the nasal (sraṅsitvā vs srasta) — both divergences from the ppp are the received doctrine
    ref: "Whitney §991"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Hedges 'большей частью/часто' state directions, all correct. Errata: 'grantitvā' is a print/digitization slip for granthitvā (grath/granth).

  - id: HB-227
    loc: "Урок XXIX / mdx line 4009"
    claim_ru: "К глаголам X класса и каузативам всегда приставляется —ayitvā, напр. corayitvā, yojayitvā."
    kind: universality
    falsifiable_as: "Simple gerunds of class-X verbs and causatives always end in -ayitvā — zero attested exceptions expected (Whitney 1051)"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: the -tvā gerund of an aya-stem is invariably -ayitvā (corayitvā, yojayitvā, kathayitvā) — the aya is retained and iṭ obligatory; no exception class exists for uncompounded stems
    ref: "Whitney 1889 §1051 (gerunds of secondary conjugations)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Definitional for the stem class; the aya-dropping alternative exists only in the compound -ya gerund, which the book handles separately at mdx 4025.

  - id: HB-228
    loc: "Урок XXIX / mdx line 4013"
    claim_ru: >-
      Корни на e, ai, ā имеют ā; корни на ṛ, корни, в середине которых находится носовой и корни, перечисленные в X, 2 б, трактуются как в praes. pass., напр. pradhyāya, vikīrya, prapūrya, nibadhya, procya, āhūya, pragṛhya, saṃpṛcchya.
    kind: allomorphy
    falsifiable_as: "In -ya gerunds e/ai-final roots show ā (pradhyāya) and ṛ/nasal/samprasāraṇa roots show passive-stem treatment (vikīrya, nibadhya, procya) — attested forms confirm"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: the -ya gerund takes the same root shape as the ya-passive — ā for e/ai/ā roots (pradhyāya), īr/ūr for ṝ (vikīrya, prapūrya), nasal loss (nibadhya), samprasāraṇa (procya, pragṛhya, saṃpṛcchya, āhūya)
    ref: "Whitney §992; cf. OCH-5"
    verdict_pedagogy: JUSTIFIED
    note: >-
      The passive-stem equation is the standard and pedagogically efficient generalization; every example is a common attested form.

  - id: HB-229
    loc: "Урок XXIX / mdx line 4015"
    claim_ru: >-
      Неправильны между прочим: gam, nam и ram, обазующие напр.: avagamya или avagatya, praṇamya или praṇatya, viramya или viratya
    kind: allomorphy
    falsifiable_as: "gam/nam/ram show doublet gerunds -gamya/-gatya, -namya/-natya, -ramya/-ratya — both variants attestable in corpus (Whitney 992)"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: optional nasal loss before lyap (Pāṇini 6.4.38 vā lyapi) gives exactly these doublets — avagamya/avagatya, praṇamya/praṇatya, viramya/viratya, both members sanctioned and in use
    ref: "Whitney §992; Pāṇini 6.4.38"
    verdict_pedagogy: JUSTIFIED
    note: >-
      The optionality for gam/nam/ram (against fixed treatment elsewhere) is the received doctrine; praṇamya shows the regular ṇ after pra.

  - id: HB-230
    loc: "Урок XXIX / mdx line 4023"
    claim_ru: "а также tan, man и han, образующие только [vi]tatya, [ava]matya, [pra]hatya."
    kind: universality
    falsifiable_as: "tan/man/han form compound gerunds only in -tatya/-matya/-hatya; forms like *vitanya/*prahanya should be unattested"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: in classical usage the compound gerunds of tan/man/han are the nasal-less short-vowel forms — vitatya, avamatya, nihatya/prahatya; nasal-retaining *-tanya/*-manya/*-hanya are not part of standard usage
