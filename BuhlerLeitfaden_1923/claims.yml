    ref: "Whitney §§421-425"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Matches Whitney's neuter an-stem statement point for point; Bühler's own table at mdx 3139ff. prints the optional forms.

  - id: HB-181
    loc: "Урок XXIV / mdx line 3175"
    claim_ru: >-
      Конечные k, ṭ и p остаются перед начальными глухими согласными; перед звонкими они превращаются в g, ḍ, b, а перед носовыми могут остаться звонкими или перейти в носовые.
