  - id: HB-372
    loc: "Урок XLV / mdx line 7005"
    claim_ru: >-
      Начинающиеся с гласного корни удваивают конечный гласный, если они оканчиваются на один согласный или на группу, начинающуюся с r или n. При других сочетаниях удваивается большей частью первый согласный. Между согласными основы и удвоения вставляется i, очень редко a
