  - id: HB-231
    loc: "Урок XXIX / mdx line 4025"
    claim_ru: >-
      Глаголы X класса и каузативы трактуются как в praes. pass., за исключением тех корней, в которых краткий a является предпоследним звуком слога, предшествующего сочетанию aya. В последнем случае приставляется ayya, напр. pracorya, pratāḍya, ānāyya, но avagaṇayya, avagamayya.
    kind: allomorphy
    falsifiable_as: "Compound gerunds of class-X/causatives drop aya (pracorya) except when short penult a precedes aya, where -ayya appears (avagaṇayya, avagamayya) — Whitney 1051c; attested distribution testable"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: Pāṇini 6.4.56 (lyapi laghupūrvāt) — the causative -ya gerund drops aya after a heavy syllable (pracorya, pratāḍya, ānāyya from ā-nāyaya-) but keeps -ayya after a light one (avagamayya, avagaṇayya); since causative stems are otherwise heavy, Bühler's 'short penult a' condition is extensionally identical to Pāṇini's laghu condition
    ref: "Whitney 1889 §1051 (causative compound gerunds); Pāṇini 6.4.56; cf. HB-26, HB-27"
    verdict_pedagogy: JUSTIFIED
    note: >-
      An elegant reformulation: the only light penults that survive causative stem-formation are short a before a single consonant (gamaya-, gaṇaya-, śamaya-), so the a-statement and the laghu-statement pick out the same class.

  - id: HB-232
    loc: "Урок XXIX / mdx line 4033"
