    number: >-
      systemic: uvāca/ūcuḥ/ūce, uvāha/ūhuḥ, iyāja/ījuḥ/īje — the samprasāraṇa-and-contraction pattern of exactly this root set is the standard doctrine
    ref: "Whitney §§784b, 794b; cf. HB-55"
    verdict_pedagogy: JUSTIFIED
    note: >-
      The six va-roots plus yaj are the classical list; the book's own uvacitha~uvaktha forms at mdx 6601 conform.

  - id: HB-345
    loc: "Урок XLIII / mdx line 6631"
    claim_ru: >-
      itha факультативно присоединяются к корням с a внутри, не имеющим i в infinit. Все другие должны иметь itha
    kind: universality
    falsifiable_as: "2sg -itha is optional only for anit roots with internal a; all other roots of this class require -itha (Whitney 797d)"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: pecitha~papaktha (aniṭ-infinitive paktum) vs. obligatory -itha elsewhere (tenitha) — the standard 2sg option for medial-a roots
    ref: "Whitney §797d"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Consistent with the book's own paradigm at mdx 6591 (pecitha, papaktha) and with the infinitive diagnostic used at mdx 6453/6473.

  - id: HB-346
    loc: "Урок XLIII / mdx line 6633"
    claim_ru: >-
      Корни на ā, e, ai и au в 1 л. и Зл. sing. Par. оканчиваются на au и теряют гласный перед вокальными окончаниями. Соединительный гласный необходим всюду, за исключением 2 л. sing. Par., где он факультативен
    kind: allomorphy
    falsifiable_as: "ā-final roots take -au in 1/3sg perfect (dadau) and lose the vowel before vocalic endings; i obligatory except optional in 2sg (dadhitha/dadhātha; Whitney 800)"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: dadau, jagau (1/3sg -au), daduḥ, dadire (vowel lost before vocalic endings), dadima with i, and 2sg dadātha~daditha — the standard ā-root perfect
    ref: "Whitney §800"
    verdict_pedagogy: JUSTIFIED
    note: >-
      e/ai/au-final roots inflect as ā-roots (gai→jagau), so the grouping is correct.

  - id: HB-347
    loc: "Урок XLIII / mdx line 6657"
    claim_ru: >-
      Неполный перфект, со значением настоящего времени, образуется от ah говорить, 2 л. par. āttha; āhathuḥ; 3 л. par. āha, āhatuḥ, āhuḥ
    kind: rule
    falsifiable_as: "ah has only a defective perfect (5 forms) with present meaning (Whitney 801a); DCS should show only these persons attested"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: āha, āhatuḥ, āhuḥ, āttha, āhathuḥ — exactly the five classical forms of the defective perfect-present ah 'says'
    ref: "Whitney §801a"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Both the defectiveness and the present value are the reference doctrine; āha is high-frequency in narrative prose.

  - id: HB-348
    loc: "Урок XLIII / mdx line 6675"
    claim_ru: "факультативен наряду с удвоенным перфектом, между прочим для vid, bhī, hrī, bhṛ, jāgṛ, daridrā"
    kind: rule
    falsifiable_as: "vid, bhī, hrī, bhṛ, jāgṛ, daridrā allow both reduplicated and periphrastic perfects (Whitney 1071c-1073); both types should be attested"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: the optional-periphrastic list matches Pāṇini 3.1.38-39 (uṣa-vida-jāgṛ...; bhī-hrī-bhṛ-hu...) plus daridrā — vidāṃ cakāra beside viveda, bibhayāṃ cakāra beside bibhāya
    ref: "Whitney §§1071-1073; Pāṇini 3.1.38-39; cf. HB-56"
    verdict_pedagogy: JUSTIFIED
    note: >-
      «Между прочим» correctly signals the list is illustrative, not exhaustive (hu is also in the Pāṇinian set).

  - id: HB-349
    loc: "Урок XLIII / mdx line 6677"
    claim_ru: >-
      К корню присоединяется суффикс ām, в X кл. и для каузативов ayām, и к образованной таким образом форме прибавляется в Par. āsa, cakāra или babhūva, в Ātm. cakre
    kind: rule
    falsifiable_as: "Periphrastic perfect = stem in -ām + āsa/cakāra/babhūva (P.) or cakre (Ā.) (Whitney 1070-1073); auxiliaries outside this set refute"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: corayām āsa / gamayāṃ cakāra / īkṣāṃ cakre-type formations — the -ām (‑ayām for class X/causatives) stem plus the kṛ/as/bhū auxiliary set, with middle verbs taking cakre, is the standard formation rule
    ref: "Whitney §§1070-1073; cf. HB-56"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Formation and auxiliary inventory are grammar-exact; āsa is in practice the commonest classical auxiliary, which the ordering does not misrepresent.

  - id: HB-350
    loc: "Урок XLIII / mdx line 6699"
    claim_ru: >-
      Part. perf. Par. образуется посредством суффикса vas, f uṣī ..., присоединяемого к слабой основе. Если слабая основа перфекта односложна, то вставляется соединительный гласный i перед vas
    kind: allomorphy
    falsifiable_as: "Perfect active participle -vas/-usī attaches to weak stem, with i inserted when the weak stem is monosyllabic (pecivas vs bibhidvas; Whitney 802-803)"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: i appears exactly when the weak stem is monosyllabic — pecivas, tasthivas, jagmivas vs cakṛvas, bibhidvas
    ref: "Whitney §§802-803; cf. OCH-40 (perfect participle rarity)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Standard rule. vidvas (monosyllabic, no i) is a lexicalized non-reduplicated relic Whitney treats separately, not a counterexample to the reduplicated-stem rule.

  - id: HB-351
    loc: "Урок XLIII / mdx line 6723"
    claim_ru: >-
      Part. perf. Ātm. образуется посредством āna [āṇa], f. ā, приставляемого к той форме основы, которая появляется перед окончанием ire
    kind: rule
    falsifiable_as: "Perfect middle participle in -āna is built on the pre-ire stem (cakrāṇa, dadhāna; Whitney 806)"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: cakrire → cakrāṇa, dadhire → dadhāna — the -āna participle and 3pl -ire share the weak middle stem
    ref: "Whitney §806; cf. OCH-40 (perfect participle rarity)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Definitional formation rule; the pre-ire anchor is a sound pedagogical shortcut for the weak middle stem.

  - id: HB-352
    loc: "Урок XLIV / mdx line 6737"
    claim_ru: "Перед суффиксом tā с корнем происходят те же изменения, как и перед суфф. tum в inf."
    kind: rule
    falsifiable_as: "Root treatment (guna, it) before periphrastic-future -tā matches that before infinitive -tum (Whitney 943); mismatched it-behaviour between -tā and -tum forms refutes"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: kartā ~ kartum, bhavitā ~ bhavitum — the -tā (nomen agentis) stem shares guṇa and iṭ with the -tum infinitive
    ref: "Whitney §943; cf. HB-58/OCH-42 (periphrastic future rarity)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Both formations ride on the same -tar/-tu stem treatment; no divergent iṭ class exists.

  - id: HB-353
    loc: "Урок XLIV / mdx line 6761"
    claim_ru: >-
      конечные c, j, ś, ṣ, kṣ и h превращаются в k, после которого ... sya переходит в ṣya, конечные d и dh превращает в t, bh в p, m и n в anusvāra; конечный s — в t
    kind: allomorphy
    falsifiable_as: "Final-consonant sandhi before future -sya: palatals/ś/ṣ/h→k (+ṣya), d/dh→t, bh→p, m/n→anusvara, s→t (mokṣyati, bhetsyati, lapsyate, maṅsyate, vatsyati; Whitney 936)"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: vakṣyati, mokṣyati (c/ś/ṣ/h→k+ṣya), bhetsyati/bhotsyate (d/dh→t), lapsyate (bh→p), maṁsyate/haṁsyate (m/n→anusvāra), vatsyati (s→t)
    ref: "Whitney §936 territory (internal sandhi before -sya); s-future sandhi is the systemic Whitney §936 class"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Standard internal sandhi before s; each subcase is the regular ruki/deaspiration/assimilation outcome.

  - id: HB-354
    loc: "Урок XLIV / mdx line 6763"
    claim_ru: >-
      Соединительный гласный употребляется большей частью у тех же самых глаголов, у которых он встречается в infin. ... у корней на ṛ всегда вставляется i; у корней gam и han i вставляется в par; но vṛt, vṛdh и syand капать соединительного гласного в par. не имеют
    kind: allomorphy
    falsifiable_as: "Future it mostly follows infinitive it; r-final roots always take i (karisyati); gam/han take i in P.; vrt/vrdh/syand are anit in P. (Whitney 934-935)"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: kariṣyati (ṛ-final roots always seṭ); gamiṣyati, haniṣyati in P.; vartsyati, syantsyati aniṭ in P. — matching Whitney's iṭ lists
    ref: "Whitney §§934-935"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Hedged «большей частью» claims the direction of the seṭ/aniṭ correlation, which Whitney's lists confirm, with the named exception roots handled explicitly.

  - id: HB-355
    loc: "Урок XLIV / mdx line 6765"
    claim_ru: "В глаголах X кл. и каузативах приставляется ayiṣya"
    kind: rule
    falsifiable_as: "Class X and causatives form futures in -ayisya- (corayisyati; Whitney 1056); futures dropping -ay- would refute"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: corayiṣyati, kārayiṣyati — the -ay- of class X/causative stems is retained before -iṣya, uniformly seṭ
    ref: "Whitney §1056; cf. HB-26/HB-27/OCH-48 (causative)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Derived -aya- conjugations keep their stem in the future; no ay-dropping future class exists (contrast the passive aorist, where ay is dropped).

  - id: HB-356
    loc: "Урок XLIV / mdx line 6837"
    claim_ru: "Причастия простого будущего образуются подобно причастиям настоящего времени классов I, IV, VI и X"
    kind: rule
    falsifiable_as: "Future participles are thematic-type: P. -syat, A. -syamana (dasyat, karisyamana; Whitney 939)"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: dāsyat, kariṣyat / kariṣyamāṇa — thematic-type participle formation on the sya-stem
    ref: "Whitney §939"
    verdict_pedagogy: JUSTIFIED
    note: >-
      The sya-stem is thematic, so its participles are formally identical in type to the thematic present classes; sound analogy.

  - id: HB-357
    loc: "Урок XLIV / mdx line 6841"
    claim_ru: >-
      Imperfectum, образованное от простого будущего, называеся conditionalis и употребляется в условных предложениях
    kind: rule
    falsifiable_as: "Conditional = augmented imperfect of the future stem, used in conditional sentences (adasyat; Whitney 940-941, 950); DCS conditional tokens should cluster in yadi/cet contexts"
    sources: [dcs, whitney]
    verdict_fact: TRUE
    number: >-
      systemic: adāsyat = augment + future stem + secondary endings; classical use confined to conditional (contrary-to-fact) periods
    ref: "Whitney §§940-941, 950"
    verdict_pedagogy: JUSTIFIED
    mg_footnote: >-
      Частотность по DCS-2021: conditionalis — 269 токенов (0.03% глагольных форм), редчайшая личная форма глагола.
    note: >-
      Both the formation and the syntactic restriction are standard; Bühler's own exercise on this page uses the conditional in exactly the contrary-to-fact frame.

  - id: HB-358
    loc: "Урок XLIV / mdx line 6845"
    claim_ru: >-
      Precativus P. образуется посредством yās, Ā. посредством sī [ṣī]; и тот и другой спрягаются сходно с pot. кл. II, III, V, VII-IX
    kind: rule
    falsifiable_as: "Precative markers: -yas- active, -si- middle, conjugated like athematic optatives (Whitney 921-925)"
    sources: [dcs, whitney]
    verdict_fact: TRUE
    number: >-
      systemic: deyāt, bhūyāt (yās-active) vs dāsīṣṭa (sī-middle) — inflection follows the athematic optative
    ref: "Whitney §§921-925"
    verdict_pedagogy: JUSTIFIED
    mg_footnote: >-
      Частотность по DCS-2021: бенедиктив (медий) — 221 токен (0.03% глагольных форм).
    note: >-
      Standard doctrine; the middle precative barely occurs in the corpus, matching Bühler's brief treatment.

  - id: HB-359
    loc: "Урок XLIV / mdx line 6847"
    claim_ru: >-
      Но гласные глаголов dā давать, dhā, mā, sthā, pā пить, hā покидать, dhe, gai, so и do всегда превращаются в e, напр. 3 л. sing. dā, deyāt
    kind: universality
    falsifiable_as: "In active precative da, dha, ma, stha, pa, ha, dhe, gai, so, do always show e (deyat, dheyat; Whitney 837); precatives like *dayat refute"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: deyāt, dheyāt, meyāt, stheyāt, peyāt, heyāt, geyāt — the listed ā-final roots uniformly show e before -yās
    ref: "Whitney §837"
    verdict_pedagogy: JUSTIFIED
    note: >-
      No *dāyāt-type precatives are prescribed or attested for these roots in the reference grammar; the universality holds.

  - id: HB-360
    loc: "Урок XLIV / mdx line 6849"
    claim_ru: >-
      В Ā. большей частью те же самые корни, у которых i вставляется в infin. ..., имеют соединительный гласный
    kind: statistic
    falsifiable_as: "Middle precative it mostly matches infinitive it (Whitney 922-923); systematic mismatches beyond the listed exceptions refute the 'mostly'"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: the precative middle rides on the sibilant-aorist stems, so its iṭ tracks the root's seṭ/aniṭ class as in the infinitive; Bühler lists the standard leak (cluster-initial ṛ-roots and vṛ) himself
    ref: "Whitney §§922-923"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Hedged «большей частью» graded as direction per programme rule; Whitney's seṭ correlation confirms it, and the exceptions are named in the same paragraph.

  - id: HB-361
    loc: "Урок XLIV / mdx line 6851"
    claim_ru: >-
      У корней на ṛ соединительный гласный по желанию может выпускаться. Соединительный гласный ī встречается только у корня grah
    kind: universality
    falsifiable_as: "Connecting i in the precative occurs only with grah (grahisista; Whitney 900b analog); i with any other root refutes"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: grahīṣīṣṭa — grah takes ī throughout its iṭ-forms (Whitney §900b); no other root is prescribed ī in the precative middle
    ref: "Whitney §900b"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Scope is the precative middle only. In the iṣ-aorist Bühler himself (mdx 7087) extends optional ī to ṛ-final roots and vṛ, so the 'only grah' restriction is formation-specific, consistent with Whitney's grah-ī rule. Attestation of middle precatives is near-zero, so this is book-grammar.

  - id: HB-362
    loc: "Урок XLIV / mdx line 6855"
    claim_ru: >-
      Если не вставляется соединительный гласный, то конечные i, ī, u изменяются в guṇa, конечный ṝ — в īr или после губных в ūr, конечные дифтонги — в ā
    kind: allomorphy
    falsifiable_as: "Anit middle precative: final i/i/u→guna, rr→ir (ur after labials: pursista), diphthongs→a (Whitney 924)"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: neṣīṣṭa-type guṇa of final i/u; stṝ→stīrṣīṣṭa vs pṝ→pūrṣīṣṭa (īr/ūr after labials); dāsīṣṭa, glāsīṣṭa (diphthongs→ā, Bühler's own examples on the page)
    ref: "Whitney §924; cf. OCH-14 (ṝ→īr/ūr)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Each subcase is the regular treatment of the aniṭ sibilant-aorist stem; the ṝ→īr/ūr split is the general phonological rule, verified at OCH-14.

  - id: HB-363
    loc: "Урок XLV / mdx line 6909"
    claim_ru: >-
      Первый аорист образуется также как impf. II кл. (окончания присоединяются без соединит. гласной.). Встречается только P.
    kind: universality
    falsifiable_as: "Root aorist conjugates like a class II imperfect and occurs only in parasmaipada in classical Sanskrit (Whitney 829-831); classical middle root-aorist forms refute"
    sources: [dcs, whitney]
    verdict_fact: TRUE
    number: >-
      systemic: adāt, abhūt, asthāt — root-aorist inflection is class-II-imperfect-like and active-only in the classical language; middle root-aorist forms (akṛta, ayukta) are Vedic
    ref: "Whitney §§829-831, 834; cf. HK-1/HB-61 (aorist rarity)"
    verdict_pedagogy: JUSTIFIED
    mg_footnote: >-
      Частотность по DCS-2021: аорист всех типов — 2 452 токена (0.31% глагольных форм).
    note: >-
      TRUE within the textbook's classical scope; the Vedic middle root-aorist forms fall outside it and Whitney flags them as such.

  - id: HB-364
    loc: "Урок XLV / mdx line 6931"
    claim_ru: "Средние носовые выпадают, конечный ṛ переходит в guṇa."
    kind: allomorphy
    falsifiable_as: "In the a-aorist internal nasals drop (abhrasat, asrasat) and final r takes guna (Whitney 847)"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: abhraśat (bhraṁś), asrasat (sraṁs) — penultimate nasal lost; ṛ-final roots show guṇa in the a-aorist stem
    ref: "Whitney §847"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Standard a-aorist stem treatment per Whitney.

  - id: HB-365
    loc: "Урок XLV / mdx line 6937"
    claim_ru: "Третий аорист — по форме есть imperf. с удвоением, спрягаемый по примеру VI кл. P. и Ā."
    kind: rule
    falsifiable_as: "Reduplicated aorist is a thematic (class VI type) reduplicated imperfect in both voices (Whitney 856-859)"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: ajījanat, acīkarat — reduplicated thematic stem with imperfect (secondary) endings, inflected in both voices
    ref: "Whitney §§856-859"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Accurate formal characterization; the stem is thematic and the endings are those of an imperfect.

  - id: HB-366
    loc: "Урок XLV / mdx line 6945"
    claim_ru: "Этот аорист (и никакой другой) образуется от корней X кл. и каузативов"
    kind: universality
    falsifiable_as: "Class X verbs and causatives form only the reduplicated (3rd) aorist (Whitney 861, 1046-1047); a sigmatic aorist of an unreduced causative stem refutes"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: acūcurat, abībhidat — the reduplicated aorist is the causative/class-X aorist of record in the classical language; sporadic iṣ-aorists from -ay- stems (dhvanayīt) are Vedic
    ref: "Whitney §§861, 1046-1047; cf. OCH-37/OCH-38 (causative aorist)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Within Bühler's own system the passive 3sg (abhedi, mdx 7167) and the iṣ-type passive persons (mdx 7155) are treated as a separate passive formation, so 'и никакой другой' scopes over the active aorist, where it holds for classical Sanskrit.

  - id: HB-367
    loc: "Урок XLV / mdx line 6947"
    claim_ru: "aya всегда отбрасывается."
    kind: universality
    falsifiable_as: "The causative sign -aya- is always dropped in the reduplicated aorist (abibhidat from bhedayati; Whitney 1047); an aorist retaining aya refutes"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: bhedayati → abībhidat, corayati → acūcurat — the reduplicated aorist is built on the bare root; -aya- never survives its stem formation
    ref: "Whitney §1047"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Definitional for the formation; the irregulars Bühler lists nearby (atiṣṭhipat, asūṣupat) alter the root, not the aya-dropping.

  - id: HB-368
    loc: "Урок XLV / mdx line 6949"
    claim_ru: >-
      На основы с консонантическим началом, простой корень которых оканчивается на группу согласных, распространяются правила удвоения в перфекте, напр. rakṣayati, ararakṣat
    kind: rule
    falsifiable_as: "Cluster-final roots reduplicate their causative aorist by perfect rules (acakathat, ararakṣat; Whitney 864)"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: ararakṣat (rakṣayati) — cluster-final roots fall back on perfect-type reduplication instead of the ī/i-rhythm type
    ref: "Whitney 1889 (reduplicated aorist, §§860-864); cf. HB-53 (reduplication rules)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      The prosodic ī/i rule cannot apply to heavy cluster-final stems, so the perfect-type fallback is systematic.

  - id: HB-369
    loc: "Урок XLV / mdx line 6953"
    claim_ru: >-
      внутренние гунированные гласные заменяются первоначальным гласным, причем ar вместо ṛ и al вместо ḷ могут и оставаться
    kind: allomorphy
    falsifiable_as: "In reduplicated aorists internal guna vowels revert to the original root vowel, optionally retained for ar/al from r/l (avivrtat/avavartat; Whitney 862)"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: vartayati → avīvṛtat or avavartat — internal guṇa reverts to the root vowel, with ar/al optionally retained
    ref: "Whitney §862"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Standard stem reduction with the ar/al option Whitney records.

  - id: HB-370
