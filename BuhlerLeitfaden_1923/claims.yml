      The i/ī → y vs iy conditioning by cluster size is the general Sanskrit semivowel rule applied here; all four sub-rules standard.

  - id: HB-184
    loc: "Урок XXV / mdx line 3315"
    claim_ru: >-
      ahan п. день, имеет в сильных пад. ahān, в средних пад. ahas, в слабых пад. ahan или ahn: в N. ahaḥ (висарга стоит вм. r)
    kind: allomorphy
