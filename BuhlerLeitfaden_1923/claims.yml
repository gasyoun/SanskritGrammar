  - id: HB-183
    loc: "Урок XXV / mdx line 3277"
    claim_ru: >-
      Когда суффиксу предшествует соед. гласный i, то он исчезает перед uṣ. Коренные i и ī перед uṣ изменяются в y, когда им предшествует один согласный, и в iy, когда несколько; u и ū переходят в uv, ṛ в r.
