  - id: HB-243
    loc: "Урок XXX / mdx line 4263"
    claim_ru: >-
      Перед ya конечные ā, e, ai, o корней изменяются в e, напр. dā — deya, gai — geya, so — seya. Конечные i и ī изменяются в guṇa, а ṛ и ṝ в vṛddhi, напр. ji — jeya; nī — neya; kṛ - kārya; tṝ - tārya. Конечные u и ū изменяются в av, или, если должна быть выражена необходимость, — в āv, напр. śravya кого следует слушать, śrāvya кого необходимо слушать.
    kind: allomorphy
    falsifiable_as: "ya-gerundives: ā/e/ai/o → e (deya, geya), i/ī → guṇa (jeya, neya), ṛ/ṝ → vṛddhi (kārya, tārya), u/ū → av/āv with the śravya vs. śrāvya necessity distinction — Whitney 1213; semantic split of śravya/śrāvya testable in usage"
    sources: [whitney, dcs]
    verdict_fact: TRUE
    number: >-
      systemic: the vowel treatments (deya, geya, jeya, neya, kārya, tārya, śravya/śrāvya) are the yat-vs-ṇyat distribution of the native grammar; every cited form is attested
    ref: "Whitney §§963, 1213 (ya-gerundive)"
    verdict_pedagogy: JUSTIFIED
    mg_footnote: >-
      Частотность по DCS-2021: среди герундивных типов -ya — 1046 различных форм, -tavya — 523, -anīya — 230.
    note: >-
      Form rules are exceptionless as stated. The necessity-semantics of śravya vs. śrāvya is the grammarians' yat/ṇyat gloss; verifying that semantic split in usage would need semantic tagging, but the formal doublet itself is real.

  - id: HB-244
    loc: "Урок XXX / mdx line 4265"
    claim_ru: >-
      i, u, ḷ стоящие на предпоследнем месте изменяются в guṇa, между тем как ṛ при тех же условиях остается без изменения, напр. vid — vedya; budh — bodhya; tṛd разрушать — tṛdya. a, стоящий на предпоследнем месте, изменяется в vṛddhi, за исключением корней, оканчивающихся на губной и jan, yat, śak, sah, напр. vac — vācya, labh — labhya, śak — śakya.
    kind: allomorphy
    falsifiable_as: "In ya-gerundives penultimate i/u take guṇa (vedya, bodhya), ṛ stays (tṛdya), penultimate a takes vṛddhi (vācya) except labial-final roots and jan/yat/śak/sah (labhya, śakya) — attested gerundives confirm"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: mirrors the Paninian yat/ṇyat/kyap distribution — kyap without guṇa for ṛ-penultimate roots (Pāṇini 3.1.110), yat for labial-final a-penultimate roots (labhya, śapya) and śak (śakya), ṇyat with vṛddhi elsewhere (vācya)
    ref: "Whitney 1889 (ya-gerundive vowel treatment); Pāṇini 3.1.98-110"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Bühler compresses three Paninian suffix classes into one surface rule; the exception list (labials + jan/yat/śak/sah) is the traditional one and every cited form is standard.

