    note: >-
      Checked in the source: line 1317 immediately lists gai, dā, do, dhā, pā, sthā, so, hā etc. as taking ī (gīyate, dīyate), so this rule is the residual ā-treatment and is correctly scoped.

  - id: HB-115
    loc: "Урок X / mdx line 1319"
    claim_ru: "i и u в средине глаголов, корни которых оканчиваются на v и r, удлиняются, напр. div, dīvyate"
    kind: allomorphy
    falsifiable_as: "Medial i/u lengthen in passives of roots ending in v or r (dīvyate) — attested passive forms"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: the general lengthening of i/u before root-final v/r plus consonant applies before passive ya too — dīvyate, pūryate-type stems
    ref: "Whitney 1889 (i/u lengthened before root-final v/r + consonant)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Same law as the class IV note at Урок VI line 793 in this batch, here applied to the passive.

  - id: HB-116
    loc: "Урок X / mdx line 1323"
    claim_ru: "Носовой в средине корня часто исчезает, напр. bandh, badhyate; daṅś, daśyate; śaṅs, śasyate"
    kind: allomorphy
    falsifiable_as: "Root-medial nasal is often lost in the passive (badhyate, daśyate, śasyate) — 'often', not always: proportion of nasal-retaining passives checkable"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: loss of the penultimate nasal before ya is the regular treatment for the bandh/daṅś/śaṅs/sraṅs class, while roots like nind retain it (nindyate) — exactly the 'often, not always' Bühler states
    ref: "Whitney 1889 (penultimate nasal lost before ya)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Hedge «часто» is the correct calibration: nasal loss is lexically governed, majority but not universal.

  - id: HB-117
    loc: "Урок X / mdx line 1325"
    claim_ru: >-
      В корнях vac, vad, vap, vas, vah и svap va превращается в u ... ya корня yaj превращается в i, а r корней grah и prach в ṛ; hve превращается в hū, śās — śiṣ; khan, jan, tan ... и san образуют khanyate или khāyate, janyate или jāyate и т. д.; śī лежать образует śayyate
    kind: allomorphy
    falsifiable_as: "Samprasarana in passives: ucyate, uṣyate, ijyate, gṛhyate, pṛcchyate, hūyate, śiṣyate; doublets khanyate/khāyate, janyate/jāyate; śayyate — each form attestable"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: ucyate, udyate, upyate, uṣyate, uhyate, supyate; ijyate; gṛhyate, pṛcchyate; hūyate, śiṣyate; the an-root doublets khanyate/khāyate, janyate/jāyate, tanyate/tāyate, sanyate/sāyate; śayyate — all are the standard grammarians' forms
    ref: "Whitney 1889 (saṃprasāraṇa and special root forms in the ya-passive)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      A list claim; every listed form is the textbook passive. The an-root doublets are explicitly optional in the native grammar, as Bühler's «или» conveys.

  - id: HB-118
    loc: "Урок XI / mdx line 1417"
    claim_ru: >-
      Imperfectum Par., подобно индикативу, образуется от основы настоящего времени, к которой присоединяются вторичные формы личных окончаний. Перед глаголом появляется приращение a
    kind: rule
    falsifiable_as: "Imperfect = augment a- + present stem + secondary endings (ajayat, akṣipat) in all attested imperfects"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: augment + present stem + secondary endings is the definitional imperfect formation (ajayat, atudat, adīvyat)
    ref: "Whitney 1889 (imperfect formation)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Definitional; augmentless (injunctive-form) preterites are a Vedic/epic phenomenon outside this lesson's classical scope.

  - id: HB-119
    loc: "Урок XI / mdx line 1419"
    claim_ru: >-
      Если глагол начинается с гласного, то в результате слияния последнего с приращением получается соответствующий двугласный vṛddhi, т. е. a + i или ī = ai; a + u или ū = au, a + ṛ = ār
    kind: rule
    falsifiable_as: "Augment + initial vowel yields vrddhi (aicchat-type: ai-, au-, ār-) in attested augmented forms, not guna"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: the augment fuses with an initial vowel to the vṛddhi diphthong, not guṇa — aicchat (iṣ), aubjat (ubj), ārcchat (ṛch) — a special rule overriding the normal a + i → e sandhi
    ref: "Whitney 1889 (augment; vṛddhi fusion with initial vowel)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      The vṛddhi (not guṇa) outcome is the well-known special augment sandhi; exceptionless in classical forms like aicchat.

  - id: HB-120
    loc: "Урок XI / mdx line 1423"
    claim_ru: >-
      Если перед глаголом стоит приставка, то приращение вставляется между нею и глаголом и соединяется с конечным гласным приставки согласно эвфоническим правилам, напр. upa + nī дает основу Imperfecta upānaya
    kind: rule
    falsifiable_as: "Augment always sits between preverb and root (upānayat, never *aupanayat) in attested compounded imperfects"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: the augment is prefixed to the root, not the preverb — upānayat, samagacchata, praiṣayat; *aupanayat-type forms do not exist in correct Sanskrit
    ref: "Whitney 1889 (augment placed after the preverb)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Sporadic epic double/misplaced augments are recognized aberrations, not a counter-class to the classical rule.

  - id: HB-121
    loc: "Урок XI / mdx line 1458"
    claim_ru: >-
      Конечные n̄, ṇ и n, если им предшествует краткий гласный, перед начальными гласными и двугласными удваиваются, напр. atiṣṭhan atra = atiṣṭhann atra
    kind: rule
    falsifiable_as: "Final ṅ/ṇ/n after short vowel doubles before initial vowel (atiṣṭhann atra) in all attested junctures"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: a final nasal (ṅ/ṇ/n) after a short vowel is doubled before any initial vowel — atiṣṭhann atra, pratyaṅṅ āste — the exceptionless classical rule
    ref: "Whitney §210 (final n doubled after short vowel)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Exceptionless within its scope; after a long vowel (mahān āsīt) no doubling occurs, which is exactly what the short-vowel condition predicts.

  - id: HB-122
    loc: "Урок XII / mdx line 1572"
    claim_ru: "Прилагательные на i и u ... в ж. р. часто склоняются как mati и dhenu"
    kind: statistic
    falsifiable_as: "Feminines of i/u-stem adjectives often follow mati/dhenu declension — proportion of such feminine forms checkable"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: the feminine of i/u-stem adjectives standardly follows the mati/dhenu noun type; the rival devī-type feminine (gurvī) exists, and Bühler's own §3б calls it more common for u-stems after one consonant — 'часто' is the right hedge
    ref: "Whitney 1889 (declension of adjectives in i and u)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Direction correct and self-qualified by the adjacent paragraph (mdx 1574). The exact proportion would need lexeme-level adjective tagging, but the hedged claim matches standard doctrine.

  - id: HB-123
    loc: "Урок XIII / mdx line 1652"
    claim_ru: >-
      Imperfectum Ātmanepada (Medium) образуется, подобно Par., от основы наст. вр. и получает приращение a. Личные окончания являются большей частью видоизменениями окончаний Praes. Ātm. — Passivum в имперфекте имеет окончания среднего залога
    kind: rule
    falsifiable_as: "Imperfect middle = augment + present stem + secondary middle endings; imperfect passive takes middle endings — attested paradigm forms"
    sources: [whitney, dcs]
    verdict_fact: TRUE
    number: >-
      systemic: augment + present stem + secondary middle endings is the definitional formation; imperfect passive 1,083 (DCS-2021) exists and is middle-inflected by construction
    ref: "Whitney 1889 (imperfect middle formation)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      The hedge 'большей частью видоизменениями' is accurate — ta~te, anta~ante, mahi~mahe, dhvam~dhve are transparent, 2sg -thāḥ less so.

  - id: HB-124
    loc: "Урок XIII / mdx line 1695"
    claim_ru: >-
      после приставок, кончающихся на i и u, и также после приставки nis (niḥ) начальный s многих глагольных корней превращается в ṣ, st и sth в ṣṭ и ṣṭh
    kind: allomorphy
    falsifiable_as: "Root-initial s retroflexes after i/u-final prefixes and nis (niṣad, pariṣic, pratiṣidh) in many but not all roots — proportion checkable"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: lexically conditioned retroflexion — niṣīdati, pariṣiñcati, pratiṣedhati, anuṣṭhā-, but e.g. vi-sṛp gives visarpati with s intact, so 'многих' (not 'всех') is exactly right
    ref: "Whitney 1889 (retroflexion of root-initial s after preverbs)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      The native grammar handles this by root lists (Pāṇini 8.3.63ff.); Bühler's many-but-not-all framing mirrors that.

  - id: HB-125
    loc: "Урок XIII / mdx line 1699"
    claim_ru: >-
      конечный s приставок на is и us перед начальным k, kh, p, ph превращается в ṣ, напр. nis + padyate = niṣpadyate
    kind: rule
    falsifiable_as: "Prefix-final s of nis/dus becomes ṣ before k, kh, p, ph (niṣpadyate, duṣkṛta) in all attested compounds"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: regular internal sandhi of s after i/u before voiceless velars and labials — niṣpadyate, niṣkāma-, duṣkṛta, duṣprāpa; exceptionless in classical usage
    ref: "Whitney 1889 (final s of nis/dus before k/p)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Definitional sandhi rule; no counter-class exists.

  - id: HB-126
    loc: "Урок XIV / mdx line 1801"
    claim_ru: >-
      Imperativus Parasmaipada образуется от основы наст. вр. Его окончания отчасти одинаковы с окончаниями Impf. Par.
    kind: rule
    falsifiable_as: "Imperative built on present stem; dual/plural endings partly identical with imperfect endings (tam, ta, tām) — paradigm comparison"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: imperative shares 2du -tam, 3du -tām, 2pl -ta with the imperfect; 3sg -tu, 2sg -Ø/-hi and the 1st persons differ — 'отчасти' is accurate
    ref: "Whitney 1889 (imperative formation)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Paradigm-level fact, verifiable against the tables printed in the lesson.

  - id: HB-127
    loc: "Урок XV / mdx line 1949"
    claim_ru: >-
      Imperativus Ātmanepada (Medium) образуется, подобно Imper. Par., от основы наст. времени. Пассивные формы имеют окончания Imp. Ātm.
    kind: rule
    falsifiable_as: "Middle imperative built on present stem; passive imperatives take middle imperative endings (sevyatām-type) — attested forms"
    sources: [whitney, dcs]
    verdict_fact: TRUE
    number: >-
      systemic: passive imperative = ya-stem + middle imperative endings (sevyatām, dṛśyatām); imperative passive 4,213 (DCS-2021)
    ref: "Whitney 1889 (middle imperative); cf. HB-19 (passive frequency)"
    verdict_pedagogy: JUSTIFIED
    mg_footnote: >-
      Частотность по DCS-2021: пассивный императив — 4 213 токенов.
    note: >-
      The passive imperative in -tām is a genuinely frequent construction, well worth teaching here.

  - id: HB-128
    loc: "Урок XV / mdx line 1999"
    claim_ru: "Существ. ж. р. на ṛ склоняются одинаково с м. р., за исключением Асc. pl, который оканчивается на ṝḥ"
    kind: universality
    falsifiable_as: "Feminine r-stems (svasṛ) match masculine declension except Acc.pl. -ṝḥ vs masc. -ṝn — zero other divergences in attested forms"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: m. and f. ṛ-stems share every ending except Acc.pl. (pitṝn vs mātṝḥ, svasṝḥ); the guṇa/vṛddhi split in strong cases (pitaram vs svasāram) is lexical, not gender-driven
    ref: "Whitney 1889 (ṛ-stem declension)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      The standard doctrine states exactly this single point of divergence.

  - id: HB-129
    loc: "Урок XV / mdx line 2003"
    claim_ru: "Nomina actoris на -tṛ образуют ж. р. на -trī, который склоняется как nadī"
    kind: rule
    falsifiable_as: "Agent nouns in -tṛ form feminines in -trī declining like nadī (kartrī, dātrī) — attested feminine agent-noun forms"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: kartrī, dātrī, netrī — the -trī feminine declining like nadī is the regular formation
    ref: "Whitney 1889 (feminine of tṛ-stems)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Definitional; no competing feminine formation for agent nouns.

  - id: HB-130
    loc: "Урок XVI / mdx line 2071"
    claim_ru: "С конечным a основы наст. вр. I, IV, VI и X классов оптативный ī сливается в e."
    kind: allomorphy
    falsifiable_as: "Optatives of thematic classes I, IV, VI, X uniformly show -e- (a+ī), never -aī- or other outcome"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: thematic a + optative ī yields e exceptionlessly (bhavet, dīvyet, tudet, corayet)
    ref: "Whitney 1889 (thematic optative)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      No thematic optative shows any other outcome.

  - id: HB-131
    loc: "Урок XVI / mdx line 2087"
    claim_ru: "nṛ кроме того образует в Gen. pl. nṛṇām или nṝṇām."
    kind: allomorphy
    falsifiable_as: "Both gen.pl. forms nṛṇām and nṝṇām of nṛ are attested"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: both nṛṇām and nṝṇām are sanctioned — the lengthening is explicitly optional for nṛ in the native grammar (Pāṇini 6.4.6), and both forms occur in literature
    ref: "Whitney 1889 (nṛ declension)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      A both-forms claim; the grammarians' option plus attestation settles it.

  - id: HB-132
    loc: "Урок XVII / mdx line 2197"
    claim_ru: >-
      Характерным признаком Optativi (Potentialis) Ātm. является ī (e), как и в Par.; личные окончания сходны с окончаниями Impf. Ātm. Пассивные формы оптатива имеют окончания Ātm.
    kind: rule
    falsifiable_as: "Ātmanepada optatives show -ī-/-e- plus imperfect middle endings; passive optatives take middle endings"
    sources: [whitney, dcs]
    verdict_fact: TRUE
    number: >-
      systemic: middle optative = optative sign + secondary middle endings (labheta, sevyeta); optative passive 502 (DCS-2021) is middle-inflected by construction
    ref: "Whitney 1889 (middle optative); cf. HB-19 (passive frequency)"
    verdict_pedagogy: JUSTIFIED
    mg_footnote: >-
      Частотность по DCS-2021: пассивный оптатив — 502 токена.
    note: >-
      Definitional formation; the passive optative in -yeta is a normal prescriptive-text form.

  - id: HB-133
    loc: "Урок XVII / mdx line 2228"
    claim_ru: >-
      Существ. м. и ж. р. на ā, ī и ū, последним слогом которых является неизмененный глагольный корень, принимают те же окончания, что и nau. Те из них, которые оканчиваются на ā, теряют гласный перед гласными окончаниями, за искл. N. sing. pl. и Асc. pl.
    kind: allomorphy
    falsifiable_as: "Root-noun compounds in -ā (viśvapā type) drop ā before vowel endings except N.sg/pl and Acc.pl (viśvapaḥ acc.pl.)"
    sources: [whitney]
    verdict_fact: FALSE
    number: >-
      systemic: the paradigm printed immediately below (mdx 2230) contradicts the stated exception list — Acc.sg. viśvapām retains ā before the vowel ending -am (not listed), while Acc.pl. viśvapaḥ loses it (yet is listed as an exception)
    ref: "Whitney 1889 (root-stems in ā: ā retained in the strong cases)"
    verdict_pedagogy: MISLEADING
    note: >-
      Errata (HB-60 precedent): 'за искл. N. sing. pl. и Асc. pl.' should read '... и Асc. sing.' — retention holds exactly in the strong cases (sarvanāmasthāna: N.sg/du/pl, Acc.sg/du). The loss rule itself is sound; the printed exception list is the defect, contradicted by the book's own table.

  - id: HB-134
    loc: "Урок XVII / mdx line 2228"
    claim_ru: >-
      Основы на ī и ū перед гласными окончаниями изменяют гласный в y и v, если предшествует один согласный; в iy и uv, если предшествует несколько согласных.
    kind: allomorphy
    falsifiable_as: "Root-noun stems in ī/ū show -y-/-v- after one consonant (khalapvau) but -iy-/-uv- after cluster (yavakriyau)"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: y/v after a single consonant (grāmaṇyaḥ, khalapvaḥ), iy/uv after a cluster (yavakriyaḥ) — the classical distribution, exemplified by the book's own paradigms
    ref: "Whitney 1889 (ī/ū root-noun stems before vowel endings)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Matches the standard syllabification-driven rule.

  - id: HB-135
    loc: "Урок XVII / mdx line 2236"
    claim_ru: "Слова сложенные с nī „ведущий' в Loc. sing. принимают ām, напр. grāma-ṇī ... L. grāmaṇyām."
    kind: rule
    falsifiable_as: "Compounds in -ṇī take loc.sg. -ām (grāmaṇyām), unlike ordinary ī-root-nouns"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: the native grammarians prescribe loc.sg. -ām for nī-compounds (grāmaṇyām, senānyām)
    ref: "Whitney 1889 (root-noun compounds in ī)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Prescriptive paradigm fact; corpus attestation of such locatives is negligible, so grading rests on the grammarians' rule rather than frequency.

  - id: HB-136
    loc: "Урок XVIII / mdx line 2302"
    claim_ru: "paya присоединяется к большинству корней на ā и двугласные e, ai, au и некоторым другим."
    kind: statistic
    falsifiable_as: "Majority of roots ending in ā/e/ai/au form causatives with -paya- (jñāpayati, dāpayati, gāpayati)"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: -p- causatives are the norm for ā/diphthong roots (sthāpayati, dāpayati, dhāpayati, jñāpayati, gāpayati); pā 'пить' with pāyayati shows it is a majority, not a totality — matching 'большинству'
    ref: "Whitney 1889 (causative stem in -p-); cf. HB-26/HB-27/OCH-48"
    verdict_pedagogy: JUSTIFIED
    note: >-
      The 'некоторым другим' clause also correctly covers the i-final p-takers (jāpayati, adhyāpayati, krāpayati).

  - id: HB-137
    loc: "Урок XVIII / mdx line 2302"
    claim_ru: "Конечные двугласные корней в causativ-e всегда заменяются ā."
    kind: universality
    falsifiable_as: "Roots in final diphthong always show ā before causative suffix (gai → gāpayati); any e/ai/au retained would refute"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: no Sanskrit causative retains root-final e/ai/au — diphthong roots pass through ā (gai/gāpayati, mlai/mlāpayati, do/dāpayati); the footnoted śrapayati/glapayati shorten that ā afterwards, they do not preserve a diphthong
    ref: "Whitney 1889 (causative of diphthong-final roots)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      The falsification condition (a retained diphthong) never occurs; Bühler's own asterisked footnote handles the secondary shortenings.

  - id: HB-138
    loc: "Урок XVIII / mdx line 2304"
    claim_ru: >-
      śrā, śrai варить образует śrapayati; glai быть усталым и snā купаться, когда перед ними нет приставок, могут образовывать glāpayati или glapayati, snāpayati или snapayati.
    kind: allomorphy
    falsifiable_as: "śrā/śrai has short-vowel causative śrapayati; unprefixed glai and snā show both long and short vowel causatives"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: matches the reference-grammar exception list — śrā/śrai gives śrapayati; unprefixed glai and snā give glāpayati~glapayati, snāpayati~snapayati
    ref: "Whitney 1889 (causative stem exceptions)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Both-forms claims sanctioned by the native grammar and echoed by Whitney.

  - id: HB-139
    loc: "Урок XVIII / mdx line 2310"
    claim_ru: >-
      Глаголы kam любить, cam есть и niśam слышать удлиняют свой a, а глаголы nam и vam могут удлинять его факультативно.
    kind: allomorphy
    falsifiable_as: "kam, cam, niśam show lengthened ā in causative (kāmayate); nam and vam attest both namayati/nāmayati, vamayati/vāmayati"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: kāmayate, ācāmayati, niśāmayati lengthen; namayati~nāmayati and vamayati~vāmayati are both sanctioned (Pāṇinean option) — within the am-root class that otherwise keeps short a (gamayati, śamayati)
    ref: "Whitney 1889 (causative a-lengthening exceptions)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      This footnote carves the exceptions out of the short-a rule stated at mdx 2308; the carve-out matches the native grammar.

  - id: HB-140
    loc: "Урок XVIII / mdx line 2312"
    claim_ru: >-
