    ref: "Whitney 1889 (present participle formation)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      The recipe even yields the correct strong-less stems for ati-verbs, dovetailing with the next rule.

  - id: HB-173
    loc: "Урок XXIII / mdx line 3066"
    claim_ru: >-
      Если З л. мн. ч. praes. оканчивается на ati вм. anti, что происходит у всех глаголов с редупликацией, то part. не имеет сильной формы, а в N. V. Асc. pl. n. n может вставляться факультативно, напр. dadat дающий.
