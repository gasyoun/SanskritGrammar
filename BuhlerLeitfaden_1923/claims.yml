    ref: "Whitney §734 (a-class); cf. HB-5"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Ungunated thematic stems of such roots belong to class VI by definition, so they classify out rather than refute.

  - id: HB-68
    loc: "Урок II / mdx line 271"
    claim_ru: "e перед следующим за ним признаком основы настоящего времени a превращается в ауа, o в ava, ar в ara"
    kind: allomorphy
