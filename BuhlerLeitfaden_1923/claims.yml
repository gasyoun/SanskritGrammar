# claims.yml — verifiable-assertion register for BuhlerLeitfaden_1923
#
# GENERATED target: CLAIMS_VERIFIED.md (via scripts/build_claims.py) — never edit that file.
#
# H797 Phase 2: the first cross-grammar port of the Kochergina two-axis claim-verification
# pipeline (Uprava FINDINGS §72; D-A ruling of 12-07-2026). Same register semantics as
# KocherginaUchebnik_1998/claims.yml:
#   verdict_fact     — is the assertion true vs. corpus + reference grammars, with the actual number?
#   verdict_pedagogy — is the *presentation* defensible (ordering, foregrounding, hidden frequency)?
#
# Source text: Bühler, «Руководство к элементарному курсу санскритского языка», Стокгольм 1923
# (Russian translation of the Leitfaden für den Elementarcursus des Sanskrit, 1883; electronic
# version N. P. Likhushina, 2008) — Buhler_Unicode.mdx, 48 уроков.
#
# Ground truth (triangulation, D2): DCS-2021 corpus statistics (Oliver Hellwig, CC BY, via
#   ../VisualDCS) reproduced by the shared battery KocherginaUchebnik_1998/verify_claims_dcs.py
#   (HB-* metrics added for this register); Whitney 1889 (systemic grammatical fact, by §);
#   Tolchelnikov-Talmud 2026 (root morphoclass).
# SOURCE-CONFLICT TIE-BREAK (D-B, CONFIRMED by MG 12-07-2026): when Talmud, Whitney and DCS
#   disagree, DCS is authority for *frequency/attestation*, Whitney for *systemic grammatical
#   fact*, Talmud for *root-morphoclass* — and flag the disagreement in the entry, never silently
#   pick.
#
# verdict_fact:     TRUE | OVERSTATED | FALSE | UNTESTABLE | PENDING (harvested, not yet verified)
# verdict_pedagogy: JUSTIFIED | MISLEADING | RARE-AS-CENTRAL | FREQUENCY-HIDDEN | ORDER-QUESTIONABLE
# kind:             typology | universality | allomorphy | statistic | rule
# mg_footnote:      (optional) corpus frequency ADDED BY M.G. where Bühler states no number —
#                   scholarly apparatus rendered over the reading site, not part of the 1923 text.
#
# COVERAGE (H797 Phase 2, FULL DRAIN 15-07-2026): HB-1..HB-403 — the 64-entry core (14-07,
# incl. the absorbed BU-1..BU-5 seed: BU-1→HB-57, BU-2→HB-61 reconciled, BU-3→HB-64,
# BU-4→HB-38, BU-5→HB-56) plus the complete 339-candidate backlog drain (HB-65..HB-403,
# verdicted by 6 parallel agents under the drain style guide, merged with loc-alignment
# validation and a manual spot-check of every FALSE). Fact-axis tally: 381 TRUE ·
# 7 OVERSTATED · 8 FALSE · 7 UNTESTABLE · 23 M.G. footnotes. claims_harvest.yml is now
# candidates: []. All 8 FALSE are MISPRINT-CLASS (self-contradicted by an adjacent paradigm
# or example in the same passage) — each carries an errata note; the register doubles as a
# print-corruption sweep of the 1923/2008 text.

work: "Bühler, Руководство к элементарному курсу санскритского языка (Leitfaden), 1923"

synthesis: >-
  FULL DRAIN (403 verified: 381 TRUE · 7 OVERSTATED · 8 FALSE · 7 UNTESTABLE · 23 M.G.
  footnotes). The full-book picture sharpens the 64-entry core's verdict on both axes. FACT
  AXIS: Bühler's own grammar survives almost untouched — the three OVERSTATED added by the
  drain are genuine but narrow (final-vṛddhi in causatives defeated by pṝ→pūrayati, HB-2318;
  the class-II u-root vṛddhi absolute defeated by ūrṇoti; the tatpuruṣa patha-universal
  leaking on its own exception clause via apatha) — while ALL EIGHT FALSE are misprint-class:
  sentences self-contradicted by the paradigm or example printed NEXT TO THEM («окончание āḥ»
  beside brahmahā; «impf. VII кл.» beside a thematic paradigm; kroṣṭṛ where kroṣṭu is required;
  «a» for «aṅ»; krudh in a t/p/s list; «гласный» for «согласный»; the viśvapā exception list
  against its own table; «sam давать» for san). The register thereby doubles as an errata
  sweep: eight print/translation corruptions of the 1923 Russian edition (or its 2008
  digitization), each localized and transcribed into [`errata.yml`](errata.yml) (15-07-2026) —
  the claims register and the errata register converge exactly as the HB-60 precedent
  predicted. PEDAGOGY AXIS: 8 flags in 403
  (5 MISLEADING, 2 FREQUENCY-HIDDEN, 1 ORDER-QUESTIONABLE) — the rare-before-common ordering
  and equal-billing habits of the core hold but do not multiply across the full book. The
  UNTESTABLE block (7) names its instruments: semantic tagging (middle-voice self-benefaction,
  intensive semantics), referent tagging (pluralis maiestatis), a treebank (gender-resolution
  agreement), comparative lemma-frequency joins, and compound-type tagging. The original
  64-entry synthesis follows.


  On the 64-claim verified core (of a 404-candidate full-book harvest; five entries additionally
  double-verified by the concurrent seed pass BU-1..BU-5), Bühler comes out of the
  two-axis check remarkably clean: 58 TRUE · 4 OVERSTATED · 1 FALSE · 1 UNTESTABLE. His
  signature virtue is *calibrated hedging*. Where Kochergina's failure mode was the absolute
  quantifier ("всегда", "только", "по единому правилу") over a known exception class, Bühler's
  hedges repeatedly land exactly on the variable zone and his absolutes on the categorical one:
  "обыкновенно" for the optional visarga assimilations (HB-4), "почти все" for a ten-member
  class with one exception handled in the same lesson (HB-50), "иногда" for a form the corpus
  puts at 0.95% (HB-22), "очень редкая" for one at 0.4% (HB-42), closed inventories given
  complete (HB-18, HB-36, HB-52) and non-exhaustive lists not claimed exhaustive (HB-11). The
  clearest head-to-head: the same corpus number — the seṭ future -iṣya at 56.8% of distinct
  forms — that graded Kochergina's "по единому правилу -syá" OVERSTATED (HK-4) grades Bühler's
  "либо непосредственно, либо при посредстве i" TRUE (HB-59). The fact is the same; the
  calibration differs.


  Three failure modes survive, all instructive. **(1) The Урок-I absolute.** The beginner-facing
  opening states that all ten tense/mood categories have both voices (HB-2) — contradicted by
  the book's own later lessons (root and siṣ-aorists "исключительно P.", the intensives each
  single-voice). Same overreach type as Kochergina's, but rarer: it is the opening simplification,
  not a recurring habit. **(2) Rare-before-common ordering.** Урок XLIV teaches the periphrastic
  future before the simple future against a 14:1 corpus frequency ratio (HB-58), and the -tavat
  active participle is billed "также часто" beside a passive twin 100× more frequent (HB-40).
  This is the paradigm-completeness tradition ordering by system rather than by text frequency —
  the same force behind Kochergina's frequency-blindness, a half-century earlier. **(3) The one
  stated frequency direction is flipped.** Bühler says the classical perfect is *rarer* than the
  imperfect (HB-57); DCS-2021 has the perfect 1.3× *more* frequent (61,986 vs ~47,554 tokens) —
  stratum-dependent (the aggregate is epic-heavy), so OVERSTATED rather than FALSE, and flagged
  per the D-B tie-break. The single FALSE (HB-60, the a-aorist "спрягается как impf. VII кл."
  beside a thematic paradigm) and the ā+Acc government slip (HB-10) both smell of print/translation
  errata rather than grammatical doctrine — the claims register and the errata register meet there.


  Recommendation for the reading-site overlay: badge the six flagged entries and surface the
  thirteen M.G. frequency footnotes — Bühler states almost no numbers, and the corpus can now
  supply them (the ppp at 29.8% of all verbal tokens as the true center of the verb system,
  the optative as the second finite category at 9.3%, the -ya absolutive at 78.4% of the
  inventory). The cross-grammar layer is doing what D-A intended: with two registers live,
  presentation calibration — not factual accuracy — is where the grammars measurably differ.

entries:

  - id: HB-1
    loc: "Урок I / mdx line 116"
    claim_ru: >-
      Санскритские глаголы имеют десять времен и наклонений, а каждое из последних
      три числа (единственное, двойственное и множественное) для трех лиц.
    kind: typology
    falsifiable_as: "the tense/mood inventory is exactly 10, each with 3 numbers x 3 persons"
    sources: [whitney, dcs]
    verdict_fact: TRUE
    number: "systemic: the traditional 10-fold inventory (pres, impf, impv, opt, perf, periphr. fut, simple fut, cond, prec, aor) x 3 numbers x 3 persons; DCS tokens are wildly skewed — present 157,003 (20.1% of verbal), optative 72,826 (9.3%), perfect 61,986, imperfect ~47,554, imperative 32,750, future 18,004 (2.3%), aorist 2,452 (0.31%), periphr. future 1,290 (0.17%), conditional 269 (0.03%), precative ~221 (0.03%)"
    ref: "Whitney §527ff (conjugation system); DCS timws.csv via verify_claims_dcs.py"
    verdict_pedagogy: JUSTIFIED
    mg_footnote: >-
      Частотность десяти времен и наклонений по DCS-2021 (от 781 618 глагольных
      словоупотреблений): настоящее 20,1 %, оптатив 9,3 %, перфект 7,9 %, имперфект 6,1 %,
      императив 4,2 %, простое будущее 2,3 %, аорист 0,31 %, описательное будущее 0,17 %,
      кондиционалис 0,03 %, прекатив 0,03 %. Четыре из десяти категорий — корпусно-маргинальны
      (< 0,4 % каждая).
    note: >-
      The inventory is the standard one and correct as a system. What the equal-billing list
      cannot show the learner is the four-orders-of-magnitude frequency spread inside it: the
      first member (present) is ~700x the last (conditional/precative). Supplied as an M.G.
      footnote rather than a flag — an inventory owes completeness, not frequency.

  - id: HB-2
    loc: "Урок I / mdx line 116"
    claim_ru: >-
      Все времена и наклонения имеют и активную (раrаsmaipada), и медиальную
      (ātmanepada) форму с характерными для каждой из них личными окончаниями.
    kind: universality
    falsifiable_as: "every tense/mood category attests both parasmaipada and atmanepada"
    sources: [whitney, dcs]
    verdict_fact: OVERSTATED
    number: "Bühler's own later lessons carve out the exceptions: root aorist 'встречается только P.' (Урок XLV), siṣ-aorist 'исключительно P.' (Урок XLVI), intensive I 'исключительно P.' / intensive II 'исключительно Ā.' (Урок XLVIII); DCS Benedictive Medium = 221 tokens (0.03%)"
    ref: "Whitney §829ff (root aorist active), §911 (siṣ-aorist active only); Bühler's own Уроки XLV, XLVI, XLVIII"
    verdict_pedagogy: MISLEADING
    note: >-
      The Урок-I absolute is contradicted by the book's own later lessons: several formations
      are voice-defective (root and siṣ-aorists parasmaipada-only, the two intensives each
      single-voice). A beginner-facing simplification, but of the exact universality-overreach
      type the register tracks — the counter-classes are in the same book.

  - id: HB-3
    loc: "Урок I / mdx line 129"
    claim_ru: >-
      Первые четыре производятся от особой основы настоящего времени, образуемой от
      корней десятью различными способами. Корни по этому делятся на десять классов.
    kind: typology
    falsifiable_as: "exactly the first four categories are built on the present stem; roots divide into 10 present classes"
    sources: [whitney, dcs]
    verdict_fact: TRUE
    number: "systemic: pres/impf/impv/opt share the present stem; the 10-class division is the native (Dhātupāṭha) taxonomy. DCS present-system tokens: thematic classes I/IV/VI/X = 540,340 = 70.2%; athematic 229,222; class II alone 154,301 (20.1%)"
    ref: "Whitney §527, §601ff (conjugation classes); DCS verb_classes.json via verify_claims_dcs.py"
    verdict_pedagogy: JUSTIFIED
    mg_footnote: >-
      Доля классов по DCS-2021: тематические классы (I, IV, VI, X) покрывают 70,2 %
      словоупотреблений системы настоящего времени; из атематических львиная доля у II класса
      (20,1 %). Десять классов равноправны в таксономии, но не в текстах.
    note: >-
      Correct systemic statement. The M.G. footnote adds what the taxonomy hides: two of the
      ten classes (I and II) carry most of the running text.

  - id: HB-4
    loc: "Урок I / mdx line 145"
    claim_ru: >-
      Конечные s и r слов, стоящих в конце предложений, всегда превращаются в
      висаргу, : = ḥ, обыкновенно также и перед k, kh, p, ph и перед шипящими
      [ś, ṣ, s].
    kind: universality
    falsifiable_as: "final s/r -> visarga: categorical pause-finally, usual (not exceptionless) before k/kh/p/ph and sibilants"
    sources: [whitney]
    verdict_fact: TRUE
    number: "systemic: pause-final s/r are categorically replaced by visarga; before k/kh/p/ph and sibilants the visarga stands or (before sibilants) optionally assimilates — Bühler's 'обыкновенно' hedges exactly the optional zone"
    ref: "Whitney §§170-172"
    verdict_pedagogy: JUSTIFIED
    note: >-
      A model calibration: the categorical part ('всегда') is where the rule is categorical,
      the hedge ('обыкновенно') is where variants exist. Contrast the unhedged Урок-I voice
      claim (HB-2).

  - id: HB-5
    loc: "Урок II / mdx line 267"
    claim_ru: >-
      Допускают 1ую степень повышения все гласные, стоящие на конце корня, а также
      краткие гласные, после которых стоит лишь один согласный.
    kind: rule
    falsifiable_as: "guna eligibility = root-final vowels + light medial vowels (short vowel before single consonant)"
    sources: [whitney]
    verdict_fact: TRUE
    number: "systemic: the classical guṇa-eligibility (laghu) rule — final vowels and short medial vowels before one consonant strengthen; long medial vowels and position-heavy vowels do not"
    ref: "Whitney §§235, 240"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Matches Whitney's statement of the same restriction. One of the earliest points where
      Bühler gives the learner a real generalisation instead of a paradigm to memorise.

  - id: HB-6
    loc: "Урок II / mdx line 313"
    claim_ru: >-
      a или ā + a или ā = ā; a или ā + i или ī = e; a или ā + u или ū = o; a или ā +
      ṛ = ar; a или ā + o или au = au; a или ā + e или ai = ai
    kind: rule
    falsifiable_as: "the a/ā vowel-sandhi table yields exactly ā, e, o, ar, au, ai"
    sources: [whitney, dcs]
    verdict_fact: TRUE
    number: "systemic (Whitney §§126-127); corpus side: a a → ā is the single most frequent external sandhi junction in the DCS-derived corpus_sandhi table (rank #1 of 9,840, 6.12% of all junctions — H917 dataset)"
    ref: "Whitney §§126-127; kosha corpus_sandhi.tsv (vendored in src/components/talmud/sandhiFrequency.js)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Exceptionless as stated. The corpus adds a priority argument: a/ā-coalescence junctions
      dominate real text, so fronting this table in Урок II is frequency-correct ordering.

  - id: HB-7
    loc: "Урок II / mdx line 325"
    claim_ru: >-
      Суффиксальный s, за которым следует гласный, n, m, y или v, превращается в ṣ,
      если предшествует ему какой-нибудь иной гласный чем a или ā либо
      непосредственно, либо будучи отделен висаргой или анусварой
    kind: allomorphy
    falsifiable_as: "ruki-type retroflexion of suffixal s (with visarga/anusvara transparency)"
    sources: [whitney]
    verdict_fact: TRUE
    number: "systemic: the ruki rule incl. the transparency of intervening anusvāra/visarga (agniṣu, deveṣu, havīṅṣi)"
    ref: "Whitney §§180-183"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Precise, including the non-obvious transparency clause most beginner grammars omit.

  - id: HB-8
    loc: "Урок III / mdx line 440"
    claim_ru: >-
      Родительный обозначает всякого рода принадлежность (Genitivus subjectivus,
      objectivus и partitivus).
    kind: universality
    falsifiable_as: "do all genitive uses reduce to possession-type relations"
    sources: [whitney, dcs]
    verdict_fact: OVERSTATED
    number: "the adnominal-possessive account covers the majority, but standard non-possessive genitives exist: genitive with verbs, genitive absolute, genitive of time; DCS case tokens: Gen = 1,050,398 (sg 725,761 / pl 300,296), the 3rd most frequent case"
    ref: "Whitney §§294-300 (esp. §300b genitive absolute); DCS tense_case_data.json cases"
    verdict_pedagogy: JUSTIFIED
    note: >-
      'Всякого рода принадлежность' is a serviceable Урок-III approximation, but the quantifier
      'всякого рода' overreaches: the genitive absolute and verbal-government genitives are not
      possession. Defensible didactically, flagged factually — same pattern as Kochergina's
      hedged universals.

  - id: HB-9
    loc: "Урок V / mdx line 675"
    claim_ru: >-
      Конечная висарга превращается а) перед c и ch в ś; б) перед ṭ и ṭh в ṣ; в)
      перед t и th в s
    kind: rule
    falsifiable_as: "visarga assimilates to the sibilant homorganic with a following voiceless stop"
    sources: [whitney]
    verdict_fact: TRUE
    number: "systemic: visarga → ś/ṣ/s before the palatal/retroflex/dental voiceless stops respectively"
    ref: "Whitney §172"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Exceptionless as stated.

  - id: HB-10
    loc: "Урок V / mdx line 687"
    claim_ru: >-
      Предлог ā «до, вплоть до, начиная от» согласуется с Acc. или Abl.
    kind: rule
    falsifiable_as: "does adpositional ā govern the accusative in addition to the ablative"
    sources: [whitney]
    verdict_fact: OVERSTATED
    number: "Whitney gives ā ('hither from; all the way to') with the ABLATIVE only (ā samudrāt); accusative government of ā is not the classical norm"
    ref: "Whitney §1128"
    verdict_pedagogy: MISLEADING
    note: >-
      The ablative half is standard; the accusative half lacks support in the reference
      grammar. Possibly an editorial slip of the Russian edition (cf. German prepositional
      habits) — worth an errata check against the 1923 print. Flagged per the D-B rule: Whitney
      is the systemic authority here.

  - id: HB-11
    loc: "Урок VI / mdx line 795"
    claim_ru: >-
      Следующие корни удлиняют свой краткий a: kram, tam, dam, mad, śam, śram, bhram.
      Последний образует также bhramyati.
    kind: typology
    falsifiable_as: "the inventory of class IV roots with lengthened ā in the present"
    sources: [whitney]
    verdict_fact: TRUE
    number: "systemic: krāmyati, tāmyati, dāmyati, mādyati, śāmyati, śrāmyati, bhrāmyati/bhramyati; Whitney's parallel list adds klam (klāmyati) to the same class"
    ref: "Whitney §763"
    verdict_pedagogy: JUSTIFIED
    note: >-
      The seven listed roots all lengthen; the list is not exhaustive (klam belongs too), but
      Bühler does not claim exhaustiveness. The bhramyati doublet is real.

  - id: HB-12
    loc: "Урок VII / mdx line 936"
    claim_ru: >-
      Конечный t превращается в d перед начальными гласными и звонкими g, gh, d, dh,
      b, bh, y, r, v, h
    kind: rule
    falsifiable_as: "final t voices to d before vowels and voiced non-nasal initials"
    sources: [whitney]
    verdict_fact: TRUE
    number: "systemic: regressive voicing assimilation of final t (meghād atra, tasmād gṛhāt); before h the further step d+h → ddh is optional (Урок XXIV line 3179 states it)"
    ref: "Whitney §§159-163"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Categorical and correctly stated at the categorical altitude.

  - id: HB-13
    loc: "Урок VIII / mdx line 1042"
    claim_ru: >-
      Но очень многие глаголы спрягаются только в Ātm., и, таким образом, подобно греческим
      Media, являются Deponentia
    kind: statistic
    falsifiable_as: "the media-tantum (deponent) class is large"
    sources: [whitney]
    verdict_fact: TRUE
    number: "systemic: the middle-only class is large and standard (ās 'сидеть', īkṣ, labh, mud, śī, sev, vand, man...); no voice-tagged root census in the DCS export to give an exact share"
    ref: "Whitney §529, §§775-776 (middle-only verbs)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      'Очень многие' is right in direction; a precise count would need a voice-tagged root
      inventory (Whitney's Roots / Dhātupāṭha join) that the current DCS export does not
      supply — the number axis stays qualitative, honestly.

  - id: HB-14
    loc: "Урок VIII / mdx line 1066"
    claim_ru: >-
      Для ī, ū и e двойств. ч. глаголов и имен, а также для состоящих из одного гласного
      односложных междометий, не допускается эвфоническое слияние со следующими за ними гласными
    kind: universality
    falsifiable_as: "dual ī/ū/e and single-vowel interjections are pragrhya (exempt from vowel sandhi)"
    sources: [whitney]
    verdict_fact: TRUE
    number: "systemic: the pragṛhya class — duals in ī/ū/e, interjection vowels (also amī, Урок XXVII) are sandhi-exempt"
    ref: "Whitney §138"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Matches the pragṛhya inventory; Bühler adds the remaining member (amī) at Урок XXVII,
      so the class is complete across the book.

  - id: HB-15
    loc: "Урок IX / mdx line 1189"
    claim_ru: >-
      Обычно пишут ā вместо ai, но āv вместо au
    kind: statistic
    falsifiable_as: "before vowels, -ai usually surfaces as ā (y dropped) while -au usually keeps its glide as āv"
    sources: [whitney]
    verdict_fact: TRUE
    number: "systemic: Whitney — the y of āy (< ai) is 'more usually' dropped, while the v of āv (< au) is generally retained; asymmetric exactly as Bühler writes it"
    ref: "Whitney §§133-134"
    verdict_pedagogy: JUSTIFIED
    note: >-
      A hedged frequency claim ('обычно') that matches the reference description of the
      asymmetry. The corpus surface text cannot separate the two spellings' inputs without
      re-deriving the sandhi split, so Whitney adjudicates.

  - id: HB-16
    loc: "Урок IX / mdx line 1191"
    claim_ru: >-
      После кратких гласных, предлога ā и частицы mā начальный ch превращается в cch
    kind: rule
    falsifiable_as: "initial ch doubles to cch after short vowels and after ā/mā"
    sources: [whitney]
    verdict_fact: TRUE
    number: "systemic: gacchati iva → the cch doubling; conditioned exactly by short vowel / ā / mā"
    ref: "Whitney §227"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Standard rule, correctly conditioned.

  - id: HB-17
    loc: "Урок IX / mdx line 1193"
    claim_ru: >-
      Начальный n в большинстве корней обращается в ṇ после приставок antaḥ(r), niḥ(s), parā,
      pari, pra и duḥ(s)
    kind: allomorphy
    falsifiable_as: "root-initial n retroflexes after r/s-containing preverbs in most roots"
    sources: [whitney]
    verdict_fact: TRUE
