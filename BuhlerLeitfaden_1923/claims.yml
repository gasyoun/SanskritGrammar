    ref: "Whitney §131 (e/o before vowels → ay/av)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Exceptionless internal-sandhi mechanics; *jeati-type forms do not exist.

  - id: HB-69
    loc: "Урок II / mdx line 273"
    claim_ru: >-
      Корни, оканчивающиеся на один только согласный, перед которым стоят краткие гласные i, u, ṛ или ḷ также заменяют их соответственным guṇa
    kind: allomorphy
    falsifiable_as: "Class I roots with short i/u/ṛ/ḷ before a single final consonant should show guna in the present (cetati, bodhati, varṣati); exceptions refute"
    sources: [whitney]
