    ref: "Whitney §777 (uses of the present)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Inventory claim, not a proportion claim; all three uses are canonical. Measuring their corpus shares would need semantic tagging, which the claim does not assert.

  - id: HB-67
    loc: "Урок II / mdx line 269"
    claim_ru: "Корни I кл., оканчивающиеся на i, ī, u, ū, ṛ, ṝ заменяют их соответствующим guṇa - e, o, ar"
    kind: allomorphy
