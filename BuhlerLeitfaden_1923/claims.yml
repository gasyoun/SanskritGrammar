    ref: "Whitney 1889 (negated gerunds); Pāṇini 7.1.37"
    verdict_pedagogy: JUSTIFIED
    note: >-
      A possibility universal ('может быть приставлено') with no exception class; the example pair quietly teaches the tvā-retention rule after nañ.

  - id: HB-234
    loc: "Урок XXX / mdx line 4123"
    claim_ru: >-
