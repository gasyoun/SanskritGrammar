  - id: HB-397
    loc: "Урок XLVIII / mdx line 7211"
    claim_ru: >-
      В fut., condic. и precat. (Ā.) всегда вставляется соединительный гласный i; аорист образуется V вида.
    kind: universality
    falsifiable_as: "Desiderative future/conditional/precative always take connecting i and the aorist is of the is-type (Whitney 1032-1034); an anit desiderative future refutes"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: cikīrṣiṣyati, śuśrūṣiṣyate-type — the derived (secondary) conjugations are uniformly seṭ, and the aorist is the iṣ-type (acikīrṣīt)
    ref: "Whitney §§1032-1034 territory"
    verdict_pedagogy: JUSTIFIED
    note: >-
      The blanket seṭ character of derived-conjugation tense stems is standard doctrine; no aniṭ desiderative future is recorded.

  - id: HB-398
    loc: "Урок XLVIII / mdx line 7275"
    claim_ru: "Сходные формы можно образовывать от всех корней на iv."
    kind: universality
    falsifiable_as: "All roots in -iv form double desideratives of the didevisati/dudyusati type (Whitney 1030 on div); an iv-root lacking the u-type refutes"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: div → dudyūṣati / dideviṣati is the model; the iv→yū treatment is a general grammarians' provision for iv-final roots (Pāṇini 6.4.19 territory)
    ref: "Whitney 1889 (desiderative of div-type roots, §1030 territory); cf. OCH-49/OCH-50/HB-62"
    verdict_pedagogy: JUSTIFIED
    note: >-
      A possibility claim («можно образовывать») per the grammarians; corpus attestation of such doublets is effectively nil, so the grade rests on the reference grammar alone, which records no iv-root excluded from the provision.

  - id: HB-399
    loc: "Урок XLVIII / mdx line 7319"
    claim_ru: >-
      Все односложные корни первых девяти классов, начинающиеся с согласных, могут образовывать два интенсива (фреквентатива), чтобы выразить повторение действия.
    kind: universality
    falsifiable_as: "Intensives (two types) formable from all consonant-initial monosyllabic roots of classes I-IX, excluding class X (Whitney 1000-1002); the class restriction and the two-type inventory are checkable"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
      systemic: Pāṇini 3.1.22 (dhātor ekāco halādeḥ ... yaṅ) restricts the intensive to monosyllabic consonant-initial roots; class X is excluded as derived; the two types are yaṅ (bobhūyate) and yaṅ-luk (bobhoti)
    ref: "Whitney §§1000-1002; cf. HB-63/OCH-51 (intensive)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      A possibility («могут») claim per the grammarians; Bühler's own footnote (mdx 7321) lists the traditional vowel-initial exceptions aṭāṭyate, arāryate, aśāśyate, so the restriction is stated with its standard leaks. Attested intensives are a small subset of the formable ones.

  - id: HB-400
    loc: "Урок XLVIII / mdx line 7319"
    claim_ru: >-
      Интенсив глаголов значения „идти" обозначает движение по кривой линии, у некоторых других глаголов он указывает, что действие совершается плохо.
    kind: rule
    falsifiable_as: "Intensives of motion verbs denote crooked/repeated movement and sometimes pejorative action — checkable against Whitney 1000 and Panini 3.1.22-24 semantics and DCS usage"
    sources: [whitney]
    verdict_fact: UNTESTABLE
    number: >-
      missing instrument: semantic tagging — no corpus means of verifying 'crooked movement' or pejorative readings of intensive tokens; the gap is confirmed programme-wide (OCH-63, KZ blocker analog for semantics)
    ref: "Whitney §1000 territory; Pāṇini 3.1.23-24 (kauṭilya of motion verbs, garhā)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Faithfully reproduces Pāṇini 3.1.23-24 as traditional doctrine, so it is not an error of Bühler's; but as a claim about actual usage semantics it cannot be corpus-checked without semantic tagging.

  - id: HB-401
