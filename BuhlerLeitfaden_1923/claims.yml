    ref: "Whitney 1889 (gerunds in prepositional value)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      'Некоторые' correctly limits the claim to the grammaticalized subset; the phenomenon is uncontroversial.

  - id: HB-233
    loc: "Урок XXIX / mdx line 4035"
    claim_ru: >-
      Перед всеми abs. может быть приставлено a privativum (a, an), напр. alabdhvā „не получив", anāhūya „не призвав".
    kind: universality
    falsifiable_as: "Privative a/an- attaches to gerunds of both types (alabdhvā, anāhūya) without restriction — attested negated gerunds of both -tvā and -ya types confirm"
    sources: [whitney]
    verdict_fact: TRUE
    number: >-
