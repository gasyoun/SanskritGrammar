    verdict_pedagogy: JUSTIFIED
    note: >-
      Accurate for the classical language Bühler teaches; the Vedic infinitive variety is out of scope for the book.

  - id: HB-235
    loc: "Урок XXX / mdx line 4127"
    claim_ru: >-
      а) ко всем почти односложным корням, оканчивающимся на гласный, за исключением корней на ū и ṝ. Конечные дифтонги e, ai, o изменяются в ā
    kind: statistic
