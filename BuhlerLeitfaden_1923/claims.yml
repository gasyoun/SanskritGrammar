      grammars agree, and the corpus agrees with both. VERDICT RECONCILIATION: the concurrent
      seed pass (BU-2, Sonnet 5) read «совершенно равноправно» as FREQUENCY parity and graded
      the claim FALSE (aorist 0.31% is ~20× rarer than either competitor). Rejected here: the
      same clause calls the aorists «редких форм» — Bühler himself asserts the rarity, so
      «равноправно» can only mean functional/semantic interchangeability (which Whitney §928
      confirms for the classical language), not equal frequency. The parity reading would make
      the sentence self-contradictory. The ambiguity is real and worth a reading-site gloss;
      the frequency number stands either way.

  - id: HB-62
