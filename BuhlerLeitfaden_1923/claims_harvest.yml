#
# Yield note: this textbook is far more paradigm-table-dense than Kochergina's (each reader
# flagged low density in the pure-conjugation/declension-table lessons — e.g. Уроки XXXVII-XLI
# turned up nothing beyond tables) — falsifiable discursive prose runs roughly 1 claim per
# 150-250 lines here vs. Kochergina's 60-80, so 45 candidates over ~7,350 lines of grammar prose
# is the honest full-book yield, not a partial sweep.
#
# buhler_gives_number: true  = he states a quantity/frequency (verify it)
#                       false = he gives none (add an M.G. footnote where computable, or verify
#                               via Whitney systemic citation)
#
# Most entries need either (a) a corpus query this pass didn't build yet (compound-formation and
# sandhi-outcome claims need text-level string search, not the aggregate tense/case/verb-class
# tables used for BU-1..BU-5), or (b) a Whitney §-citation not yet located. Continue the drain
# the same way H797 Phase 1 drained Kochergina's backlog: verify a batch, promote, repeat.

