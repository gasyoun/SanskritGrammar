# 15,756-line mdx by 6 parallel readers, in reading order. Each entry is a CANDIDATE awaiting
# the two-axis verdict — verdict_fact is PENDING until a verifier fills the number.
#
# build_claims.py renders these in a "Harvest backlog (pending verification)" section beneath the
# verified table, so the register shows both what is confirmed and what is queued.
#
# Workflow: a verifier (Fable/Opus) takes a block, computes the DCS/Whitney number via
# verify_claims_dcs.py, fills verdict_fact + number + verdict_pedagogy, and PROMOTES it into
# claims.yml (removing it here). Where Kochergina gives no number (kochergina_gives_number:false)
# and one is computable, add an mg_footnote (frequency added by M.G.).
#
# kochergina_gives_number: true  = she states a quantity/frequency (verify it)
#                          false = she gives none (add it as an M.G. footnote where computable)

