  - id: HK-207
    loc: Занятие XXXVII / mdx line 9614
    claim_ru: Аорист редко при повествовании, чаще в разговорной речи, диалоге (драмы).
    kind: statistic
    falsifiable_as: aorist token frequency in narrative vs dialogue/drama registers in DCS
    sources:
    - dcs
    - whitney
    verdict_fact: UNTESTABLE
    number: >-
      SIZED, not "no instrument" (16-07-2026, aorist_register_probe.py, H1040): checked
      the full 270-text DCS inventory first — DCS carries ZERO drama/nāṭaka texts (no
      Śakuntalā, no Mṛcchakaṭikā, no Bhāsa play; Nāṭyaśāstra is a treatise ABOUT
      dramaturgy, not a play), so the literal comparison set the claim names does not
      exist in this corpus at all, full stop. Built a structural genre PROXY instead —
      the classical Upaniṣads as a catechism-dialogue text-class (Bṛhadāraṇyaka,
      Chāndogya, Kaṭha, Kauṣītaki, Śvetāśvatara, Muṇḍaka, Taittirīya, Aitareya) vs
      Brāhmaṇa+Śrautasūtra ritual-prescriptive prose as a narrative/procedural class —
      using DCS-2026's own aorist-specific feat_formation tags (root/them/s/is/red/sa/sis
      under feat_tense=Past, excluding the untagged Past remainder H1000/OCH-68 found
      dominated by the untagged reduplicated perfect). Result: dialogue proxy 1.14%
      aorist share of verbal tokens (91/8,010) vs narrative proxy 1.33% (1,530/114,924)
      — ratio 0.85, the OPPOSITE direction from the claim, though both sit close to the
      whole-corpus baseline (1.20%, 12,054/1,007,361) and epic (Mahābhārata+Rāmāyaṇa,
      genuinely mixed narration+dialogue, reported separately) sits lower still (0.84%).
      This null result does NOT refute Whitney's actual philological observation about
      DRAMATIC dialogue specifically — Upaniṣadic catechism is formulaic ritual prose,
      not the colloquial/naturalistic register Whitney means, so the proxy substitution
      is itself questionable, not just the measured direction
    ref: >-
      Whitney §928 (aorist's recent-past / conversational value); DCS has no drama texts
      to test the literal claim (checked, not presumed); KocherginaUchebnik_1998/aorist_register_probe.py;
      hk207_aorist_register_stats.json
    verdict_pedagogy: JUSTIFIED
    note: >-
      A known philological observation (the classical aorist survives chiefly in
      dialogue/drama as a recent past) that this corpus genuinely cannot test — not
      because no instrument was built, but because the referent (drama) isn't in DCS at
      all, and the best available structural stand-in (Upaniṣad dialogue-frame vs
      Brāhmaṇa/Śrautasūtra prescriptive prose) measures something adjacent, not
      identical, to what the claim means. Recorded as a sized negative pilot so the
      proxy is never re-derived as if it settled the question either way.

