  # ============================================================================

  - id: HK-7
    loc: "Занятие III / mdx line 635"
    claim_ru: "Для системы гласных санскрита характерно преобладание гласных a и ā."
    kind: statistic
    falsifiable_as: "vowel-frequency distribution over the corpus: a+ā share vs all other vowels"
    sources: [dcs, whitney]
    verdict_fact: TRUE
    number: "systemic: a/ā are by far the most frequent Sanskrit vowels — the inherent stem/thematic -a plus the PIE *e/*o/*a → a merger concentrate the vowel inventory on a-quality"
    ref: "Whitney §17-22 (a the most frequent vowel; ā its long counterpart)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      A clean, uncontroversial statistic. Not separately recomputed as a phoneme census here (the
      DCS-2021 relational export is lemmatised, not a running-text phoneme stream), but the a/ā
      dominance is one of the most robust facts about the language. No overreach.

  - id: HK-8
    loc: "Занятие IV / mdx line 806"
    claim_ru: "ṝ и ḷ употребляются очень редко, ḹ практически не употребляется."
    kind: statistic
    falsifiable_as: "counts of ṝ, ḷ, ḹ; verify ḹ ≈ 0 (essentially only the grammarians' kḷp-forms)"
    sources: [dcs, whitney]
    verdict_fact: TRUE
    number: "ḹ is attested essentially only in the grammarians' artificial root kḷp̄- (near-zero corpus occurrence); ṝ and ḷ are marginal syllabic sonants confined to a handful of roots"
    ref: "Whitney §23-24 (ṛ common, ṝ/ḷ rare, ḹ a grammarians' fiction)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Accurate and well-calibrated: ḹ is famously all but non-existent, ṛ (the common one) is
      correctly separated from its rare long/lateral congeners. A model 'rare form flagged as rare'.

  - id: HK-9
    loc: "Занятие V / mdx line 1073"
    claim_ru: >-
      Шумный глухой t ... перед шумными звонкими ... а также перед y, r, v и перед гласными
      изменяется в звонкий d.
    kind: rule
    falsifiable_as: "final -t voices to -d before voiced stops / semivowels / vowels (Whitney §159)"
    sources: [whitney, dcs]
    verdict_fact: TRUE
    number: "systemic external sandhi: final voiceless stop → voiced before any voiced sound (Whitney §159); the t→c/ṭ/l assimilations before palatal/cerebral/l are the companion rules (§202-203)"
    ref: "Whitney §159 (final-stop voicing), §202-203 (assimilation)"
    verdict_pedagogy: JUSTIFIED
    note: "Textbook-standard sandhi, stated correctly and categorically. A good TRUE/JUSTIFIED anchor."

  - id: HK-10
    loc: "Занятие VI / mdx line 1251"
    claim_ru: >-
      Имеются слова, никогда не носящие на себе ударение: частицы, краткие (энклитические) формы
      местоимений и verbum finitum в середине предложения.
    kind: universality
    falsifiable_as: "is the finite verb *never* accented — or only unaccented in a principal clause"
    sources: [whitney]
    verdict_fact: OVERSTATED
    number: "systemic: enclitic particles and short pronoun forms are genuinely accentless, but the finite verb is unaccented ONLY in a principal clause — it IS accented in a subordinate clause and when sentence-initial (Whitney §168)"
    ref: "Whitney §92-94 (enclitics), §168 (verb accent: principal- vs subordinate-clause)"
    verdict_pedagogy: MISLEADING
    note: >-
      The particles/enclitics half is right, but 'verbum finitum ... никогда' overshoots: the very
      condition that makes the verb accentless (principal clause, non-initial) is exactly what the
      absolute 'никогда' hides. A learner told the verb is 'never' accented will misread accented
      Vedic subordinate clauses. The parenthetical 'в середине предложения' half-corrects it but the
      universal wording dominates.

  - id: HK-11
    loc: "Занятие VI / mdx line 1272"
    claim_ru: "Перед звонкими согласными (кроме r) и перед гласными (но не после ā̆) -s изменяется в -r."
    kind: rule
    falsifiable_as: "final -s → -r before voiced onset only after a non-a/ā vowel (agnir bhāṣate)"
    sources: [whitney, dcs]
    verdict_fact: TRUE
    number: "systemic: the '(но не после ā̆)' carve-out is exactly Whitney's condition — -as/-ās go to -o/-ā (elision), other -Vs go to -r before voiced"
    ref: "Whitney §174-178 (final s-sandhi; the -as/-ās exception)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Precisely stated, including the crucial ā̆-exception that beginners usually miss. The rule is a
      well-formed categorical statement, not an overreach.

  - id: HK-12
    loc: "Занятие IX / mdx line 1707"
    claim_ru: >-
      Существительные с основой на -a составляют большую часть всех существительных ... Склонение
