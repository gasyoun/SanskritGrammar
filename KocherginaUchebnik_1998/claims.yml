  - id: HK-6
    loc: "Занятие XXIV / mdx line 5862"
    claim_ru: >-
      Пассивные причастия настоящего времени склоняются как основы на -a мужского и среднего рода;
      причастия женского рода образуются удлинением конечной -a и склоняются как основы на -ā.
    kind: rule
    falsifiable_as: "do present passive participles inflect as -a/-ā thematic stems"
