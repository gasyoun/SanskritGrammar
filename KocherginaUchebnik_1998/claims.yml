    sources: [whitney, dcs]
    verdict_fact: TRUE
    number: "systemic (Grassmann's law in reduplication): the reduplicating consonant of an aspirate-initial root is always the unaspirated counterpart — bhid→bibhid, dhā→dadhā"
    ref: "Whitney §590b (deaspiration in reduplication)"
    verdict_pedagogy: JUSTIFIED
    note: "A fully general phonological rule, correctly stated. Anchor."

  - id: HK-25
    loc: "Занятие XXI / mdx line 4996"
    claim_ru: "Формы простого перфекта образуются от всех односложных глагольных корней, начинающихся с согласной или с a, i, u и ṛ."
    kind: universality
    falsifiable_as: "does every such monosyllabic root build a reduplicated (not periphrastic) perfect"
    sources: [whitney, dcs]
    verdict_fact: OVERSTATED
    number: "exceptions exist: vid 'know', ās 'sit', and several long-vowel/derivative-heavy monosyllables take the periphrastic perfect (-ām + auxiliary), so 'от всех' is too strong"
    ref: "Whitney §790 (reduplicated perfect), §1070-1071 (periphrastic perfect roots)"
    verdict_pedagogy: MISLEADING
    note: >-
      The reduplicated perfect is indeed the default for this shape-class, but the absolute 'от всех'
      hides the periphrastic-perfect roots the learner meets almost immediately (vid, ās). A 'as a
      rule, with a short exception list' framing would be accurate.

  - id: HK-26
    loc: "Занятие XXI / mdx line 5016"
    claim_ru: >-
