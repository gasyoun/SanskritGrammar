    claim_ru: Класс II (корневой) постепенно делается непродуктивным.
    kind: statistic
    falsifiable_as: Declining class-II present frequency across chronological DCS strata
    sources:
    - dcs
    - whitney
    verdict_fact: 'TRUE'
    number: 'the root class (II) is unproductive as a type: in DCS-2021 its 154,301 present-system tokens are carried
      by a handful of frozen high-frequency roots (as, vac, brū, yā, i, …), not by an open, growing set — token-frequent
      but lexically closed'
    ref: Whitney §611ff (root class); DCS verify_claims_dcs.py HK18_verb_class_share (class II)
    verdict_pedagogy: JUSTIFIED
    mg_footnote: 'Класс II в DCS-2021 даёт 154 301 словоформу, но это несколько замороженных высокочастотных корней
      (as, vac, brū, yā и др.), а не продуктивный тип: новых глаголов класс не пополняет. Высокая частотность при закрытом
      составе — как раз признак непродуктивности.'
    note: Historically accurate (the root class stopped taking new members); the corpus caveat is that class II is still
      token-frequent because its few surviving roots are extremely common. Productivity ≠ frequency.

