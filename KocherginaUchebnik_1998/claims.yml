# claims.yml — verifiable-assertion register for KocherginaUchebnik_1998
#
# GENERATED target: CLAIMS_VERIFIED.md (via scripts/build_claims.py) — never edit that file.
#
# DISTINCT from errata.yml: errata catalogues typos in the print; this register catalogues
# *falsifiable grammatical assertions* in Kochergina's Учебник санскрита (1998) and grades each
# on TWO axes (H768):
#   verdict_fact     — is the assertion true vs. corpus + reference grammars, with the actual number?
#   verdict_pedagogy — is the *presentation* defensible (ordering, foregrounding, hidden frequency)?
#
# Ground truth (triangulation, D2): DCS-2021 corpus statistics (Oliver Hellwig, CC BY, via
#   ../VisualDCS) reproduced by KocherginaUchebnik_1998/verify_claims_dcs.py; Whitney 1889
#   (systemic grammatical fact, by §); Tolchelnikov-Talmud 2026 (root morphoclass).
# SOURCE-CONFLICT TIE-BREAK (D-B, CONFIRMED by MG 12-07-2026): when Talmud, Whitney and DCS
#   disagree, DCS is authority for *frequency/attestation*, Whitney for *systemic grammatical
#   fact*, Talmud for *root-morphoclass* — and flag the disagreement in the entry, never silently
#   pick.
#
# verdict_fact:     TRUE | OVERSTATED | FALSE | UNTESTABLE | PENDING (harvested, not yet verified)
# verdict_pedagogy: JUSTIFIED | MISLEADING | RARE-AS-CENTRAL | FREQUENCY-HIDDEN | ORDER-QUESTIONABLE
# kind:             typology | universality | allomorphy | statistic | rule
# mg_footnote:      (optional) corpus frequency ADDED BY M.G. where Kochergina states no number —
#                   scholarly apparatus rendered over the reading site, not part of the 1998 text.
#
# COVERAGE (H768 seed + H797 full drain): HK-1..HK-233 — the complete two-axis verification of
# the 223-candidate full-textbook harvest (all 40 Занятия, lesson order). The verb-system seed
# HK-1..HK-6 (PR #119) and the first sweep HK-7..HK-42 (PR #134) landed under H768; H797
# (12-07-2026) drained the remaining backlog to zero, promoting HK-43..HK-233 in seven
# lesson-ordered batches. Numbers are either reproducible DCS-2021 statistics (verify_claims_dcs.py:
# vowel census, verb-class share, case distribution, tense/mood token counts) or systemic facts
# adjudicated against Whitney 1889; M.G. frequency footnotes were added where Kochergina gives no
# number and the corpus supplies one. This file = the VERIFIED register (234 entries; HK-4 splits
# into HK-4a universality + HK-4b allomorphy, so the max numbered id is HK-233; 0 pending).
# The now-drained HARVEST BACKLOG is in claims_harvest.yml (candidates: [] — fully promoted).
#
# Entry shape: see the four seed hypotheses (HK-*) below.

work: "Kochergina, Учебник санскрита (Sanskrit textbook), 1998"

# P3 methodology axis — synthesis of Kochergina's presentation principles (rendered into
# CLAIMS_VERIFIED.md by build_claims.py). Are her choices of ordering / foregrounding / hedging
# defensible, on the evidence of the full-textbook harvest below?
synthesis: >-
  On the full 40-lesson sweep, the headline of the verb-system pilot holds and sharpens:
  Kochergina's *factual accuracy is high* — the large majority of registered assertions are TRUE
  against the DCS-2021 corpus and Whitney 1889 — and her failures are almost never errors of fact
  but of *calibration*. Her presentation principle is the paradigm-completeness tradition of the
  Petersburg/Soviet school: give every form its rule and its exceptions, ordered by the grammatical
  system, and trust the learner to drill the tables. That principle is well-suited to accuracy and
  to reading the classical language, and it produces the many clean TRUE/JUSTIFIED anchors here
  (neuter N=A syncretism HK-13, one-final-consonant phonotactics HK-31, pronominal sarvam HK-30,
  the reduplication and passive-alignment rules).


  Two systematic failure modes recur across the whole book. **(1) Universality overreach.** The
  beginner-facing rule is stated with an absolute quantifier — "всегда", "только", "по единому
  правилу" — where a well-known exception class exists. The sharpest case is HK-16 ("основы на -ī и
  -ū всегда женского рода"), which is simply FALSE: masculine ī/ū-stems (rathī, senānī, sudhī,
  monosyllabic bhū-) are well attested; she means the derived nadī/vadhū class. The same overreach
  drives HK-10 (accentless finite verb "никогда" — but it IS accented in a subordinate clause,
  Whitney §595), HK-14/HK-34 (a-/compound gender "always" the final/derived value — bahuvrīhi gender
  tracks the referent, contradicted in her own lesson), HK-25 (simple perfect "от всех односложных"
  — vid/ās/long-vowel roots take periphrastic), HK-38 (root aorist "от некоторых -ā и bhū" — the
  attested root-aorist set is much wider), and HK-40 (double-preverb ordering "всегда"). **(2)
  Frequency-blindness.** The tradition orders material by systematic regularity, not by how often a
  form is actually met, so a canonical "base rule" is foregrounded over the statistically dominant
  realisation of it. HK-4 (future -syá taught as the single rule while the seṭ -iṣya is 56.8% of
  forms) is the template; HK-15 (imperfect "обычно" the narrative past — stratum-dependent), HK-19
  (class-IX "большинство носовой+согласная" — doubtful), HK-26, HK-32 all repeat it.


  A third, smaller bucket is genuinely **UNTESTABLE**: the precise percentages Kochergina asserts
  without a stated count base — HK-41 (prefixed-verb 60/30/<10% semantic split) and HK-42 (a-
  privative ≥1/3 of prefixed nouns, ~80% abstract). Directionally plausible, but not reproducible
  without her coding scheme; flagged rather than assumed. Where the corpus *can* adjudicate a
  frequency claim, it usually vindicates her: the conditional (HK-23, 0.03%), the middle precative
  (HK-39, 0.03%) and the 2nd-person imperative dominance (HK-17, 63%) all land where she says.


  Recommendation for the reading-site overlay: keep Kochergina's text intact (it is accurate) and
  badge the two failure modes — the FALSE/OVERSTATED universals with the counter-class, and the
  frequency-hidden claims with the corpus number — so the learner sees where an absolute rule has an
  escape hatch and where a "variant" is in fact the norm. The register generalises: the two axes are
  worth running on any grammar whose ordering predates corpus statistics (roadmap spine S1/S2).

entries:

  - id: HK-1
    loc: "Занятие XXXVII / mdx line 9616"
    claim_ru: >-
      Формы аориста образуются лишь от части корней. В ведийском языке аорист мог
      употребляться примерно от половины глагольных корней. Постепенно количество
      корней, употребляемых в формах аориста, уменьшается, и в санскрите аорист
      встречается редко.
    kind: statistic
    falsifiable_as: "aorist share of verbal tokens in DCS + is the Vedic→Classical decline real"
    sources: [dcs, whitney]
    verdict_fact: TRUE
    number: "690 distinct aorist forms; 2,452 aorist tokens = 0.31% of 781,618 verbal tokens (DCS-2021), vs present 157,003 (20.1%)"
    ref: "Whitney §824 (aorist recessive in classical); DCS verify_claims_dcs.py HK-1"
    verdict_pedagogy: JUSTIFIED
    note: >-
      A model presentation: Kochergina states *which* part (≈half in Vedic, receding to rare in
      Classical) and *why* (diachronic loss), matching the corpus (0.31% of verbal tokens). The
      hedge "лишь от части" is if anything an understatement of how marginal the aorist is in the
      classical corpus. No frequency hidden.

  - id: HK-2
    loc: "Занятие XXV / mdx line 6254"
    claim_ru: >-
      При склонении неопределенных местоимений изменяется только первая их часть, т.е.
      вопросительное местоимение; неизменяемые частицы (api, ca, cana, cid) прибавляются к
      падежной форме с соблюдением правил внешних сандхи.
    kind: rule
    falsifiable_as: "does only the ka-stem inflect while cid/cana/api stay invariant, joined by external sandhi"
    sources: [whitney, dcs]
    verdict_fact: TRUE
    number: "systemic: attested paradigm kaścid / kiṃcid / kenacid / kasmiṃścit — k-stem inflects, particle constant; joined by external sandhi (kaḥ+cid→kaścid, kim+cid→kiṃcid)"
    ref: "Whitney §507 (interrogative + ca/caná/cid/ápi → indefinite); Kochergina's own paradigm mdx 6256-6258"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Correct and stated at the right altitude. The particle is genuinely invariant and the junction
      is external sandhi; MG's existing kenacid counts in DCS confirm the attested paradigm. Nothing
      overstated.

  - id: HK-3
    loc: "Занятие XXV / mdx line 6234"
    claim_ru: >-
      Пассивное причастие будущего времени — причастие долженствования (participium necessitatis,
      pn.) — образуется прибавлением к корню суффиксов -ya, -(i)tavya или -anīya с одинаковым
      грамматическим значением (пассивность + модальность долженствования + будущее время).
    kind: typology
    falsifiable_as: "prevalence of the gerundive among verbal-derived forms + the three-suffix inventory"
    sources: [dcs, whitney]
    verdict_fact: TRUE
    number: "1,799 distinct gerundive forms; 23,942 tokens = 3.06% of verbal (DCS Fut.Pass.Part.). Suffix split by type: -ya 1046 / -tavya 523 / -anīya 230. cf PPP 233,080 tokens (29.82%)"
    ref: "Whitney §961-966 (gerundive -ya/-tavya/-anīya); DCS verify_claims_dcs.py HK-3"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Formation description and the three-suffix inventory are accurate. Answering MG's "насколько
      распространено": the gerundive is a real but minor category (3.06% of verbal tokens), and the
      simple -ya type outnumbers -tavya and -anīya together among distinct forms. Kochergina lists
      the suffixes without ranking them; a frequency note (-ya dominant) would improve it but nothing
      is misstated.

  - id: HK-4a
    loc: "Занятие XVIII / mdx line 4277"
    claim_ru: >-
      Основа будущего времени образуется от ВСЕХ глаголов по единому правилу — прибавлением к
      корню ударяемого суффикса -syá.
    kind: universality
    falsifiable_as: "is the future truly formed 'from all verbs by a single rule', or is -syá one of several conditioned outcomes"
    sources: [dcs, whitney]
    verdict_fact: OVERSTATED
    number: "future is productive (18,004 finite fut. tokens, 2,618 distinct forms) but NOT one rule: three conditioned suffixes -sya/-ṣya/-iṣya, and the seṭ form -iṣya is the majority (56.8% of distinct forms) — see HK-4b"
    ref: "Whitney §931-935 (s-future, seṭ/aniṭ -iṣya vs -sya); DCS verify_claims_dcs.py HK-4"
    verdict_pedagogy: MISLEADING
    note: >-
      "От всех глаголов" is defensible as a productivity/paradigm claim (the future is regularly
      formable). But "по единому правилу -syá" is overstated: the actual conditioning is the seṭ/aniṭ
      lexical class (whether a root takes the connecting -i-), not a single suffix. Presenting -syá as
      THE rule and -ṣya/-iṣya as mere "варианты" inverts corpus reality — see HK-4b. Ties to roadmap
      spine S2 (seṭ/aniṭ).

  - id: HK-4b
    loc: "Занятие XVIII / mdx line 4277"
    claim_ru: >-
      Корни на согласные могут иметь варианты этого суффикса -ṣya или -iṣya. Суффикс -sya
      прибавляется к корням на -ā, -ṣya — к корням на другие гласные, -iṣya — к корням на дифтонги
      или на -ar.
    kind: allomorphy
    falsifiable_as: "token+type counts of future stems in -sya / -ṣya / -iṣya in DCS; is -iṣya really a secondary 'variant'"
    sources: [dcs, whitney]
    verdict_fact: OVERSTATED
    number: "distinct future forms (DCS-2021): -iṣya 1,487 (56.8%) · -sya 652 (24.9%) · -ṣya 479 (18.3%). The seṭ form -iṣya is the single most common, not a marginal variant."
    ref: "Whitney §934-935 (union-vowel i in the s-future); DCS verify_claims_dcs.py HK-4"
    verdict_pedagogy: FREQUENCY-HIDDEN
    mg_footnote: "В корпусе DCS-2021 «вариант» -iṣya (seṭ) — самая частая форма будущего: 56,8% различных форм (1 487), против -sya 24,9% (652) и -ṣya 18,3% (479). То, что подано как исключение, на деле — норма."
    note: >-
      The three suffixes exist and the -ā→-sya rule holds, so the surface facts are right. But calling
      -ṣya/-iṣya "варианты" of a base -sya buries the corpus fact that -iṣya (seṭ) is the MAJORITY
      outcome (56.8%). The conditioning Kochergina gives is phonological (root-final sound), whereas the
      real predictor is the seṭ/aniṭ lexical class — a learner drilled on "-sya is the rule" will
      mis-predict the most common case.

  - id: HK-5
    loc: "Занятие XXXVII / mdx line 9655"
    claim_ru: >-
      II тип [аориста] — тематический простой аорист. Самый распространенный в санскрите тип
      аориста. Обычно образуется от корней на согласную.
    kind: statistic
    falsifiable_as: "is the thematic (a-)aorist the most frequent of the ~7 aorist types in DCS"
    sources: [dcs, whitney]
    verdict_fact: OVERSTATED
    number: >-
      MEASURED (16-07-2026, aorist_type_ranking.py, H1045): the DCS-2021 blocker
      ("tags aorist only as Act/Med, not by formation type") is stale — DCS-2026's
      feat_formation tag under feat_tense=Past distinguishes exactly Whitney's 7
      types (root=I, them=II thematic, red=III, s=IV, is=V, sis=VI, sa=VII), the
      same identification built for HK-207 (H1040). Result is GENUINELY MIXED, dug
      into with a genre split + a lexical-outlier check before verdicting (same
      diligence as OCH-66/67): **whole corpus, raw tokens — Type I root aorist
      leads (5,690) over Type II thematic (2,781), NOT close; whole corpus
      excluding bhū (which alone supplies ~38% of Type I's tokens as a near-
      auxiliary "was/became") — Type I STILL leads (3,346 vs 2,781); whole corpus
      by distinct-lemma count — Type IV s-aorist leads (216 lemmas), Type II is
      3rd (175).** Type II only comes out on top in a NARROWER reading: the
      classical (non-Vedic) text subset, EXCLUDING bhū specifically — there Type
      II leads both by token count (850 vs 724) and lemma-type count (58 vs 52).
      2 of 6 checks confirm Type II as top; 4 do not
    ref: >-
      Whitney §846-847 (a-aorist common, from roots in consonants); KocherginaUchebnik_1998/aorist_type_ranking.py;
      hk5_aorist_type_ranking.json; cf. HK-207/H1040 (same aorist-formation identification)
    verdict_pedagogy: JUSTIFIED
    note: >-
      Whitney's own account (and every grammar that repeats it) may well be right
      for Classical Sanskrit narrative specifically — the classical-subset,
      bhū-excluded reading (the closest analogue to what these grammars actually
      describe) DOES confirm it. But the flat, unqualified 'самый распространенный
      в санскрите' claim does not hold against this corpus as a whole: root aorist
      dominates by raw frequency (not merely a bhū artifact) and s-aorist is the
      most productive type by root count. Recorded as OVERSTATED — directionally
      defensible in the narrowest reading, not in the broad one actually stated.

  - id: HK-6
    loc: "Занятие XXIV / mdx line 5862"
    claim_ru: >-
      Пассивные причастия настоящего времени склоняются как основы на -a мужского и среднего рода;
      причастия женского рода образуются удлинением конечной -a и склоняются как основы на -ā.
    kind: rule
    falsifiable_as: "do present passive participles inflect as -a/-ā thematic stems"
    sources: [whitney]
    verdict_fact: TRUE
    number: "systemic: -māna/-yamāna participles are thematic -a stems, f. -ā — standard thematic declension"
    ref: "Whitney §1043 (present participles), §332ff (a-stems)"
    verdict_pedagogy: JUSTIFIED
    note: "Uncontroversial systemic fact; nothing to flag."

  # ============================================================================
  # Full-textbook harvest (H768 P1 continuation) — HK-7..HK-42, лесson order.
  # ============================================================================

  - id: HK-7
    loc: "Занятие III / mdx line 635"
    claim_ru: "Для системы гласных санскрита характерно преобладание гласных a и ā."
    kind: statistic
    falsifiable_as: "vowel-frequency distribution over the corpus: a+ā share vs all other vowels"
    sources: [dcs, whitney]
    verdict_fact: TRUE
    number: "systemic: a/ā are by far the most frequent Sanskrit vowels — the inherent stem/thematic -a plus the PIE *e/*o/*a → a merger concentrate the vowel inventory on a-quality"
    ref: "Whitney §17-22 (a the most frequent vowel; ā its long counterpart)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      A clean, uncontroversial statistic. Not separately recomputed as a phoneme census here (the
      DCS-2021 relational export is lemmatised, not a running-text phoneme stream), but the a/ā
      dominance is one of the most robust facts about the language. No overreach.

  - id: HK-8
    loc: "Занятие IV / mdx line 806"
    claim_ru: "ṝ и ḷ употребляются очень редко, ḹ практически не употребляется."
    kind: statistic
    falsifiable_as: "counts of ṝ, ḷ, ḹ; verify ḹ ≈ 0 (essentially only the grammarians' kḷp-forms)"
    sources: [dcs, whitney]
    verdict_fact: TRUE
    number: "ḹ is attested essentially only in the grammarians' artificial root kḷp̄- (near-zero corpus occurrence); ṝ and ḷ are marginal syllabic sonants confined to a handful of roots"
    ref: "Whitney §23-24 (ṛ common, ṝ/ḷ rare, ḹ a grammarians' fiction)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Accurate and well-calibrated: ḹ is famously all but non-existent, ṛ (the common one) is
      correctly separated from its rare long/lateral congeners. A model 'rare form flagged as rare'.

  - id: HK-9
    loc: "Занятие V / mdx line 1073"
    claim_ru: >-
      Шумный глухой t ... перед шумными звонкими ... а также перед y, r, v и перед гласными
      изменяется в звонкий d.
    kind: rule
    falsifiable_as: "final -t voices to -d before voiced stops / semivowels / vowels (Whitney §159)"
    sources: [whitney, dcs]
    verdict_fact: TRUE
    number: "systemic external sandhi: final voiceless stop → voiced before any voiced sound (Whitney §159); the t→c/ṭ/l assimilations before palatal/cerebral/l are the companion rules (§202-203)"
    ref: "Whitney §159 (final-stop voicing), §202-203 (assimilation)"
    verdict_pedagogy: JUSTIFIED
    note: "Textbook-standard sandhi, stated correctly and categorically. A good TRUE/JUSTIFIED anchor."

  - id: HK-10
    loc: "Занятие VI / mdx line 1251"
    claim_ru: >-
      Имеются слова, никогда не носящие на себе ударение: частицы, краткие (энклитические) формы
      местоимений и verbum finitum в середине предложения.
    kind: universality
    falsifiable_as: "is the finite verb *never* accented — or only unaccented in a principal clause"
    sources: [whitney]
    verdict_fact: OVERSTATED
    number: "systemic: enclitic particles and short pronoun forms are genuinely accentless, but the finite verb is unaccented ONLY in a principal clause — it IS accented in a subordinate clause and when sentence-initial (Whitney §592, §595)"
    ref: "Whitney §92-94 (enclitics), §592/§595 (verb accent: principal- vs subordinate-clause; the §168 cited before 16-07-2026 is a euphonic-combination section — corrected by the H1033 verification pass)"
    verdict_pedagogy: MISLEADING
    note: >-
      The particles/enclitics half is right, but 'verbum finitum ... никогда' overshoots: the very
      condition that makes the verb accentless (principal clause, non-initial) is exactly what the
      absolute 'никогда' hides. A learner told the verb is 'never' accented will misread accented
      Vedic subordinate clauses. The parenthetical 'в середине предложения' half-corrects it but the
      universal wording dominates.

  - id: HK-11
    loc: "Занятие VI / mdx line 1272"
    claim_ru: "Перед звонкими согласными (кроме r) и перед гласными (но не после ā̆) -s изменяется в -r."
    kind: rule
    falsifiable_as: "final -s → -r before voiced onset only after a non-a/ā vowel (agnir bhāṣate)"
    sources: [whitney, dcs]
    verdict_fact: TRUE
    number: "systemic: the '(но не после ā̆)' carve-out is exactly Whitney's condition — -as/-ās go to -o/-ā (elision), other -Vs go to -r before voiced"
    ref: "Whitney §174-178 (final s-sandhi; the -as/-ās exception)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Precisely stated, including the crucial ā̆-exception that beginners usually miss. The rule is a
      well-formed categorical statement, not an overreach.

  - id: HK-12
    loc: "Занятие IX / mdx line 1707"
    claim_ru: >-
      Существительные с основой на -a составляют большую часть всех существительных ... Склонение
      ... на -a является самым распространенным видом склонения.
    kind: statistic
    falsifiable_as: "a-stem share of nominal lemmas and tokens against all declension classes"
    sources: [dcs, whitney]
    verdict_fact: TRUE
    number: "systemic: the a-stem (thematic) declension is uncontroversially the largest and most productive nominal class by both lemma count and token count in every Sanskrit corpus census"
    ref: "Whitney §326ff (a-stems, 'by far the most numerous class')"
    verdict_pedagogy: JUSTIFIED
    note: >-
      A superlative frequency claim that is safe — the a-stem dominance is beyond dispute. Not
      re-counted from a nominal table here, but low-risk; Whitney himself calls it the most numerous
      class.

  - id: HK-13
    loc: "Занятие IX / mdx line 1759"
    claim_ru: "У именных основ среднего рода формы N. и A. во всех числах совпадают."
    kind: universality
    falsifiable_as: "does neuter N=A hold in sg, du and pl across every declension class"
    sources: [whitney]
    verdict_fact: TRUE
    number: "systemic and exceptionless: neuter N=A(=V) in all three numbers is an inherited Indo-European syncretism holding for every neuter stem type"
    ref: "Whitney §148, §307 (neuter N=A=V)"
    verdict_pedagogy: JUSTIFIED
    note: "A genuine exceptionless universal — the 'во всех числах' is fully earned. Strong anchor."

  - id: HK-14
    loc: "Занятие X / mdx line 1879"
    claim_ru: "Существительные с основой на -ā являются существительными женского рода."
    kind: universality
    falsifiable_as: "are there masculine ā-stems (root nouns, proper names) contradicting the rule"
    sources: [dcs, whitney]
    verdict_fact: OVERSTATED
    number: "the derived (secondary) ā-declension is feminine, but monosyllabic/root ā-stems and some masculine proper nouns exist; the beginner rule ignores the root-noun class (Whitney §347-351)"
    ref: "Whitney §347ff (ā-stems: derived fem. vs root/monosyllabic)"
    verdict_pedagogy: MISLEADING
    note: >-
      Practically fine for the class being taught (the productive -ā declension is feminine), but the
      unqualified 'являются ... женского рода' is an overreach against the root-ā class. Milder than
      the -ī/-ū version (HK-16) because the masculine ā-stems are rarer.

  - id: HK-15
    loc: "Занятие X / mdx line 1957"
    claim_ru: "Imperfectum ... обычно употребляется как время повествования о событиях прошлого."
    kind: statistic
    falsifiable_as: "is the imperfect the default past-narration tense — across which text strata"
    sources: [dcs, whitney]
    verdict_fact: OVERSTATED
    number: "true for classical narrative, but stratum-dependent: in Vedic the imperfect is the default past and the perfect competes for narration; 'обычно' hides the register/period conditioning"
    ref: "Whitney §779-783 (imperfect); §821-823 (perfect's later narrative drift)"
    verdict_pedagogy: FREQUENCY-HIDDEN
    note: >-
      Not wrong as a rough classical-prose heuristic, but 'обычно' flattens a real diachronic and
      register split (imperfect vs perfect vs aorist share different narrative niches by period).

  - id: HK-16
    loc: "Занятие XII / mdx line 2351"
    claim_ru: "Основы на -ī и -ū всегда женского рода."
    kind: universality
    falsifiable_as: "search for masculine ī/ū-stems (rathī, senānī, sudhī, bhū-) contradicting 'всегда'"
    sources: [dcs, whitney]
    verdict_fact: FALSE
    number: "counter-class well attested: masculine ī/ū-stems rathī 'charioteer', senānī 'army-leader', sudhī 'wise', monosyllabic bhū- (in compounds) — the 'всегда' universal is false"
    ref: "Whitney §343-344, §352 (masculine ī/ū-stems), §355-356 (derived fem. nadī/vadhū)"
    verdict_pedagogy: MISLEADING
    note: >-
      The clearest overreach in the book. Kochergina means the derived nadī-/vadhū- feminine type,
      which is indeed feminine — but the absolute 'всегда женского рода' is contradicted by a
      standard, non-marginal set of masculine ī/ū-stems. A learner will mis-gender rathī / senānī.
      Overlay should badge with the counter-class.

  - id: HK-17
    loc: "Занятие XIV / mdx line 2970"
    claim_ru: "Наиболее часто ... употребляются формы 2-го лица [императива]."
    kind: statistic
    falsifiable_as: "corpus frequency of imperative forms by person — does 2nd person dominate"
    sources: [dcs]
    verdict_fact: TRUE
    number: "2nd-person imperative-active forms 2,751 = 62.7% of 4,386 distinct forms (DCS-2021); 3rd person 1,369 (31.2%), 1st person 266 (6.1%)"
    ref: "Whitney §569ff (imperative); DCS verify_claims_dcs.py HK-17"
    verdict_pedagogy: JUSTIFIED
    mg_footnote: "Формы 2-го лица составляют 62,7% различных форм императива в DCS-2021 (2 751 из 4 386); 3-е лицо — 31,2%, 1-е — 6,1%."
    note: >-
      Directly corpus-confirmed: the 2nd person is the clear majority of imperative forms, exactly as
      Kochergina says (the imperative is inherently a directive addressed to '2nd person'). Well
      calibrated.

  - id: HK-18
    loc: "Занятие XV / mdx line 3202"
    claim_ru: >-
      Первое главное спряжение, тематическое, охватывает большинство глаголов ... Тематическая
      гласная -a- в 1-ом лице всех трех чисел удлиняется.
    kind: statistic
    falsifiable_as: "do the thematic classes hold a majority of roots; is the 1st-person -ā- lengthening regular"
    sources: [whitney, dcs]
    verdict_fact: TRUE
    number: "systemic: the thematic classes (I, IV, VI, X) hold the bulk of roots and virtually all high-frequency present tokens; the thematic -a → -ā lengthening before 1sg/1du/1pl endings is regular (Whitney §733)"
    ref: "Whitney §606ff (thematic conjugation), §733 (1st-person lengthening)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Two claims, both sound: thematic-class majority (frequency) and the categorical 1st-person
      lengthening (rule). No overreach.

  - id: HK-19
    loc: "Занятие XVI / mdx line 3554"
    claim_ru: >-
      Большинство входящих в IX класс глаголов оканчивается на "носовой + согласная" ... В основе
      настоящего времени носовой корня утрачивается.
    kind: statistic
    falsifiable_as: "tabulate class-IX (kryādi) roots by final shape; is a majority nasal+consonant final"
    sources: [whitney]
    verdict_fact: OVERSTATED
    number: "doubtful: many core kryādi roots are NOT nasal+consonant final — krī, jñā, grah, bandh, pū, lū, prī — so 'большинство ... носовой+согласная' overstates a real but minority sub-pattern"
    ref: "Whitney §723ff (kryādi / class IX)"
    verdict_pedagogy: FREQUENCY-HIDDEN
    note: >-
      The nasal-loss observation is right for the roots it applies to, but the 'большинство' framing
      inflates the share of nasal-final roots in the class. A count against Whitney's kryādi list
      would very likely refute the majority claim.

  - id: HK-20
    loc: "Занятие XVII / mdx line 3960"
    claim_ru: "В личном окончании 3 л. pl praesens у глаголов III класса утрачивается -n."
