    kind: statistic
    falsifiable_as: "is the imperfect the default past-narration tense — across which text strata"
    sources: [dcs, whitney]
    verdict_fact: OVERSTATED
    number: "true for classical narrative, but stratum-dependent: in Vedic the imperfect is the default past and the perfect competes for narration; 'обычно' hides the register/period conditioning"
    ref: "Whitney §779-783 (imperfect); §821-823 (perfect's later narrative drift)"
