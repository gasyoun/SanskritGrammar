  - id: HK-17
    loc: "Занятие XIV / mdx line 2970"
    claim_ru: "Наиболее часто ... употребляются формы 2-го лица [императива]."
    kind: statistic
    falsifiable_as: "corpus frequency of imperative forms by person — does 2nd person dominate"
    sources: [dcs]
