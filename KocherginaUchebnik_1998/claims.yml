    kind: statistic
    falsifiable_as: "is the thematic (a-)aorist the most frequent of the ~7 aorist types in DCS"
    sources: [dcs, whitney]
    verdict_fact: UNTESTABLE
    number: "DCS timws.csv tags aorist only as Act/Med (codes 10-13, 2,452 tokens), not by the 7 formation types — per-type split needs finer morphology than the 2021 export carries"
    ref: "Whitney §846-847 (a-aorist common, from roots in consonants)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Consistent with Whitney's account, but the DCS-2021 export does not tag aorists by formation
      type, so the 'самый распространенный' ranking cannot be confirmed against the corpus here. Flagged
