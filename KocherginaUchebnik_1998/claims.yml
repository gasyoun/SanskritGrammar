    number: "2nd-person imperative-active forms 2,751 = 62.7% of 4,386 distinct forms (DCS-2021); 3rd person 1,369 (31.2%), 1st person 266 (6.1%)"
    ref: "Whitney §569ff (imperative); DCS verify_claims_dcs.py HK-17"
    verdict_pedagogy: JUSTIFIED
    mg_footnote: "Формы 2-го лица составляют 62,7% различных форм императива в DCS-2021 (2 751 из 4 386); 3-е лицо — 31,2%, 1-е — 6,1%."
    note: >-
