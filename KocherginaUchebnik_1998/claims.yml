    note: "A genuine categorical rule, correctly stated. Anchor."

  - id: HK-21
    loc: "Занятие XVIII / mdx line 4299"
    claim_ru: "-ś, -ṣ, -c, -ch, в большинстве случаев -j и -h → k, при этом s → ṣ [перед -sya]."
    kind: allomorphy
    falsifiable_as: "before -sya, do root-final palatals/-h resolve to k (→ -kṣya-) in the majority of j/h roots"
    sources: [dcs, whitney]
    verdict_fact: TRUE
    number: "systemic: root-final palatals/-h resolve to a guttural before the s-future (dah→dhakṣya-, dṛś→drakṣya-); the 'в большинстве случаев' correctly hedges the two-way j/h reflex (some → ṣ)"
    ref: "Whitney §216-217 (palatal reversion), §936 (future of such roots)"
    verdict_pedagogy: FREQUENCY-HIDDEN
    note: >-
      Accurate, and the hedge 'в большинстве случаев' is itself well-judged — but it leaves the h/j
      split (→ k vs → ṣ) unresolved for the learner. Complements HK-4b: the future's consonant
      resolution is genuinely multi-way.

  - id: HK-22
    loc: "Занятие XIX / mdx line 4584"
