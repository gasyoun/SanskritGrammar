  - id: HK-86
    loc: Занятие XII / mdx line 2435
    claim_ru: От большинства мужских одушевлённых имён женский род образуется изменением -a на -ī.
    kind: statistic
    falsifiable_as: Share of animate masc a-stems forming feminine in -ī vs -ā in a lexicon
    sources:
    - whitney
    verdict_fact: UNTESTABLE
    number: >-
      SIZED, not "no instrument" (16-07-2026, masc_animate_feminine_pattern.py, H1056):
      the animacy blocker itself is now resolved (animacy_lookup.py, same pass) — 2,008
      animate masc a-stem NOUN lemmas identified. But the feminine-form check hit a
      MAJOR CONFOUND, found and partially corrected, not hidden: a naive surface-form
      split (940 feminine-tagged tokens of these lemmas) showed -ā dominating
      overwhelmingly (157 lemmas vs 3) — inspecting the raw sentences showed this was
      almost entirely BAHUVRĪHI COMPOUND-FINAL AGREEMENT (e.g. 'putrā', 140 tokens,
      mostly the tail of compounds like diti-vinaṣṭa-putrā '[Diti] whose sons were
      destroyed' — a bahuvrīhi adjective agreeing with a feminine head by simple
      -a→-ā lengthening, NOT the substantive noun-pair derivation the claim means).
      Excluded via the `mwt` compound-span table: 940 -> 67 standalone tokens, 22
      lemmas. Even after filtering, -ā STILL dominates (19 lemmas vs 3) on this thin
      residual. Recorded as INCONCLUSIVE: n=22 is thin, and further confounds
      (external sandhi-compounding the mwt table doesn't capture; competing lexical
      alternatives like duhitṛ 'daughter') were not ruled out given the effort already
      spent isolating the first confound. Whether the claim is genuinely overstated or
      a cleaner instrument would still confirm it stays open
    ref: >-
      Whitney §1223ff (feminine derivation -ā vs -ī); KocherginaUchebnik_1998/masc_animate_feminine_pattern.py;
      hk86_masc_animate_feminine_stats.json; animacy_lookup.py (H1056)
    verdict_pedagogy: FREQUENCY-HIDDEN
    note: >-
      A proportion claim whose base cannot yet be reconstructed cleanly — not for lack
      of trying, but because the surface-pattern check is heavily confounded by an
      unrelated grammatical phenomenon (bahuvrīhi compound agreement) that shares the
      exact same -a→-ā surface change the claim is about for simple nouns. Recorded
      with the compound-contamination finding so it isn't rediscovered from scratch;
      still flagged UNTESTABLE rather than forced to a verdict on a confounded, thin
      residual.

