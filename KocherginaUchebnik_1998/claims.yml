  - id: HK-21
    loc: "Занятие XVIII / mdx line 4299"
    claim_ru: "-ś, -ṣ, -c, -ch, в большинстве случаев -j и -h → k, при этом s → ṣ [перед -sya]."
    kind: allomorphy
