    number: "systemic external sandhi: final voiceless stop → voiced before any voiced sound (Whitney §159); the t→c/ṭ/l assimilations before palatal/cerebral/l are the companion rules (§202-203)"
    ref: "Whitney §159 (final-stop voicing), §202-203 (assimilation)"
    verdict_pedagogy: JUSTIFIED
    note: "Textbook-standard sandhi, stated correctly and categorically. A good TRUE/JUSTIFIED anchor."

  - id: HK-10
    loc: "Занятие VI / mdx line 1251"
    claim_ru: >-
      Имеются слова, никогда не носящие на себе ударение: частицы, краткие (энклитические) формы
      местоимений и verbum finitum в середине предложения.
    kind: universality
    falsifiable_as: "is the finite verb *never* accented — or only unaccented in a principal clause"
    sources: [whitney]
    verdict_fact: OVERSTATED
    number: "systemic: enclitic particles and short pronoun forms are genuinely accentless, but the finite verb is unaccented ONLY in a principal clause — it IS accented in a subordinate clause and when sentence-initial (Whitney §168)"
    ref: "Whitney §92-94 (enclitics), §168 (verb accent: principal- vs subordinate-clause)"
    verdict_pedagogy: MISLEADING
    note: >-
      The particles/enclitics half is right, but 'verbum finitum ... никогда' overshoots: the very
      condition that makes the verb accentless (principal clause, non-initial) is exactly what the
      absolute 'никогда' hides. A learner told the verb is 'never' accented will misread accented
      Vedic subordinate clauses. The parenthetical 'в середине предложения' half-corrects it but the
      universal wording dominates.

