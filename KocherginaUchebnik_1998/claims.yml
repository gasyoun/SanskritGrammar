    ref: "Whitney §275 (instrumental of agent), §999 (passive construction)"
    verdict_pedagogy: JUSTIFIED
    note: "Core syntax, correctly and completely stated. Anchor."

  - id: HK-28
    loc: "Занятие XXIV / mdx line 5845"
    claim_ru: >-
      В санскрите возможно употребление в страдательном залоге и непереходных глаголов. При этом
