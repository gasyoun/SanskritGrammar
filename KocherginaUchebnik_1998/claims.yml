    kind: statistic
    falsifiable_as: "a-stem share of nominal lemmas and tokens against all declension classes"
    sources: [dcs, whitney]
    verdict_fact: TRUE
    number: "systemic: the a-stem (thematic) declension is uncontroversially the largest and most productive nominal class by both lemma count and token count in every Sanskrit corpus census"
    ref: "Whitney §326ff (a-stems, 'by far the most numerous class')"
    verdict_pedagogy: JUSTIFIED
    note: >-
      A superlative frequency claim that is safe — the a-stem dominance is beyond dispute. Not
      re-counted from a nominal table here, but low-risk; Whitney himself calls it the most numerous
      class.

  - id: HK-13
    loc: "Занятие IX / mdx line 1759"
    claim_ru: "У именных основ среднего рода формы N. и A. во всех числах совпадают."
    kind: universality
    falsifiable_as: "does neuter N=A hold in sg, du and pl across every declension class"
    sources: [whitney]
    verdict_fact: TRUE
    number: "systemic and exceptionless: neuter N=A(=V) in all three numbers is an inherited Indo-European syncretism holding for every neuter stem type"
    ref: "Whitney §148, §307 (neuter N=A=V)"
    verdict_pedagogy: JUSTIFIED
    note: "A genuine exceptionless universal — the 'во всех числах' is fully earned. Strong anchor."

  - id: HK-14
    loc: "Занятие X / mdx line 1879"
    claim_ru: "Существительные с основой на -ā являются существительными женского рода."
    kind: universality
    falsifiable_as: "are there masculine ā-stems (root nouns, proper names) contradicting the rule"
    sources: [dcs, whitney]
    verdict_fact: OVERSTATED
    number: "the derived (secondary) ā-declension is feminine, but monosyllabic/root ā-stems and some masculine proper nouns exist; the beginner rule ignores the root-noun class (Whitney §347-351)"
    ref: "Whitney §347ff (ā-stems: derived fem. vs root/monosyllabic)"
    verdict_pedagogy: MISLEADING
    note: >-
      Practically fine for the class being taught (the productive -ā declension is feminine), but the
      unqualified 'являются ... женского рода' is an overreach against the root-ā class. Milder than
      the -ī/-ū version (HK-16) because the masculine ā-stems are rarer.

  - id: HK-15
    loc: "Занятие X / mdx line 1957"
    claim_ru: "Imperfectum ... обычно употребляется как время повествования о событиях прошлого."
    kind: statistic
    falsifiable_as: "is the imperfect the default past-narration tense — across which text strata"
    sources: [dcs, whitney]
    verdict_fact: OVERSTATED
    number: "true for classical narrative, but stratum-dependent: in Vedic the imperfect is the default past and the perfect competes for narration; 'обычно' hides the register/period conditioning"
    ref: "Whitney §779-783 (imperfect); §821-823 (perfect's later narrative drift)"
    verdict_pedagogy: FREQUENCY-HIDDEN
    note: >-
      Not wrong as a rough classical-prose heuristic, but 'обычно' flattens a real diachronic and
      register split (imperfect vs perfect vs aorist share different narrative niches by period).

  - id: HK-16
    loc: "Занятие XII / mdx line 2351"
    claim_ru: "Основы на -ī и -ū всегда женского рода."
    kind: universality
    falsifiable_as: "search for masculine ī/ū-stems (rathī, senānī, sudhī, bhū-) contradicting 'всегда'"
    sources: [dcs, whitney]
    verdict_fact: FALSE
    number: "counter-class well attested: masculine ī/ū-stems rathī 'charioteer', senānī 'army-leader', sudhī 'wise', monosyllabic bhū- (in compounds) — the 'всегда' universal is false"
    ref: "Whitney §343-344, §352 (masculine ī/ū-stems), §355-356 (derived fem. nadī/vadhū)"
    verdict_pedagogy: MISLEADING
    note: >-
      The clearest overreach in the book. Kochergina means the derived nadī-/vadhū- feminine type,
      which is indeed feminine — but the absolute 'всегда женского рода' is contradicted by a
      standard, non-marginal set of masculine ī/ū-stems. A learner will mis-gender rathī / senānī.
      Overlay should badge with the counter-class.

  - id: HK-17
    loc: "Занятие XIV / mdx line 2970"
    claim_ru: "Наиболее часто ... употребляются формы 2-го лица [императива]."
    kind: statistic
    falsifiable_as: "corpus frequency of imperative forms by person — does 2nd person dominate"
    sources: [dcs]
