    claim_ru: "Основы на -ī и -ū всегда женского рода."
    kind: universality
    falsifiable_as: "search for masculine ī/ū-stems (rathī, senānī, sudhī, bhū-) contradicting 'всегда'"
    sources: [dcs, whitney]
