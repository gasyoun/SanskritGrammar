  # ---- WHITNEY ADJUDICATION (H1084, 17-07-2026) ----

  - id: APT-31
    loc: "Урок 19 / mdx ~line 5100 (Apte English §210)"
    claim_ru: >-
      Аорист, помимо основного значения недавнего неопределенного прошлого, также выражает идею
      длительности действия. Имперфект не может быть использован в этом значении.
    kind: typology
    falsifiable_as: "does the aorist carry a durative ('continuousness') value that the imperfect cannot, per Whitney"
    sources: [whitney, elizarenkova]
    verdict_fact: FALSE
    number: >-
      Contradicted by Whitney §§927-929. §927: 'The aorist of the later language is simply a
      preterit, equivalent to the imperfect and perfect, and frequently coördinated with them' —
      so the imperfect is NOT barred from the sense the aorist carries; they are interchangeable in
      Classical Sanskrit. §928: the older-language aorist has the value of a 'perfect' — 'something
      past which is viewed as COMPLETED with reference to the present … what has just taken place' —
      i.e. completive/punctual, the opposite of durative 'continuousness'. §929: the aorist is
      distinguished FROM the imperfect precisely as a non-narrative tense. Whitney assigns the
      aorist no durative value anywhere.
    ref: "Whitney 1889 §§927-929; Apte, Guide to Sanskrit Composition §210 (English original verified: 'also implies the idea of continuousness. The Imperfect cannot be used in this sense'); Елизаренкова Т. Я. «Ведийский язык» с. 20 + «Санскрит» с. 28, 44, in Языки мира: Индоарийские языки древнего и среднего периодов (М.: Academia, 2004) — corroborating cross-check, H1373; harvest APT-H-219 (Урок 19)"
    verdict_pedagogy: MISLEADING
    note: >-
      The register's first FALSE. Two checks make it solid. (1) The error is APTE'S OWN, not the
      Likhushina translation's: the digitized English §210 reads 'also implies the idea of
      continuousness. The Imperfect cannot be used in this sense' — «длительность» faithfully
      renders 'continuousness', so the earlier translation-inversion hypothesis is refuted. (2)
      Apte contradicts himself: his §207-208 state that as Sanskrit ceased to be spoken 'writers
      began to use these three [past] tenses promiscuously' — exactly Whitney §927's equivalence —
      which undercuts §210's categorical 'the Imperfect cannot'. Apte is transmitting a Pāṇinian
      aspectual doctrine (the aorist as भूतार्थे लुङ्, the general past) as a categorical rule the
      descriptive record does not bear out — a prescriptive-vs-descriptive miss of the same family
      as APT-21 (the Pāṇinian dative-of-anger). Graded MISLEADING because a beginner told 'the
      aorist is durative, the imperfect is not' learns the aspect backwards; and the aorist is in
      any case marginal in Classical usage (~2.3% of finite verbal forms by DCS's feat_formation
      aorist tag — refreshed 17-07-2026 from the older 0.31% tense-code figure, which undercounted
      the root+thematic aorists, see whitney_aorist_tagger.py H1134; cf. Whitney §826), so the
      durative past the learner meets is overwhelmingly the imperfect/present, never the aorist.
      (3) THIRD-SOURCE CORROBORATION (H1373, 20-07-2026), added on the MG viza's ask «что сказано
      в книге Елизаренковой»: the viza named «Аорист в Ригведе» (1960), which was not supplied;
      the scan MG did supply is Elizarenkova's «Ведийский язык» / «Санскрит» essays in Языки мира:
      Индоарийские языки древнего и среднего периодов (М.: Academia, 2004) — nearer the point,
      since §210 concerns the CLASSICAL aorist and the 1960 monograph the Vedic one. She confirms
      the verdict on both halves, independently of Whitney and in Russian: the aorist is perfective,
      «действие, только что произошедшее на глазах у субъекта» (Санскрит, с. 44) and «закончившееся
      в недавнем прошлом, иногда точечное действие» (Ведийский язык, с. 20) — the opposite of
      duration; while the imperfective/durative is assigned precisely to the IMPERFECT, «действие
      нейтрального или несовершенного вида в прошлом… время повествования» (с. 20), inverting
      Apte's «имперфект не может быть использован в этом значении». For classical Sanskrit she
      records the three-way past opposition as levelled and the choice stylistic (с. 44; epic
      Sanskrit «семантические различия… минимальны», с. 28), matching Whitney §§927-929 and Apte's
      own §207. The scan is in copyright and stays out of git (gitignored, cited by printed page).
    methodichka: >-
      Заучите наоборот: длительное, продолжающееся прошлое несут имперфект и презенс, а аорист —
      «завершительное, только что». Аорист в классике редок (~2,3 % глагольных форм в DCS по тегу
      формации аориста; Whitney §826), так что длительное прошлое вы почти всегда встретите
      имперфектом.

  # ---- PARTICLE-SENSE WHITNEY PASS (H1087, 17-07-2026) — lessons 26–28 indeclinables ----
  # Finding: Apte's particle/indeclinable LEXICON is accurate — every gloss below checks out
  # against Whitney's indeclinables chapter (§§1096-1135). A clean contrast with his overreaching
  # aspect (APT-31) and government (APT-18/19/21) claims: where Apte reports what a word MEANS he
  # is reliable; his misses are in what a form's DISTRIBUTION or GOVERNMENT is.

  - id: APT-32
    loc: "Урок 26 / mdx ~line 6865"
    claim_ru: "Частица punaḥ обычно означает снова; но часто имеет значение тогда как, с другой стороны."
    kind: rule
    falsifiable_as: "does punar carry both the iterative 'again' and the adversative 'on the other hand' sense"
    sources: [whitney]
    verdict_fact: TRUE
    number: "systematic: Whitney §1112 (punar among the adverbial forms) + standard lexicon — punar = 'again, back; on the other hand, however'. Both senses Apte gives are standard."
    ref: "Whitney 1889 §1112, cf. §1121 (ápunar); harvest APT-H-500/501 (Урок 26)"
    verdict_pedagogy: JUSTIFIED
    note: "Both the iterative and the adversative sense are lexically standard; correctly reported."

  - id: APT-33
    loc: "Урок 26 / mdx ~line 6865"
    claim_ru: "Частица prāyaḥ или prāyeṇa означает обычно, как правило, и используется для установки общего правила."
    kind: rule
    falsifiable_as: "do prāyas / prāyeṇa mean 'usually / as a rule'"
    sources: [whitney]
    verdict_fact: TRUE
    number: "systematic: Whitney §1111 lists 'prāyas usually' (accusative adverb) and §1112 c 'prāyeṇa mostly' (instrumental adverb) — Apte's gloss is verbatim Whitney."
    ref: "Whitney 1889 §1111, §1112c; harvest APT-H-502 (Урок 26)"
    verdict_pedagogy: JUSTIFIED
    note: "Directly attested in Whitney's own adverb lists, both the -as and -eṇa forms."

  - id: APT-34
    loc: "Урок 26 / mdx ~line 6865"
    claim_ru: "muhuḥ означает часто … и в этом значении обычно повторяется."
    kind: rule
    falsifiable_as: "is muhus an adverb 'repeatedly/often', standardly reduplicated (muhur muhuḥ)"
    sources: [whitney]
    verdict_fact: TRUE
    number: "systematic: Whitney §1111 lists 'múhu and múhus' among the adverbs; the reduplicated muhur muhuḥ 'again and again' is the standard intensive."
    ref: "Whitney 1889 §1111; harvest APT-H-504 (Урок 26)"
    verdict_pedagogy: JUSTIFIED
    note: "Adverb attested in Whitney; the reduplication for the iterative sense is standard."

  - id: APT-35
    loc: "Урок 26 / mdx ~line 6865"
    claim_ru: "Наречие yataḥ означает откуда, когда используется вместо yasmāt."
    kind: rule
    falsifiable_as: "does yatas mean 'whence' and stand for the ablative yasmāt"
    sources: [whitney]
    verdict_fact: TRUE
    number: "systematic: Whitney §1098 — the tas-adverbs (átas, tátas, yátas, kútas…) 'have an ablative sense, and not rarely also an ablative construction'; yátas = 'whence, from which' = the ablative yasmāt exactly."
    ref: "Whitney 1889 §1098; harvest APT-H-506 (Урок 26)"
    verdict_pedagogy: JUSTIFIED
    note: "Precisely Whitney's account of the tas-adverbs — yatas is the ablative-sense adverb equivalent to yasmāt."

  - id: APT-36
    loc: "Урок 27 / mdx ~line 7035"
    claim_ru: "yāvat, когда используется само по себе, означает до тех пор пока … Управляется винительным падежом."
    kind: government
    falsifiable_as: "does yāvat 'up to / until' govern the accusative"
    sources: [whitney]
    verdict_fact: TRUE
    number: "systematic: yāvat is the neuter of yā́vant (Whitney §510, a relative-root derivative); as a prepositional adverb 'up to, as far/long as' it takes the accusative of extent/limit (Whitney §1129, accusative with words expressing extent toward a limit)."
    ref: "Whitney 1889 §510, §1129; harvest APT-H-508 (Урок 27)"
    verdict_pedagogy: JUSTIFIED
    note: "The accusative government of the extent-preposition yāvat is standard; correctly reported."

  - id: APT-37
    loc: "Урок 27 / mdx ~line 7035"
    claim_ru: "Повторение yathā и tathā (yathā yathā — tathā tathā) используется с прилагательными в сравнительной степени."
    kind: rule
    falsifiable_as: "is the reduplicated correlative yathā yathā … tathā tathā a proportional ('the more … the more') construction"
    sources: [whitney]
    verdict_fact: TRUE
    number: "systematic: Whitney §1101 — yáthā and táthā are the manner-adverbs of the relative and demonstrative roots; the doubled yathā yathā … tathā tathā is the standard proportional correlative."
    ref: "Whitney 1889 §1101; harvest APT-H-510 (Урок 27)"
    verdict_pedagogy: JUSTIFIED
    note: "Correlative manner-adverbs per Whitney; the proportional doubling is a standard idiom, correctly stated."

  - id: APT-38
    loc: "Урок 28 / mdx ~line 7279"
    claim_ru: "hā чаще всего обозначает горе, сожаление, боль; значение отвращения (jugupsā) встречается крайне редко."
    kind: rule
    falsifiable_as: "is hā an interjection primarily of grief (rarely of disgust)"
    sources: [whitney]
    verdict_fact: TRUE
    number: "systematic: Whitney §1135 a lists 'ā, hā, hāhā…' among the voice-gesture interjections; the grief/lament sense is the standard one, the disgust sense marginal — Apte's ranking is correct."
    ref: "Whitney 1889 §1135a; harvest APT-H-514/515 (Урок 28)"
    verdict_pedagogy: JUSTIFIED
    note: "hā classified as an interjection by Whitney; the grief-primary / disgust-rare split matches standard usage."

  - id: APT-39
    loc: "Урок 28 / mdx ~line 7279"
    claim_ru: "Наречие varaṃ с na (за которыми, как правило, следует ca, tu или punaḥ) используется в значении лучше — чем; оба члена в именительном падеже."
    kind: rule
    falsifiable_as: "is varaṃ … na (… ca/tu/punaḥ) the standard 'better X than Y' construction with both members in the nominative"
    sources: [whitney]
    verdict_fact: TRUE
    number: "systematic: varam ('choice, better') + na is the standard classical preference idiom ('better X, [and] not Y'); both compared members stand in the nominative as predicate nouns, correlated by the adversative ca/tu/punar (Whitney §1133 b for tu, §1112 for punar)."
    ref: "Whitney 1889 §1133b, §1112; harvest APT-H-511/512 (Урок 28)"
    verdict_pedagogy: JUSTIFIED
    note: "A correctly-described classical idiom; the nominative of both members and the adversative correlative are standard. Closes the substantive particle-sense set; the residual lesson-26-28 candidates (balavat adverbial, yat/yena clause-linkers) are uncontested descriptive glosses left in the harvest."
