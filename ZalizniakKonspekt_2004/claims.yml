# claims.yml — verifiable-assertion register for ZalizniakKonspekt_2004
#
# GENERATED target: CLAIMS_VERIFIED.md (via scripts/build_claims.py) — never edit that file.
#
# Same two-axis register as Kochergina/Bühler/Ocherk (H768/H797 method), for the second
# Zaliznyak source per the genre check (see ZalizniakOcherk_1978/claims.yml header). Konspekt
# 2004 (657 lines) is the SAME genre as Ocherk (discursive, not a phrase-reader like Knauer),
# but structurally very different in texture: overwhelmingly tabular/mechanical (declension and
# conjugation paradigm tables, a root-and-preverb lexicon) with only a thin vein of hedged,
# falsifiable prose scattered through it — 17 candidates found in a full read of all 657 lines,
# far fewer than Ocherk's 74 over 3128 lines despite similar hedge-word density per the earlier
# genre-check grep (23 hits here vs 172 there is NOT proportional to line count — Konspekt's
# hedges cluster in a few prose passages, not spread through mechanical tables).
#
# GENUINE INFRASTRUCTURE GAP FOUND (15-07-2026): several of this book's richest claims are
# UNUSUALLY well-specified — Zaliznyak states exact fractions for Rigveda-specific declension-
# variant frequencies (e.g. "in 1/3 of cases", "in 7/8 of cases", "in Ṛgveda in 5/6 of cases").
# These need period-isolated (Rigveda-only) corpus counts. Checked: VisualDCS/non-derived/Rigveda/
# holds only prose documents (intro, hymn commentary), no period-tagged token data; DCS-2021's
# own exports (tense_case_data.json, verb_classes.json) are corpus-wide aggregates with no
# per-text/per-period field. This resolves the same open question flagged in Ocherk's
# claims_harvest.yml §207 entry — CONFIRMED, not just suspected: period-tagged DCS data is not
# currently available in this pipeline's ground truth. The five RV-specific fraction claims stay
# in the backlog, unverifiable without new corpus infrastructure (not a "seed later" item — a
# genuine blocker until someone builds Rigveda-period isolation into the DCS export).
#
# verdict_fact:     TRUE | OVERSTATED | FALSE | UNTESTABLE | PENDING (harvested, not yet verified)
# verdict_pedagogy: JUSTIFIED | MISLEADING | RARE-AS-CENTRAL | FREQUENCY-HIDDEN | ORDER-QUESTIONABLE
# kind:             typology | universality | allomorphy | statistic | rule
#
# COVERAGE (this seed, 15-07-2026): KZ-1..KZ-2 — a genuinely small seed, not padded to match
# Ocherk/Bühler's scale. The remaining 15 candidates (including the 5 RV-fraction claims noted
# above) stay PENDING in claims_harvest.yml.

work: "Zaliznyak, Конспект санскритской грамматики (Sanskrit Grammar Synopsis), 2004"

synthesis: >-
  Two-claim seed — deliberately small, not padded. Konspekt turned out to be the hardest of the
  four sources checked so far (Kochergina, Bühler, Knauer, Ocherk) to verify with existing
  ground truth, for two distinct reasons found by actually reading all 657 lines rather than
  assuming from the earlier genre-check grep: (1) it is overwhelmingly tabular/mechanical
  (declension paradigms, conjugation paradigms, a root-and-preverb lexicon) with only a thin vein
  of hedged prose running through it, and (2) several of that thin vein's richest claims are
  Rigveda-specific exact fractions (1/3, 7/8, 3/5, 1/2, 5/6 of cases) that need period-isolated
  corpus data this pipeline's DCS ground truth does not currently expose — confirmed by checking,
  not assumed. KZ-1 (the seṭ/aniṭ/veṭ classification is genuinely mixed, "many fluctuations and
  inconsistencies") is TRUE by cross-reference to Kochergina's already-established HK-4 finding
  (future-stem seṭ share 56.8%, i.e. close to a 50/50 split, not a clean rule) — a different book
  independently confirms the same underlying messiness Zaliznyak describes qualitatively. KZ-2
  (periphrastic future middle voice is "редко", rare) is TRUE but weakly evidenced: DCS-2021's own
  tense/mood codebook has no separate tag for medium periphrastic future at all (only "Periph.
  Future" / Active, 1,290 tokens) — consistent with rarity, though the absence of a corpus tag is
  not the same as a measured ratio, and this is flagged honestly rather than overclaimed as a
  precise number. No errors found; the remaining 15 candidates are genuinely open, not a
  reluctant-to-verify backlog — five specifically need new corpus infrastructure (Rigveda-period
  isolation) before anyone can promote them.

entries:

  - id: KZ-1
    loc: "mdx line 72"
    claim_ru: >-
      (В индийской традиции корни, получающие вставное i, называются seṭ, не получающие ---
      aniṭ, имеющие оба варианта во всех таких формах --- veṭ.) В данном пункте имеется, однако,
      много колебаний и непоследовательностей.
    kind: statistic
    falsifiable_as: "is the seṭ/aniṭ classification genuinely inconsistent/fluctuating rather than a clean binary rule, per corpus attestation"
    sources: [dcs]
    verdict_fact: TRUE
    number: "future-stem seṭ (-iṣya) share = 56.8% of distinct future forms (Kochergina HK-4) — close to an even split, not a clean majority/minority rule, consistent with Zaliznyak's 'many fluctuations and inconsistencies' characterization"
    ref: "DCS-2021 (KocherginaUchebnik_1998/verify_claims_dcs.py HK4_future); cf. KocherginaUchebnik_1998 HK-4, BuhlerLeitfaden_1923 HB-59 (same corpus fact independently confirmed twice already)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Third independent confirmation (after Kochergina and Bühler) that the seṭ/aniṭ split in
      the future stem is genuinely close to even rather than following the clean root-class
      correlation a learner might expect — Zaliznyak's hedge here is honest, not an
      undersell or oversell.

  - id: KZ-2
    loc: "mdx line 383"
    claim_ru: >-
      Футурум 2 (описательный футурум): имя деятеля на -tar- (в N) + связка as 'быть' (кроме
      3-го лица, где без связки)... Med. (редко): dātāhe (), dātāse, dātā, dātāsmahe, dātādhve,
      dātāras, dātāsvahe, dātāsāthe, dātārau.
    kind: statistic
    falsifiable_as: "is the middle-voice periphrastic future (futurum 2 / futurum periphrasticum) genuinely rare relative to the active"
    sources: [dcs]
    verdict_fact: TRUE
    number: >-
      DCS-2021's tense/mood codebook (timws.csv, 42 codes) has no separate tag for medium
      periphrastic future at all — only code 7 'PPF. Future Active' (1,290 tokens = 0.17% of
      verbal) is tracked; no corresponding medium-voice code exists in the full code list
      (verify_claims_dcs.py KZ2_periphrastic_future_codebook)
    ref: "DCS-2021 timws.csv (ZalizniakKonspekt_2004/verify_claims_dcs.py; cf. BuhlerLeitfaden_1923/verify_claims_dcs.py's tense-code table)"
    verdict_pedagogy: JUSTIFIED
    note: >-
      Weakly evidenced by design, flagged honestly: the corpus's own tagging scheme carrying no
      medium-voice periphrastic-future code is consistent with genuine rarity, but an absent tag
      is not the same as a measured token ratio — this is the best available evidence, not a
      precise confirmation. Cf. ZalizniakOcherk_1978 §159 (Sonnet 5's own earlier harvest,
      unverified there too) — the same claim about the same paradigm cell appears independently
      in both Zaliznyak texts, neither yet given a hard number.
